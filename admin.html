  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>KFK · Admin Panel</title>
  <meta name="description" content="Master Control Center for KFK Platform" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ===== GLOBAL ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f6fa;
      color: #0b1a2b;
      line-height: 1.5;
      overflow-x: hidden;
      display: flex;
      min-height: 100vh;
    }
    :root {
      --primary: #0f2b45;
      --accent: #d45c2f;
      --sidebar-width: 260px;
      --sidebar-collapsed: 72px;
      --header-height: 64px;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(0,0,0,0.04);
      --radius: 16px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border);
      z-index: 100;
      transition: width var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 2px 0 12px rgba(0,0,0,0.02);
    }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      height: var(--header-height);
      flex-shrink: 0;
    }
    .sidebar-brand i { font-size: 1.6rem; color: var(--accent); }
    .sidebar-brand span { font-weight: 800; font-size: 1.3rem; color: var(--primary); white-space: nowrap; }
    .sidebar.collapsed .sidebar-brand span { display: none; }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 20px;
    }
    .sidebar-nav .nav-section { margin-bottom: 8px; }
    .sidebar-nav .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      padding: 8px 20px 4px;
      font-weight: 700;
    }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      color: #334155;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.15s;
      border-left: 3px solid transparent;
      white-space: nowrap;
    }
    .sidebar-nav a:hover { background: #f1f5f9; color: var(--primary); }
    .sidebar-nav a.active {
      background: #eef2ff;
      color: var(--primary);
      border-left-color: var(--accent);
    }
    .sidebar-nav a i { width: 22px; text-align: center; font-size: 1rem; color: #64748b; }
    .sidebar-nav a:hover i { color: var(--primary); }
    .sidebar.collapsed .sidebar-nav a span { display: none; }
    .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 12px; }
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .sidebar-footer a {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
    }
    .sidebar-footer a i { width: 22px; }
    .sidebar.collapsed .sidebar-footer a span { display: none; }

    /* ===== MAIN ===== */
    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      transition: margin var(--transition);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

    /* ===== HEADER ===== */
    .topbar {
      height: var(--header-height);
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .toggle-sidebar { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #334155; padding: 4px; }
    .topbar-search {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 40px;
      padding: 4px 16px;
      gap: 8px;
      min-width: 200px;
    }
    .topbar-search input { border: none; background: transparent; padding: 8px 0; outline: none; font-size: 0.9rem; width: 100%; }
    .topbar-actions { display: flex; align-items: center; gap: 16px; }
    .topbar-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #475569; position: relative; padding: 4px; }
    .topbar-actions .badge-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
    .topbar-actions .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer;
    }
    .quick-add { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }

    /* ===== CONTENT ===== */
    .content {
      padding: 24px 28px;
      flex: 1;
    }

    /* ===== DASHBOARD CARDS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,0.05); }
    .stat-card .label { font-size: 0.75rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 1.6rem; font-weight: 700; color: var(--primary); margin: 4px 0; }
    .stat-card .change { font-size: 0.75rem; color: #22c55e; }
    .stat-card .change.down { color: #ef4444; }
    .stat-card .icon { float: right; font-size: 1.6rem; color: var(--border); }

    /* ===== CHARTS ===== */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      margin-bottom: 28px;
    }
    .chart-box {
      background: white;
      border-radius: var(--radius);
      padding: 20px 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .chart-box h3 { font-size: 0.9rem; font-weight: 600; color: #1e293b; margin-bottom: 16px; }
    .chart-placeholder {
      height: 200px;
      background: linear-gradient(90deg, #e2e8f0 0%, #f1f5f9 50%, #e2e8f0 100%);
      background-size: 200% 100%;
      border-radius: 12px;
      animation: shimmer 2s infinite;
      display: flex;
      align-items: flex-end;
      padding: 8px 12px;
      gap: 8px;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .chart-bar {
      flex: 1;
      background: var(--primary);
      border-radius: 4px 4px 0 0;
      min-height: 12px;
      opacity: 0.6;
      transition: 0.3s;
    }
    .chart-bar:hover { opacity: 1; }
    .chart-bar.accent { background: var(--accent); }

    /* ===== TABLES ===== */
    .table-wrap {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }
    .table-wrap .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .table-wrap .table-header h3 { font-size: 0.95rem; font-weight: 600; }
    .table-wrap .table-header a { color: var(--accent); font-weight: 600; text-decoration: none; font-size: 0.85rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 12px 20px; background: #f8fafc; font-weight: 600; color: #475569; border-bottom: 1px solid var(--border); }
    td { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; }
    tr:last-child td { border-bottom: none; }
    .status-badge { display: inline-block; padding: 2px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
    .status-badge.success { background: #dcfce7; color: #166534; }
    .status-badge.warning { background: #fef3c7; color: #92400e; }
    .status-badge.danger { background: #fee2e2; color: #991b1b; }
    .status-badge.info { background: #dbeafe; color: #1e40af; }

    /* ===== RESPONSIVE ===== */
    .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,0.2); }
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .sidebar.collapsed ~ .main { margin-left: 0; }
      .charts-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; }
      .topbar-search { min-width: 120px; flex: 1; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .content { padding: 16px; }
      .quick-add { padding: 6px 12px; font-size: 0.75rem; }
    }

    /* ===== FOOTER ===== */
    .admin-footer {
      border-top: 1px solid var(--border);
      padding: 16px 28px;
      background: white;
      font-size: 0.8rem;
      color: #94a3b8;
      text-align: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ===== SIDEBAR OVERLAY (mobile) ===== -->

<!-- ===== SIDEBAR ===== -->

<!-- ===== MAIN ===== -->
<div class="main">

      </div>
    </div>
  
    <!-- FOOTER -->
    <div class="admin-footer">© 2026 KFK · Enterprise Admin Panel · Firebase Ready</div>
  </div>
  
  <script>
    // ============================================================
    //  MASTER DATA LAYER — Admin Controlled, Firebase Ready
    //  All data is dynamic. Replace arrays with Firestore later.
    // ============================================================
  
    // Sidebar Navigation
    const SIDEBAR_NAV = [
      { section: 'Main', items: [
        { label: 'Dashboard', icon: 'fa-th-large', link: '/admin.html', active: true },
        { label: 'Products', icon: 'fa-box', link: '/admin-products.html' },

        { label: 'Testimonials', icon: 'fa-star', link: '/admin-testimonials.html' },

        { label: 'CRM', icon: 'fa-address-card', link: '/admin-crm.html' },
        { label: 'Reports', icon: 'fa-chart-bar', link: '/admin-reports.html' },

    ];
  
    // Dashboard Stats
    const DASHBOARD_STATS = [
      { label: 'Today\'s Sales', value: '₹84,290', change: '+12.5%', icon: 'fa-arrow-up', color: '#22c55e' },
      { label: 'Today\'s Orders', value: '147', change: '+8%', icon: 'fa-shopping-bag', color: '#3b82f6' },

      { label: 'Low Stock', value: '16', change: '⚠️', icon: 'fa-exclamation-triangle', color: '#ef4444' },
      { label: 'Out of Stock', value: '8', change: '❗', icon: 'fa-times-circle', color: '#ef4444' },
    ];
  
    // Recent Orders
    const RECENT_ORDERS = [
      { id: '#KFK-1024', customer: 'Priya Sharma', amount: '₹1,299', status: 'Delivered', date: '2026-06-28' },
      { id: '#KFK-1023', customer: 'Rahul Verma', amount: '₹2,450', status: 'Packed', date: '2026-06-28' },
      { id: '#KFK-1022', customer: 'Ananya Reddy', amount: '₹899', status: 'Dispatched', date: '2026-06-27' },
      { id: '#KFK-1021', customer: 'Vikram Singh', amount: '₹3,200', status: 'Pending', date: '2026-06-27' },

    // Low Stock Products
    const LOW_STOCK = [

    const RECENT_CUSTOMERS = [

      { name: 'Meera Iyer', email: 'meera@example.com', orders: 8, spent: '₹5,200' },

    const FRANCHISE_APPS = [

    // ============================================================
    //  RENDER FUNCTIONS — All dynamic, Firebase ready
    // ============================================================
  
    function renderSidebar() {
      const container = document.getElementById('sidebarNav');
      container.innerHTML = SIDEBAR_NAV.map(section => `
        <div class="nav-section">
          <div class="nav-label">${section.section}</div>
          ${section.items.map(item => `
            <a href="${item.link}" class="${item.active ? 'active' : ''}">
              <i class="fas ${item.icon}"></i><span>${item.label}</span>
            </a>
          `).join('')}
        </div>
      `).join('');
    }
  
    function renderStats() {
      const container = document.getElementById('statsGrid');
      container.innerHTML = DASHBOARD_STATS.map(stat => `
        <div class="stat-card">
          <div class="icon"><i class="fas ${stat.icon}" style="color:${stat.color};opacity:0.6;"></i></div>

          <div class="value">${stat.value}</div>
          <div class="change ${stat.change.startsWith('-') ? 'down' : ''}">${stat.change}</div>
        </div>
    `).join('');
  }

  function renderRevenueChart() {
    const container = document.getElementById('revenueChart');
    const max = Math.max(...REVENUE_DATA);
    container.innerHTML = REVENUE_DATA.map((val, i) => `
      <div class="chart-bar ${i % 3 === 0 ? 'accent' : ''}" style="height:${(val/max)*80+10}%;"></div>
    `).join('');
  }

  function renderOrderStatusChart() {
    const container = document.getElementById('orderStatusChart');
    const total = Object.values(ORDER_STATUS_DATA).reduce((a,b) => a+b, 0);
    container.innerHTML = Object.entries(ORDER_STATUS_DATA).map(([label, val]) => `
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:0.7rem;font-weight:600;width:80px;flex-shrink:0;">${label}</span>
        <div style="flex:1;height:10px;background:#e2e8f0;border-radius:10px;overflow:hidden;">
          <div style="width:${(val/total)*100}%;height:100%;background:${label === 'Delivered' ? '#22c55e' : label === 'Cancelled' ? '#ef4444' : '#f59e0b'};border-radius:10px;"></div>
        </div>
        <span style="font-size:0.75rem;font-weight:600;width:32px;">${val}</span>
      </div>
    `).join('');
  }

  function renderRecentOrders() {
    const table = document.getElementById('recentOrdersTable');
    table.innerHTML = `
      <thead><tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
      <tbody>${RECENT_ORDERS.map(o => `
        <tr>
          <td><strong>${o.id}</strong></td>
          <td>${o.customer}</td>
          <td>${o.amount}</td>
          <td><span class="status-badge ${o.status === 'Delivered' ? 'success' : o.status === 'Pending' ? 'warning' : o.status === 'Cancelled' ? 'danger' : 'info'}">${o.status}</span></td>
          <td>${o.date}</td>
        </tr>
      `).join('')}</tbody>
    `;
  }

  function renderLowStock() {
    const table = document.getElementById('lowStockTable');
    table.innerHTML = `
      <thead><tr><th>Product</th><th>Stock</th><th>Threshold</th><th>Status</th></tr></thead>
      <tbody>${LOW_STOCK.map(p => `
        <tr>
          <td><strong>${p.name}</strong></td>
          <td>${p.stock}</td>
          <td>${p.threshold}</td>
          <td><span class="status-badge ${p.stock <= 5 ? 'danger' : 'warning'}">${p.stock <= 5 ? 'Critical' : 'Low'}</span></td>
        </tr>
      `).join('')}</tbody>
    `;
  }

  function renderRecentCustomers() {
    const table = document.getElementById('recentCustomersTable');
    table.innerHTML = `
      <thead><tr><th>Name</th><th>Email</th><th>Orders</th><th>Spent</th></tr></thead>
      <tbody>${RECENT_CUSTOMERS.map(c => `
        <tr>
          <td><strong>${c.name}</strong></td>
          <td>${c.email}</td>
          <td>${c.orders}</td>
          <td>${c.spent}</td>
        </tr>
      `).join('')}</tbody>
    `;
  }

  function renderFranchiseApps() {
    const table = document.getElementById('franchiseAppsTable');
    table.innerHTML = `
      <thead><tr><th>Business</th><th>Location</th><th>Status</th><th>Applied</th></tr></thead>
      <tbody>${FRANCHISE_APPS.map(app => `
        <tr>
          <td><strong>${app.name}</strong></td>
          <td>${app.location}</td>
          <td><span class="status-badge ${app.status === 'Approved' ? 'success' : app.status.includes('Review') ? 'warning' : 'info'}">${app.status}</span></td>
          <td>${app.applied}</td>
        </tr>
      `).join('')}</tbody>
    `;
  }

  // ============================================================
  //  SIDEBAR TOGGLE (desktop & mobile)
  // ============================================================
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (window.innerWidth <= 1024) {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    } else {
      sidebar.classList.toggle('collapsed');
    }
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
  // Auto-close on resize to desktop
  window.addEventListener('resize', () => {
    if (window.innerWidth > 1024) closeSidebar();
  });

  // ============================================================
  //  INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    renderSidebar();
    renderStats();
    renderRevenueChart();
    renderOrderStatusChart();
    renderRecentOrders();
    renderLowStock();
    renderRecentCustomers();
    renderFranchiseApps();
  });
</script>
  <script src="js/kfk-core.js"></script>

</body>
</html>

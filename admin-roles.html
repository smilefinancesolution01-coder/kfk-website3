<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>KFK · Role & Permission Management</title>
  <meta name="description" content="Master Role & Permission Management System for KFK Platform" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f6fa;
      color: #0b1a2b;
      line-height: 1.5;
      overflow-x: hidden;
      display: flex;
      min-height: 100vh;
    }
    :root {
      --primary: #0f2b45;
      --accent: #d45c2f;
      --sidebar-width: 260px;
      --sidebar-collapsed: 72px;
      --header-height: 64px;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(0,0,0,0.04);
      --radius: 16px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border);
      z-index: 100;
      transition: width var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 2px 0 12px rgba(0,0,0,0.02);
    }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      height: var(--header-height);
      flex-shrink: 0;
    }
    .sidebar-brand i { font-size: 1.6rem; color: var(--accent); }
    .sidebar-brand span { font-weight: 800; font-size: 1.3rem; color: var(--primary); white-space: nowrap; }
    .sidebar.collapsed .sidebar-brand span { display: none; }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 20px;
    }
    .sidebar-nav .nav-section { margin-bottom: 8px; }
    .sidebar-nav .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      padding: 8px 20px 4px;
      font-weight: 700;
    }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      color: #334155;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.15s;
      border-left: 3px solid transparent;
      white-space: nowrap;
    }
    .sidebar-nav a:hover { background: #f1f5f9; color: var(--primary); }
    .sidebar-nav a.active {
      background: #eef2ff;
      color: var(--primary);
      border-left-color: var(--accent);
    }
    .sidebar-nav a i { width: 22px; text-align: center; font-size: 1rem; color: #64748b; }
    .sidebar-nav a:hover i { color: var(--primary); }
    .sidebar.collapsed .sidebar-nav a span { display: none; }
    .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 12px; }
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .sidebar-footer a {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
    }
    .sidebar-footer a i { width: 22px; }
    .sidebar.collapsed .sidebar-footer a span { display: none; }

    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      transition: margin var(--transition);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

    .topbar {
      height: var(--header-height);
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .toggle-sidebar { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #334155; padding: 4px; }
    .topbar-search {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 40px;
      padding: 4px 16px;
      gap: 8px;
      min-width: 200px;
    }
    .topbar-search input { border: none; background: transparent; padding: 8px 0; outline: none; font-size: 0.9rem; width: 100%; }
    .topbar-actions { display: flex; align-items: center; gap: 16px; }
    .topbar-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #475569; position: relative; padding: 4px; }
    .topbar-actions .badge-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
    .topbar-actions .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer;
    }

    .content { padding: 24px 28px; flex: 1; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 12px 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card .label { font-size: 0.6rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-card .value { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin: 2px 0; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .toolbar-left { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .toolbar-right { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .btn {
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1a3a5a; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: #b84c2a; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: #334155; }
    .btn-outline:hover { background: #f1f5f9; }
    .btn-sm { padding: 5px 14px; font-size: 0.75rem; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-warning:hover { background: #d97706; }

    .table-wrap {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: auto;
      box-shadow: var(--shadow);
    }
    .table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 1000px; }
    th {
      text-align: left;
      padding: 10px 12px;
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:hover td { background: #f8fafc; }
    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.6rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .status-badge.active { background: #dcfce7; color: #166534; }
    .status-badge.inactive { background: #f1f5f9; color: #64748b; }
    .status-badge.system { background: #dbeafe; color: #1e40af; }
    .status-badge.custom { background: #fef3c7; color: #92400e; }
    .actions-cell { display: flex; gap: 4px; flex-wrap: wrap; }
    .actions-cell button {
      background: none;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
      color: #64748b;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .actions-cell button:hover { background: #f1f5f9; color: var(--primary); }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      display: none;
      backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: block; }
    .role-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 820px;
      max-width: 94vw;
      height: 100%;
      background: white;
      z-index: 210;
      box-shadow: -8px 0 30px rgba(0,0,0,0.1);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .role-drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background: white;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .drawer-header h2 { font-size: 1.1rem; font-weight: 700; }
    .drawer-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #64748b; }
    .drawer-body { padding: 20px 24px; flex: 1; overflow-y: auto; }
    .drawer-footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
      background: white;
      position: sticky;
      bottom: 0;
      flex-wrap: wrap;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group label {
      font-weight: 600;
      font-size: 0.75rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-group input, .form-group select, .form-group textarea {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: inherit;
      transition: 0.15s;
      background: white;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(15,43,69,0.1);
    }
    .form-group .full-width { grid-column: 1 / -1; }

    .permission-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
      padding: 4px;
    }
    .permission-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .permission-item input[type="checkbox"] { width: 16px; height: 16px; }
    .permission-item .module-name { font-weight: 600; min-width: 100px; }
    .permission-item .perm-actions { display: flex; gap: 4px; flex-wrap: wrap; }
    .permission-item .perm-actions label { font-weight: 400; font-size: 0.7rem; text-transform: none; display: flex; align-items: center; gap: 3px; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,0.2); }
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .sidebar.collapsed ~ .main { margin-left: 0; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
      .permission-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; }
      .topbar-search { min-width: 120px; flex: 1; }
      .content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; align-items: stretch; }
      .role-drawer { width: 100%; max-width: 100%; }
      .drawer-body { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><i class="fas fa-fish"></i><span>KFK Admin</span></div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="/admin-profile.html"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    <a href="/logout.html"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-search"><i class="fas fa-search" style="color:#94a3b8;"></i><input type="text" placeholder="Search roles..." id="globalSearch" onkeyup="filterRoles()" /></div>
    </div>
    <div class="topbar-actions">
      <button><i class="far fa-bell"></i><span class="badge-dot"></span></button>
      <button><i class="far fa-envelope"></i></button>
      <div class="avatar" onclick="location.href='/admin-profile.html'">A</div>
    </div>
  </header>

  <div class="content">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-accent" onclick="openAddRole()"><i class="fas fa-plus"></i> Add Role</button>
        <button class="btn btn-outline btn-sm"><i class="fas fa-file-export"></i> Export</button>
        <button class="btn btn-outline btn-sm" onclick="refreshRoles()"><i class="fas fa-sync"></i> Refresh</button>
      </div>
      <div class="toolbar-right">
        <select id="filterStatus" onchange="filterRoles()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="system">System</option>
          <option value="custom">Custom</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table id="roleTable">
        <thead>
          <tr>
            <th>Role Name</th>
            <th>Role ID</th>
            <th>Description</th>
            <th>Users</th>
            <th>Permissions</th>
            <th>Status</th>
            <th>Created</th>
            <th style="width:100px;">Actions</th>
          </tr>
        </thead>
        <tbody id="roleTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Role Detail/Permission Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="role-drawer" id="roleDrawer">
  <div class="drawer-header">
    <h2 id="drawerTitle">Role: <span id="roleNameDisplay"></span></h2>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
  </div>
  <div class="drawer-body" id="roleDetailContent"></div>
  <div class="drawer-footer">
    <button class="btn btn-outline" onclick="closeDrawer()">Close</button>
    <button class="btn btn-primary" onclick="savePermissions()"><i class="fas fa-save"></i> Save Permissions</button>
    <button class="btn btn-success" onclick="assignUsers()"><i class="fas fa-user-plus"></i> Assign Users</button>
  </div>
</div>

<!-- Add Role Drawer -->
<div class="drawer-overlay" id="addRoleOverlay" onclick="closeAddRole()"></div>
<div class="role-drawer" id="addRoleDrawer">
  <div class="drawer-header">
    <h2>Add New Role</h2>
    <button class="drawer-close" onclick="closeAddRole()"><i class="fas fa-times"></i></button>
  </div>
  <div class="drawer-body">
    <form id="addRoleForm" onsubmit="saveRole(event)">
      <div class="form-grid">
        <div class="form-group"><label>Role Name *</label><input type="text" id="roleName" required /></div>
        <div class="form-group"><label>Role Code *</label><input type="text" id="roleCode" required placeholder="ROLE_XYZ" /></div>
        <div class="form-group full-width"><label>Description</label><textarea id="roleDesc" rows="2"></textarea></div>
        <div class="form-group"><label>Priority</label><input type="number" id="rolePriority" value="0" /></div>
        <div class="form-group"><label>Status</label>
          <select id="roleStatus"><option value="active">Active</option><option value="inactive">Inactive</option></select>
        </div>
        <div class="form-group"><label>Clone From</label>
          <select id="roleClone"><option value="">None</option></select>
        </div>
      </div>
    </form>
  </div>
  <div class="drawer-footer">
    <button class="btn btn-outline" onclick="closeAddRole()">Cancel</button>
    <button class="btn btn-primary" onclick="saveRole(event)"><i class="fas fa-save"></i> Create Role</button>
  </div>
</div>

<script>
  // ============================================================
  //  ROLE MODEL — Firebase Ready
  // ============================================================
  class Role {
    constructor(data = {}) {
      this.id = data.id || 'ROLE-' + Date.now().toString().slice(-8);
      this.name = data.name || '';
      this.code = data.code || '';
      this.description = data.description || '';
      this.priority = data.priority || 0;
      this.status = data.status || 'active';
      this.type = data.type || 'custom';
      this.permissions = data.permissions || {};
      this.users = data.users || [];
      this.createdAt = data.createdAt || new Date().toISOString();
      this.updatedAt = new Date().toISOString();
    }
  }

  // ============================================================
  //  PERMISSION DEFINITIONS
  // ============================================================
  const MODULES = [
    'Dashboard', 'Products', 'Categories', 'Homepage', 'Marketplace',
    'Orders', 'Customers', 'Inventory', 'CRM', 'Franchise',
    'Reports', 'Analytics', 'Users', 'Roles', 'Settings',
    'Notifications', 'Support', 'Blogs', 'Recipes', 'Offers',
    'Partners', 'Cloud Kitchen', 'Finance'
  ];

  const ACTIONS = ['View', 'Create', 'Edit', 'Delete', 'Approve', 'Publish', 'Export', 'Import', 'Assign', 'Manage'];

  // ============================================================
  //  SAMPLE DATA
  // ============================================================
  let roles = [
    new Role({
      id: 'ROLE-001', name: 'Super Admin', code: 'SUPER_ADMIN',
      description: 'Full system access with all permissions',
      priority: 100, status: 'active', type: 'system',
      users: ['Ramesh Kumar', 'Admin Team'],
      permissions: MODULES.reduce((acc, m) => { acc[m] = ACTIONS.reduce((a, act) => { a[act] = true; return a; }, {}); return acc; }, {})
    }),
    new Role({
      id: 'ROLE-002', name: 'Admin', code: 'ADMIN',
      description: 'Full access except system settings and user management',
      priority: 90, status: 'active', type: 'system',
      users: ['Sneha Reddy'],
      permissions: MODULES.reduce((acc, m) => {
        acc[m] = ACTIONS.reduce((a, act) => {
          a[act] = !['Users', 'Roles', 'Settings'].includes(m);
          return a;
        }, {});
        return acc;
      }, {})
    }),
    new Role({
      id: 'ROLE-003', name: 'Sales Manager', code: 'SALES_MANAGER',
      description: 'Manage sales team, orders, and customers',
      priority: 80, status: 'active', type: 'system',
      users: ['Amit Singh'],
      permissions: MODULES.reduce((acc, m) => {
        acc[m] = ACTIONS.reduce((a, act) => {
          const allowed = ['Orders', 'Customers', 'CRM', 'Reports', 'Dashboard'].includes(m);
          a[act] = allowed && (act !== 'Delete' || m === 'Orders');
          return a;
        }, {});
        return acc;
      }, {})
    }),
    new Role({
      id: 'ROLE-004', name: 'Inventory Manager', code: 'INVENTORY_MANAGER',
      description: 'Manage inventory, products, and warehouses',
      priority: 75, status: 'active', type: 'system',
      users: ['Priya Patel'],
      permissions: MODULES.reduce((acc, m) => {
        acc[m] = ACTIONS.reduce((a, act) => {
          const allowed = ['Products', 'Categories', 'Inventory', 'Reports'].includes(m);
          a[act] = allowed;
          return a;
        }, {});
        return acc;
      }, {})
    }),
    new Role({
      id: 'ROLE-005', name: 'Customer Support', code: 'SUPPORT',
      description: 'Handle customer queries and orders',
      priority: 60, status: 'active', type: 'system',
      users: ['Arjun Nair'],
      permissions: MODULES.reduce((acc, m) => {
        acc[m] = ACTIONS.reduce((a, act) => {
          const allowed = ['Orders', 'Customers', 'Support'].includes(m);
          a[act] = allowed && act !== 'Delete';
          return a;
        }, {});
        return acc;
      }, {})
    }),
    new Role({
      id: 'ROLE-006', name: 'Read Only', code: 'READ_ONLY',
      description: 'View-only access to all modules',
      priority: 10, status: 'active', type: 'custom',
      users: ['Guest Users'],
      permissions: MODULES.reduce((acc, m) => {
        acc[m] = ACTIONS.reduce((a, act) => {
          a[act] = act === 'View';
          return a;
        }, {});
        return acc;
      }, {})
    })
  ];

  let currentRoleId = null;

  // ============================================================
  //  SIDEBAR NAVIGATION
  // ============================================================
  const SIDEBAR_NAV = [
    { section: 'Main', items: [
      { label: 'Dashboard', icon: 'fa-th-large', link: '/admin.html' },
      { label: 'Products', icon: 'fa-box', link: '/admin-products.html' },
      { label: 'Categories', icon: 'fa-tags', link: '/admin-categories.html' },
      { label: 'Orders', icon: 'fa-shopping-cart', link: '/admin-orders.html' },
      { label: 'Customers', icon: 'fa-users', link: '/admin-customers.html' },
      { label: 'Inventory', icon: 'fa-warehouse', link: '/admin-inventory.html' },
      { label: 'CRM', icon: 'fa-address-card', link: '/admin-crm.html' },
      { label: 'Franchise', icon: 'fa-store-alt', link: '/admin-franchise.html' },
      { label: 'Reports', icon: 'fa-chart-bar', link: '/admin-reports.html' },
      { label: 'Settings', icon: 'fa-cog', link: '/admin-settings.html' },
      { label: 'Users', icon: 'fa-users-cog', link: '/admin-users.html' },
      { label: 'Roles', icon: 'fa-lock', link: '/admin-roles.html', active: true },
    ]}
  ];

  function renderSidebar() {
    const container = document.getElementById('sidebarNav');
    container.innerHTML = SIDEBAR_NAV.map(section => `
      <div class="nav-section">
        <div class="nav-label">${section.section}</div>
        ${section.items.map(item => `
          <a href="${item.link}" class="${item.active ? 'active' : ''}">
            <i class="fas ${item.icon}"></i><span>${item.label}</span>
          </a>
        `).join('')}
      </div>
    `).join('');
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (window.innerWidth <= 1024) { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
    else { sidebar.classList.toggle('collapsed'); }
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  // ============================================================
  //  STATS
  // ============================================================
  function renderStats() {
    const total = roles.length;
    const active = roles.filter(r => r.status === 'active').length;
    const system = roles.filter(r => r.type === 'system').length;
    const custom = roles.filter(r => r.type === 'custom').length;
    const users = roles.reduce((sum, r) => sum + (r.users ? r.users.length : 0), 0);

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="label">Total Roles</div><div class="value">${total}</div></div>
      <div class="stat-card"><div class="label">Active Roles</div><div class="value" style="color:#22c55e;">${active}</div></div>
      <div class="stat-card"><div class="label">System Roles</div><div class="value" style="color:#3b82f6;">${system}</div></div>
      <div class="stat-card"><div class="label">Custom Roles</div><div class="value" style="color:#f59e0b;">${custom}</div></div>
      <div class="stat-card"><div class="label">Users Assigned</div><div class="value">${users}</div></div>
    `;
  }

  // ============================================================
  //  ROLE TABLE
  // ============================================================
  function renderRoles(data = roles) {
    const tbody = document.getElementById('roleTableBody');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#94a3b8;">No roles found</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(r => {
      const permCount = Object.values(r.permissions || {}).reduce((sum, perms) => sum + Object.values(perms).filter(Boolean).length, 0);
      return `
        <tr onclick="openRolePermissions('${r.id}')" style="cursor:pointer;">
          <td><strong>${r.name}</strong></td>
          <td style="font-size:0.7rem;color:#64748b;">${r.code}</td>
          <td style="font-size:0.75rem;">${r.description || '—'}</td>
          <td>${r.users ? r.users.length : 0}</td>
          <td>${permCount}</td>
          <td><span class="status-badge ${r.type === 'system' ? 'system' : 'custom'}">${r.type}</span></td>
          <td style="font-size:0.7rem;">${new Date(r.createdAt).toLocaleDateString()}</td>
          <td onclick="event.stopPropagation();" class="actions-cell">
            <button onclick="openRolePermissions('${r.id}')" title="Permissions"><i class="fas fa-key"></i></button>
            <button onclick="editRole('${r.id}')" title="Edit"><i class="fas fa-edit"></i></button>
            <button onclick="toggleRole('${r.id}')" title="Toggle Status"><i class="fas ${r.status === 'active' ? 'fa-eye' : 'fa-eye-slash'}"></i></button>
          </td>
        </tr>
      `;
    }).join('');
  }

  // ============================================================
  //  FILTERS
  // ============================================================
  function filterRoles() {
    const search = document.getElementById('globalSearch').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;

    let filtered = roles.filter(r => {
      const matchSearch = r.name.toLowerCase().includes(search) ||
                          r.code.toLowerCase().includes(search) ||
                          (r.description && r.description.toLowerCase().includes(search));
      const matchStatus = !status || r.type === status || r.status === status;
      return matchSearch && matchStatus;
    });
    renderRoles(filtered);
  }

  function refreshRoles() {
    document.getElementById('globalSearch').value = '';
    document.getElementById('filterStatus').value = '';
    renderRoles(roles);
  }

  // ============================================================
  //  ROLE PERMISSION VIEW
  // ============================================================
  function openRolePermissions(id) {
    const role = roles.find(r => r.id === id);
    if (!role) return;
    currentRoleId = id;
    document.getElementById('roleNameDisplay').textContent = role.name;
    document.getElementById('drawerTitle').textContent = `Role: ${role.name}`;
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('roleDrawer').classList.add('open');

    let html = `
      <div style="margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap;padding:12px;background:#f8fafc;border-radius:8px;">
        <div><strong>Code:</strong> ${role.code}</div>
        <div><strong>Type:</strong> <span class="status-badge ${role.type}">${role.type}</span></div>
        <div><strong>Status:</strong> <span class="status-badge ${role.status}">${role.status}</span></div>
        <div><strong>Users:</strong> ${role.users ? role.users.length : 0}</div>
        <div><strong>Priority:</strong> ${role.priority}</div>
      </div>
      <div style="margin-bottom:12px;">
        <p style="color:#64748b;font-size:0.85rem;">${role.description || 'No description'}</p>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h4 style="font-weight:700;">Permission Matrix</h4>
        <button class="btn btn-sm btn-outline" onclick="toggleAllPermissions(true)">Select All</button>
        <button class="btn btn-sm btn-outline" onclick="toggleAllPermissions(false)">Deselect All</button>
      </div>
      <div class="permission-grid" id="permissionGrid">
    `;

    MODULES.forEach(module => {
      const perms = role.permissions[module] || {};
      html += `
        <div class="permission-item">
          <span class="module-name">${module}</span>
          <div class="perm-actions">
            ${ACTIONS.map(action => `
              <label>
                <input type="checkbox" class="perm-check" data-module="${module}" data-action="${action}" ${perms[action] ? 'checked' : ''} />
                ${action.slice(0, 3)}
              </label>
            `).join('')}
          </div>
        </div>
      `;
    });

    html += `</div>`;
    document.getElementById('roleDetailContent').innerHTML = html;
  }

  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('roleDrawer').classList.remove('open');
    currentRoleId = null;
  }

  // ============================================================
  //  PERMISSION FUNCTIONS
  // ============================================================
  function toggleAllPermissions(checked) {
    document.querySelectorAll('.perm-check').forEach(cb => cb.checked = checked);
  }

  function savePermissions() {
    const role = roles.find(r => r.id === currentRoleId);
    if (!role) return;

    const checkboxes = document.querySelectorAll('.perm-check');
    const newPermissions = {};
    checkboxes.forEach(cb => {
      const module = cb.dataset.module;
      const action = cb.dataset.action;
      if (!newPermissions[module]) newPermissions[module] = {};
      newPermissions[module][action] = cb.checked;
    });

    role.permissions = newPermissions;
    role.updatedAt = new Date().toISOString();
    closeDrawer();
    renderRoles();
    renderStats();
    alert(`✅ Permissions saved for ${role.name}!\n\nFirebase ready: This will update:\n- Firestore role document\n- Firebase Auth custom claims\n- Security rules mapping`);
  }

  function assignUsers() {
    const role = roles.find(r => r.id === currentRoleId);
    if (!role) return;
    alert(`👤 Assign Users to ${role.name}\n\nFirebase ready: This will open user assignment interface.\n\nCurrent users: ${(role.users || []).join(', ') || 'None'}`);
  }

  // ============================================================
  //  ROLE CRUD
  // ============================================================
  function openAddRole() {
    document.getElementById('addRoleOverlay').classList.add('open');
    document.getElementById('addRoleDrawer').classList.add('open');
    document.getElementById('addRoleForm').reset();

    // Populate clone dropdown
    const cloneSelect = document.getElementById('roleClone');
    cloneSelect.innerHTML = '<option value="">None</option>' +
      roles.filter(r => r.type === 'system').map(r => `<option value="${r.id}">${r.name}</option>`).join('');
  }

  function closeAddRole() {
    document.getElementById('addRoleOverlay').classList.remove('open');
    document.getElementById('addRoleDrawer').classList.remove('open');
  }

  function saveRole(e) {
    e.preventDefault();
    const cloneId = document.getElementById('roleClone').value;
    let permissions = {};

    if (cloneId) {
      const cloneRole = roles.find(r => r.id === cloneId);
      if (cloneRole) {
        permissions = JSON.parse(JSON.stringify(cloneRole.permissions || {}));
      }
    } else {
      // Default permissions: View only for all modules
      MODULES.forEach(m => {
        permissions[m] = {};
        ACTIONS.forEach(a => {
          permissions[m][a] = a === 'View';
        });
      });
    }

    const newRole = new Role({
      name: document.getElementById('roleName').value,
      code: document.getElementById('roleCode').value.toUpperCase(),
      description: document.getElementById('roleDesc').value,
      priority: parseInt(document.getElementById('rolePriority').value) || 0,
      status: document.getElementById('roleStatus').value,
      type: 'custom',
      permissions: permissions,
      users: []
    });

    roles.push(newRole);
    closeAddRole();
    renderRoles();
    renderStats();
    alert(`✅ Role ${newRole.name} created successfully!\n\nFirebase ready: This will create:\n- Firestore role document\n- Permission set ready for assignment`);
  }

  function editRole(id) {
    const role = roles.find(r => r.id === id);
    if (!role) return;
    alert(`✏️ Edit Role: ${role.name}\n\nFirebase ready: This will open edit form with all fields pre-filled.`);
  }

  function toggleRole(id) {
    const role = roles.find(r => r.id === id);
    if (!role) return;
    role.status = role.status === 'active' ? 'inactive' : 'active';
    role.updatedAt = new Date().toISOString();
    renderRoles();
    renderStats();
  }

  // ============================================================
  //  INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    renderSidebar();
    renderRoles();
    renderStats();

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeDrawer(); closeAddRole(); }
    });
  });
</script>
  <script src="js/kfk-core.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>KFK · Order Management</title>
  <meta name="description" content="Master Order Management System for KFK Platform" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f6fa;
      color: #0b1a2b;
      line-height: 1.5;
      overflow-x: hidden;
      display: flex;
      min-height: 100vh;
    }
    :root {
      --primary: #0f2b45;
      --accent: #d45c2f;
      --sidebar-width: 260px;
      --sidebar-collapsed: 72px;
      --header-height: 64px;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(0,0,0,0.04);
      --radius: 16px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border);
      z-index: 100;
      transition: width var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 2px 0 12px rgba(0,0,0,0.02);
    }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      height: var(--header-height);
      flex-shrink: 0;
    }
    .sidebar-brand i { font-size: 1.6rem; color: var(--accent); }
    .sidebar-brand span { font-weight: 800; font-size: 1.3rem; color: var(--primary); white-space: nowrap; }
    .sidebar.collapsed .sidebar-brand span { display: none; }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 20px;
    }
    .sidebar-nav .nav-section { margin-bottom: 8px; }
    .sidebar-nav .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      padding: 8px 20px 4px;
      font-weight: 700;
    }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      color: #334155;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.15s;
      border-left: 3px solid transparent;
      white-space: nowrap;
    }
    .sidebar-nav a:hover { background: #f1f5f9; color: var(--primary); }
    .sidebar-nav a.active {
      background: #eef2ff;
      color: var(--primary);
      border-left-color: var(--accent);
    }
    .sidebar-nav a i { width: 22px; text-align: center; font-size: 1rem; color: #64748b; }
    .sidebar-nav a:hover i { color: var(--primary); }
    .sidebar.collapsed .sidebar-nav a span { display: none; }
    .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 12px; }
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .sidebar-footer a {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
    }
    .sidebar-footer a i { width: 22px; }
    .sidebar.collapsed .sidebar-footer a span { display: none; }

    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      transition: margin var(--transition);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

    .topbar {
      height: var(--header-height);
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .toggle-sidebar { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #334155; padding: 4px; }
    .topbar-search {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 40px;
      padding: 4px 16px;
      gap: 8px;
      min-width: 200px;
    }
    .topbar-search input { border: none; background: transparent; padding: 8px 0; outline: none; font-size: 0.9rem; width: 100%; }
    .topbar-actions { display: flex; align-items: center; gap: 16px; }
    .topbar-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #475569; position: relative; padding: 4px; }
    .topbar-actions .badge-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
    .topbar-actions .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer;
    }

    .content { padding: 24px 28px; flex: 1; }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card .label { font-size: 0.7rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-card .value { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin: 2px 0; }
    .stat-card .change { font-size: 0.7rem; color: #22c55e; }
    .stat-card .change.down { color: #ef4444; }

    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .toolbar-left { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .toolbar-right { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .btn {
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1a3a5a; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: #b84c2a; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: #334155; }
    .btn-outline:hover { background: #f1f5f9; }
    .btn-sm { padding: 5px 14px; font-size: 0.75rem; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-warning:hover { background: #d97706; }

    /* Table */
    .table-wrap {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: auto;
      box-shadow: var(--shadow);
    }
    .table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 1400px; }
    th {
      text-align: left;
      padding: 10px 14px;
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:hover td { background: #f8fafc; }
    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.65rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .status-badge.confirmed { background: #dbeafe; color: #1e40af; }
    .status-badge.preparing { background: #e0e7ff; color: #3730a3; }
    .status-badge.packed { background: #c7d2fe; color: #3730a3; }
    .status-badge.ready { background: #a5b4fc; color: #1e1b4b; }
    .status-badge.delivered { background: #dcfce7; color: #166534; }
    .status-badge.cancelled { background: #fee2e2; color: #991b1b; }
    .status-badge.returned { background: #fce4ec; color: #9a1a3a; }
    .status-badge.refunded { background: #f3e8ff; color: #6d28d9; }
    .status-badge.out-delivery { background: #bfdbfe; color: #1e3a8a; }
    .actions-cell { display: flex; gap: 4px; flex-wrap: wrap; }
    .actions-cell button {
      background: none;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
      color: #64748b;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .actions-cell button:hover { background: #f1f5f9; color: var(--primary); }

    /* Drawer */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      display: none;
      backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: block; }
    .order-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 820px;
      max-width: 94vw;
      height: 100%;
      background: white;
      z-index: 210;
      box-shadow: -8px 0 30px rgba(0,0,0,0.1);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .order-drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background: white;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .drawer-header h2 { font-size: 1.1rem; font-weight: 700; }
    .drawer-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #64748b; }
    .drawer-body { padding: 20px 24px; flex: 1; overflow-y: auto; }
    .drawer-footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
      background: white;
      position: sticky;
      bottom: 0;
      flex-wrap: wrap;
    }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .detail-group { margin-bottom: 12px; }
    .detail-group label { font-weight: 600; font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.3px; display: block; }
    .detail-group .value { font-size: 0.9rem; margin-top: 2px; }
    .timeline-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
    .timeline-item .time { font-size: 0.7rem; color: #94a3b8; min-width: 100px; }
    .timeline-item .status { font-weight: 600; }
    .timeline-item .note { color: #64748b; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,0.2); }
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .sidebar.collapsed ~ .main { margin-left: 0; }
      .detail-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; }
      .topbar-search { min-width: 120px; flex: 1; }
      .content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; align-items: stretch; }
      .order-drawer { width: 100%; max-width: 100%; }
      .drawer-body { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><i class="fas fa-fish"></i><span>KFK Admin</span></div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="/admin-profile.html"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    <a href="/logout.html"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-search"><i class="fas fa-search" style="color:#94a3b8;"></i><input type="text" placeholder="Search orders..." id="globalSearch" onkeyup="filterOrders()" /></div>
    </div>
    <div class="topbar-actions">
      <button><i class="far fa-bell"></i><span class="badge-dot"></span></button>
      <button><i class="far fa-envelope"></i></button>
      <div class="avatar" onclick="location.href='/admin-profile.html'">A</div>
    </div>
  </header>

  <div class="content">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-outline btn-sm"><i class="fas fa-file-export"></i> Export</button>
        <button class="btn btn-outline btn-sm"><i class="fas fa-print"></i> Bulk Print</button>
        <button class="btn btn-outline btn-sm" onclick="refreshOrders()"><i class="fas fa-sync"></i> Refresh</button>
      </div>
      <div class="toolbar-right">
        <select id="filterStatus" onchange="filterOrders()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="preparing">Preparing</option>
          <option value="packed">Packed</option>
          <option value="out-delivery">Out for Delivery</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
          <option value="returned">Returned</option>
          <option value="refunded">Refunded</option>
        </select>
        <select id="filterPayment" onchange="filterOrders()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Payment</option>
          <option value="cod">COD</option>
          <option value="online">Online</option>
        </select>
        <input type="date" id="filterDate" onchange="filterOrders()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;" />
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table id="orderTable">
        <thead>
          <tr>
            <th style="width:30px;"><input type="checkbox" id="selectAll" onchange="toggleAll()" /></th>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Total</th>
            <th>Status</th>
            <th>Payment</th>
            <th>Source</th>
            <th>Date</th>
            <th style="width:100px;">Actions</th>
          </tr>
        </thead>
        <tbody id="orderTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Order Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="order-drawer" id="orderDrawer">
  <div class="drawer-header">
    <h2 id="drawerTitle">Order Details</h2>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
  </div>
  <div class="drawer-body" id="orderDetailContent"></div>
  <div class="drawer-footer" id="orderDetailActions">
    <button class="btn btn-sm btn-outline" onclick="closeDrawer()">Close</button>
    <button class="btn btn-sm btn-primary" onclick="printInvoice()"><i class="fas fa-print"></i> Invoice</button>
    <button class="btn btn-sm btn-success" onclick="updateStatus('delivered')"><i class="fas fa-check"></i> Mark Delivered</button>
    <button class="btn btn-sm btn-warning" onclick="updateStatus('cancelled')"><i class="fas fa-times"></i> Cancel</button>
  </div>
</div>

<script>
  // ============================================================
  //  ORDER MODEL — Firebase Ready
  // ============================================================
  class Order {
    constructor(data = {}) {
      this.id = data.id || 'ORD-' + Date.now().toString().slice(-8);
      this.invoice = data.invoice || 'INV-' + Date.now().toString().slice(-6);
      this.customer = data.customer || { name: '', phone: '', email: '' };
      this.address = data.address || { street: '', city: '', state: '', pincode: '' };
      this.items = data.items || [];
      this.subtotal = data.subtotal || 0;
      this.gst = data.gst || 0;
      this.deliveryCharge = data.deliveryCharge || 0;
      this.discount = data.discount || 0;
      this.coupon = data.coupon || '';
      this.grandTotal = data.grandTotal || 0;
      this.paymentMethod = data.paymentMethod || 'cod';
      this.paymentStatus = data.paymentStatus || 'pending';
      this.orderStatus = data.orderStatus || 'pending';
      this.source = data.source || 'website';
      this.deliveryPartner = data.deliveryPartner || '';
      this.deliveryExecutive = data.deliveryExecutive || '';
      this.trackingNumber = data.trackingNumber || '';
      this.expectedDelivery = data.expectedDelivery || '';
      this.deliveryTime = data.deliveryTime || '';
      this.notes = data.notes || '';
      this.timeline = data.timeline || [{ status: 'pending', time: new Date().toISOString(), note: 'Order created' }];
      this.createdAt = data.createdAt || new Date().toISOString();
      this.updatedAt = new Date().toISOString();
    }
  }

  // ============================================================
  //  SAMPLE DATA
  // ============================================================
  let orders = [

      ]

    new Order({

      timeline: [
        { status: 'pending', time: '2026-06-28 09:15', note: 'Order created' },
        { status: 'confirmed', time: '2026-06-28 09:45', note: 'Order confirmed' },
        { status: 'packed', time: '2026-06-28 10:30', note: 'Packed' },
        { status: 'out-delivery', time: '2026-06-28 11:15', note: 'Out for delivery' }
      ]
    }),
    new Order({
      id: 'ORD-1003',
      customer: { name: 'Ananya Reddy', phone: '7654321098', email: 'ananya@example.com' },

        { status: 'delivered', time: '2026-06-27 11:00', note: 'Delivered successfully' }
      ]
    }),
    new Order({
      id: 'ORD-1004',
      customer: { name: 'Vikram Singh', phone: '6543210987', email: 'vikram@example.com' },

  let currentOrderId = null;

  // ============================================================
  //  SIDEBAR NAVIGATION
  // ============================================================
  const SIDEBAR_NAV = [
    { section: 'Main', items: [
      { label: 'Dashboard', icon: 'fa-th-large', link: '/admin.html' },
      { label: 'Products', icon: 'fa-box', link: '/admin-products.html' },
      { label: 'Categories', icon: 'fa-tags', link: '/admin-categories.html' },
      { label: 'Orders', icon: 'fa-shopping-cart', link: '/admin-orders.html', active: true },
      { label: 'Customers', icon: 'fa-users', link: '/admin-customers.html' },
    ]},
    { section: 'Content', items: [
      { label: 'Homepage Manager', icon: 'fa-home', link: '/admin-homepage.html' },
      { label: 'Marketplace Manager', icon: 'fa-store', link: '/admin-marketplace.html' },
      { label: 'Inventory', icon: 'fa-warehouse', link: '/admin-inventory.html' },
      { label: 'Offers', icon: 'fa-tag', link: '/admin-offers.html' },
      { label: 'Recipes', icon: 'fa-utensils', link: '/admin-recipes.html' },
    ]},
    { section: 'Business', items: [
      { label: 'Franchise', icon: 'fa-store-alt', link: '/admin-franchise.html' },
      { label: 'CRM', icon: 'fa-address-card', link: '/admin-crm.html' },
      { label: 'Reports', icon: 'fa-chart-bar', link: '/admin-reports.html' },
      { label: 'Settings', icon: 'fa-cog', link: '/admin-settings.html' },
    ]}
  ];

  function renderSidebar() {
    const container = document.getElementById('sidebarNav');
    container.innerHTML = SIDEBAR_NAV.map(section => `
      <div class="nav-section">
        <div class="nav-label">${section.section}</div>
        ${section.items.map(item => `
          <a href="${item.link}" class="${item.active ? 'active' : ''}">
            <i class="fas ${item.icon}"></i><span>${item.label}</span>
          </a>
        `).join('')}
      </div>
    `).join('');
  }

  // ============================================================
  //  SIDEBAR TOGGLE
  // ============================================================
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (window.innerWidth <= 1024) { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
    else { sidebar.classList.toggle('collapsed'); }
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  // ============================================================
  //  STATS
  // ============================================================
  function renderStats() {
    const total = orders.length;
    const pending = orders.filter(o => o.orderStatus === 'pending').length;
    const delivered = orders.filter(o => o.orderStatus === 'delivered').length;
    const cancelled = orders.filter(o => o.orderStatus === 'cancelled').length;
    const revenue = orders.filter(o => o.orderStatus === 'delivered').reduce((sum, o) => sum + o.grandTotal, 0);
    const today = new Date().toDateString();
    const todayOrders = orders.filter(o => new Date(o.createdAt).toDateString() === today).length;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="label">Today's Orders</div><div class="value">${todayOrders}</div></div>
      <div class="stat-card"><div class="label">Pending</div><div class="value">${pending}</div></div>
      <div class="stat-card"><div class="label">Delivered</div><div class="value">${delivered}</div></div>
      <div class="stat-card"><div class="label">Cancelled</div><div class="value">${cancelled}</div></div>
      <div class="stat-card"><div class="label">Total Orders</div><div class="value">${total}</div></div>
      <div class="stat-card"><div class="label">Revenue</div><div class="value">₹${revenue.toLocaleString()}</div></div>
    `;
  }

  // ============================================================
  //  ORDER TABLE
  // ============================================================
  function renderOrders(data = orders) {
    const tbody = document.getElementById('orderTableBody');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:#94a3b8;">No orders found</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(o => `
      <tr onclick="viewOrder('${o.id}')" style="cursor:pointer;">
        <td onclick="event.stopPropagation();"><input type="checkbox" class="order-checkbox" value="${o.id}" /></td>
        <td><strong>${o.id}</strong><br /><span style="font-size:0.7rem;color:#94a3b8;">${o.invoice}</span></td>
        <td>${o.customer.name}<br /><span style="font-size:0.7rem;color:#94a3b8;">${o.customer.phone}</span></td>
        <td>${o.items.reduce((sum, i) => sum + i.qty, 0)} items</td>
        <td>₹${o.grandTotal}</td>
        <td><span class="status-badge ${o.orderStatus}">${o.orderStatus}</span></td>
        <td><span class="status-badge ${o.paymentStatus === 'paid' ? 'delivered' : 'pending'}">${o.paymentStatus}</span></td>
        <td>${o.source}</td>
        <td style="font-size:0.75rem;">${new Date(o.createdAt).toLocaleDateString()}</td>
        <td onclick="event.stopPropagation();" class="actions-cell">
          <button onclick="viewOrder('${o.id}')" title="View"><i class="fas fa-eye"></i></button>
          <button onclick="printInvoice('${o.id}')" title="Invoice"><i class="fas fa-print"></i></button>
          <button onclick="updateStatus('${o.id}','cancelled')" title="Cancel" class="btn-danger"><i class="fas fa-times"></i></button>
        </td>
      </tr>
    `).join('');
  }

  // ============================================================
  //  FILTERS
  // ============================================================
  function filterOrders() {
    const search = document.getElementById('globalSearch').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const payment = document.getElementById('filterPayment').value;
    const date = document.getElementById('filterDate').value;

    let filtered = orders.filter(o => {
      const matchSearch = o.id.toLowerCase().includes(search) ||
                          o.customer.name.toLowerCase().includes(search) ||
                          o.customer.phone.includes(search);
      const matchStatus = !status || o.orderStatus === status;
      const matchPayment = !payment || (payment === 'cod' ? o.paymentMethod === 'cod' : o.paymentMethod !== 'cod');
      const matchDate = !date || new Date(o.createdAt).toISOString().slice(0, 10) === date;
      return matchSearch && matchStatus && matchPayment && matchDate;
    });
    renderOrders(filtered);
  }

  function refreshOrders() {
    document.getElementById('globalSearch').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterPayment').value = '';
    document.getElementById('filterDate').value = '';
    renderOrders(orders);
  }

  // ============================================================
  //  ORDER DETAIL VIEW
  // ============================================================
  function viewOrder(id) {
    const order = orders.find(o => o.id === id);
    if (!order) return;
    currentOrderId = id;
    document.getElementById('drawerTitle').textContent = `Order ${order.id}`;
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('orderDrawer').classList.add('open');

    const itemsHtml = order.items.map(item => `
      <tr>
        <td>${item.name}</td>
        <td>${item.qty}</td>
        <td>${item.weight || '—'}</td>
        <td>₹${item.price}</td>
        <td>₹${item.price * item.qty}</td>
      </tr>
    `).join('');

    const timelineHtml = order.timeline.map(t => `
      <div class="timeline-item">
        <div class="time">${t.time}</div>
        <div><span class="status-badge ${t.status}">${t.status}</span></div>
        <div class="note">${t.note || ''}</div>
      </div>
    `).join('');

    document.getElementById('orderDetailContent').innerHTML = `
      <div class="detail-grid">
        <div class="detail-group">
          <label>Customer</label>
          <div class="value"><strong>${order.customer.name}</strong></div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">📞 ${order.customer.phone}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">✉️ ${order.customer.email}</div>
        </div>
        <div class="detail-group">
          <label>Order Info</label>
          <div class="value"><strong>${order.id}</strong></div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">Invoice: ${order.invoice}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">Source: ${order.source}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">Date: ${new Date(order.createdAt).toLocaleString()}</div>
        </div>
        <div class="detail-group">
          <label>Delivery Address</label>
          <div class="value">${order.address.street}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">${order.address.city}, ${order.address.state} - ${order.address.pincode}</div>
        </div>
        <div class="detail-group">
          <label>Delivery Partner</label>
          <div class="value">${order.deliveryPartner || 'Not assigned'}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">Executive: ${order.deliveryExecutive || '—'}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">Tracking: ${order.trackingNumber || '—'}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">Expected: ${order.expectedDelivery || '—'}</div>
        </div>
      </div>

      <div style="margin:16px 0;">
        <h4 style="font-size:0.9rem;font-weight:700;margin-bottom:8px;">Order Items</h4>
        <table style="width:100%;font-size:0.8rem;border-collapse:collapse;">
          <thead><tr style="background:#f8fafc;"><th>Product</th><th>Qty</th><th>Weight</th><th>Price</th><th>Total</th></tr></thead>
          <tbody>${itemsHtml}</tbody>
          <tfoot>
            <tr><td colspan="4" style="text-align:right;font-weight:600;">Subtotal</td><td>₹${order.subtotal}</td></tr>
            <tr><td colspan="4" style="text-align:right;font-weight:600;">GST</td><td>₹${order.gst}</td></tr>
            <tr><td colspan="4" style="text-align:right;font-weight:600;">Delivery</td><td>₹${order.deliveryCharge}</td></tr>
            ${order.discount ? `<tr><td colspan="4" style="text-align:right;font-weight:600;">Discount</td><td>-₹${order.discount}</td></tr>` : ''}
            <tr><td colspan="4" style="text-align:right;font-weight:700;font-size:1rem;">Grand Total</td><td><strong>₹${order.grandTotal}</strong></td></tr>
          </tfoot>
        </table>
      </div>

      <div style="margin:16px 0;">
        <h4 style="font-size:0.9rem;font-weight:700;margin-bottom:8px;">Payment</h4>
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
          <span><strong>Method:</strong> ${order.paymentMethod}</span>
          <span><strong>Status:</strong> <span class="status-badge ${order.paymentStatus}">${order.paymentStatus}</span></span>
        </div>
      </div>

      <div style="margin:16px 0;">
        <h4 style="font-size:0.9rem;font-weight:700;margin-bottom:8px;">Order Timeline</h4>
        ${timelineHtml || '<p style="color:#94a3b8;">No timeline available</p>'}
      </div>

      ${order.notes ? `<div style="margin:16px 0;"><h4 style="font-size:0.9rem;font-weight:700;margin-bottom:8px;">Notes</h4><p style="font-size:0.85rem;color:#475569;">${order.notes}</p></div>` : ''}
    `;
  }

  // ============================================================
  //  ORDER ACTIONS
  // ============================================================
  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('orderDrawer').classList.remove('open');
    currentOrderId = null;
  }

  function printInvoice(id) {
    const order = orders.find(o => o.id === (id || currentOrderId));
    if (!order) return;
    alert(`Printing invoice for ${order.id}\n\nFirebase ready: This will generate PDF invoice.\n\nTotal: ₹${order.grandTotal}`);
  }

  function updateStatus(id, status) {
    const order = orders.find(o => o.id === (id || currentOrderId));
    if (!order) return;
    if (status === 'cancelled' && !confirm('Cancel this order?')) return;
    order.orderStatus = status;
    order.timeline.push({
      status: status,
      time: new Date().toLocaleString(),
      note: `Status updated to ${status}`
    });
    order.updatedAt = new Date().toISOString();
    renderOrders();
    renderStats();
    if (currentOrderId) viewOrder(currentOrderId);
    alert(`Order ${order.id} status updated to ${status}`);
  }

  function toggleAll() {
    const checked = document.getElementById('selectAll').checked;
    document.querySelectorAll('.order-checkbox').forEach(cb => cb.checked = checked);
  }

  // ============================================================
  //  INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    renderSidebar();
    renderOrders();
    renderStats();

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDrawer();
    });
  });
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>KFK · Platform Integrations</title>
  <meta name="description" content="Master Platform Integrations Center for KFK" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f6fa;
      color: #0b1a2b;
      line-height: 1.5;
      overflow-x: hidden;
      display: flex;
      min-height: 100vh;
    }
    :root {
      --primary: #0f2b45;
      --accent: #d45c2f;
      --sidebar-width: 260px;
      --sidebar-collapsed: 72px;
      --header-height: 64px;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(0,0,0,0.04);
      --radius: 16px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border);
      z-index: 100;
      transition: width var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 2px 0 12px rgba(0,0,0,0.02);
    }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      height: var(--header-height);
      flex-shrink: 0;
    }
    .sidebar-brand i { font-size: 1.6rem; color: var(--accent); }
    .sidebar-brand span { font-weight: 800; font-size: 1.3rem; color: var(--primary); white-space: nowrap; }
    .sidebar.collapsed .sidebar-brand span { display: none; }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 20px;
    }
    .sidebar-nav .nav-section { margin-bottom: 8px; }
    .sidebar-nav .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      padding: 8px 20px 4px;
      font-weight: 700;
    }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      color: #334155;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.15s;
      border-left: 3px solid transparent;
      white-space: nowrap;
    }
    .sidebar-nav a:hover { background: #f1f5f9; color: var(--primary); }
    .sidebar-nav a.active {
      background: #eef2ff;
      color: var(--primary);
      border-left-color: var(--accent);
    }
    .sidebar-nav a i { width: 22px; text-align: center; font-size: 1rem; color: #64748b; }
    .sidebar-nav a:hover i { color: var(--primary); }
    .sidebar.collapsed .sidebar-nav a span { display: none; }
    .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 12px; }
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .sidebar-footer a {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
    }
    .sidebar-footer a i { width: 22px; }
    .sidebar.collapsed .sidebar-footer a span { display: none; }

    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      transition: margin var(--transition);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

    .topbar {
      height: var(--header-height);
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .toggle-sidebar { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #334155; padding: 4px; }
    .topbar-search {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 40px;
      padding: 4px 16px;
      gap: 8px;
      min-width: 200px;
    }
    .topbar-search input { border: none; background: transparent; padding: 8px 0; outline: none; font-size: 0.9rem; width: 100%; }
    .topbar-actions { display: flex; align-items: center; gap: 16px; }
    .topbar-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #475569; position: relative; padding: 4px; }
    .topbar-actions .badge-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
    .topbar-actions .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer;
    }

    .content { padding: 24px 28px; flex: 1; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 10px 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card .label { font-size: 0.55rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-card .value { font-size: 1rem; font-weight: 700; color: var(--primary); margin: 2px 0; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .toolbar-left { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .toolbar-right { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .btn {
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1a3a5a; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: #b84c2a; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: #334155; }
    .btn-outline:hover { background: #f1f5f9; }
    .btn-sm { padding: 5px 14px; font-size: 0.75rem; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }

    .integration-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .integration-card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 20px;
      transition: 0.15s;
    }
    .integration-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.06); }
    .integration-card .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }
    .integration-card .card-logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: var(--primary);
      flex-shrink: 0;
    }
    .integration-card .card-title { font-weight: 700; font-size: 1rem; }
    .integration-card .card-subtitle { font-size: 0.75rem; color: #64748b; }
    .integration-card .card-status { display: flex; align-items: center; gap: 6px; margin: 8px 0; }
    .integration-card .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .integration-card .card-actions .btn { font-size: 0.75rem; padding: 4px 14px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #94a3b8; }
    .status-dot.pending { background: #f59e0b; }
    .status-dot.attention { background: #ef4444; }

    .tabs {
      display: flex;
      gap: 4px;
      background: white;
      padding: 4px 6px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tabs button {
      padding: 8px 18px;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      background: transparent;
      color: #64748b;
      transition: 0.15s;
    }
    .tabs button:hover { background: #f1f5f9; color: var(--primary); }
    .tabs button.active { background: var(--primary); color: white; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,0.2); }
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .sidebar.collapsed ~ .main { margin-left: 0; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .integration-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    }
    @media (max-width: 640px) {
      .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; }
      .topbar-search { min-width: 120px; flex: 1; }
      .content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; align-items: stretch; }
      .tabs button { padding: 6px 12px; font-size: 0.7rem; }
      .integration-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><i class="fas fa-fish"></i><span>KFK Admin</span></div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="/admin-profile.html"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    <a href="/logout.html"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-search"><i class="fas fa-search" style="color:#94a3b8;"></i><input type="text" placeholder="Search integrations..." id="globalSearch" onkeyup="filterIntegrations()" /></div>
    </div>
    <div class="topbar-actions">
      <button><i class="far fa-bell"></i><span class="badge-dot"></span></button>
      <button><i class="far fa-envelope"></i></button>
      <div class="avatar" onclick="location.href='/admin-profile.html'">A</div>
    </div>
  </header>

  <div class="content">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-accent" onclick="syncAll()"><i class="fas fa-sync"></i> Sync All</button>
        <button class="btn btn-outline btn-sm"><i class="fas fa-file-export"></i> Export</button>
        <button class="btn btn-outline btn-sm" onclick="refreshIntegrations()"><i class="fas fa-sync"></i> Refresh</button>
      </div>
      <div class="toolbar-right">
        <select id="filterStatus" onchange="filterIntegrations()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Status</option>
          <option value="connected">Connected</option>
          <option value="disconnected">Disconnected</option>
          <option value="pending">Pending Setup</option>
          <option value="attention">Needs Attention</option>
        </select>
        <select id="filterCategory" onchange="filterIntegrations()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Categories</option>
          <option value="payment">Payment</option>
          <option value="shipping">Shipping</option>
          <option value="marketing">Marketing</option>
          <option value="analytics">Analytics</option>
          <option value="communication">Communication</option>
          <option value="storage">Cloud Storage</option>
          <option value="social">Social Media</option>
        </select>
      </div>
    </div>

    <div class="tabs" id="categoryTabs">
      <button class="active" data-tab="all">All</button>
      <button data-tab="payment">Payment</button>
      <button data-tab="shipping">Shipping</button>
      <button data-tab="marketing">Marketing</button>
      <button data-tab="analytics">Analytics</button>
      <button data-tab="communication">Communication</button>
      <button data-tab="storage">Cloud Storage</button>
    </div>

    <div class="integration-grid" id="integrationGrid"></div>
  </div>
</div>

<script>
  // ============================================================
  //  INTEGRATION MODEL — Firebase Ready
  // ============================================================
  class Integration {
    constructor(data = {}) {
      this.id = data.id || 'INT-' + Date.now().toString().slice(-8);
      this.name = data.name || '';
      this.provider = data.provider || '';
      this.category = data.category || 'other';
      this.icon = data.icon || 'fa-plug';
      this.description = data.description || '';
      this.status = data.status || 'disconnected';
      this.health = data.health || 'unknown';
      this.isSyncEnabled = data.isSyncEnabled || false;
      this.lastSync = data.lastSync || '';
      this.nextSync = data.nextSync || '';
      this.syncErrors = data.syncErrors || [];
      this.history = data.history || [];
      this.createdAt = data.createdAt || new Date().toISOString();
      this.updatedAt = new Date().toISOString();
    }
  }

  // ============================================================
  //  SAMPLE DATA
  // ============================================================
  let integrations = [
    new Integration({
      id: 'INT-1001', name: 'Firebase', provider: 'Google',
      category: 'storage', icon: 'fa-fire',
      description: 'Cloud Firestore database, authentication, and realtime sync',
      status: 'connected', health: 'healthy',
      isSyncEnabled: true, lastSync: '2026-06-28 12:30:00'
    }),
    new Integration({
      id: 'INT-1002', name: 'Razorpay', provider: 'Razorpay Inc.',
      category: 'payment', icon: 'fa-credit-card',
      description: 'Online payment gateway with support for cards, UPI, and netbanking',
      status: 'connected', health: 'healthy',
      isSyncEnabled: true, lastSync: '2026-06-28 12:15:00'
    }),
    new Integration({
      id: 'INT-1003', name: 'Shiprocket', provider: 'Shiprocket',
      category: 'shipping', icon: 'fa-truck',
      description: 'Order fulfillment, shipping label generation, and tracking',
      status: 'connected', health: 'warning',
      isSyncEnabled: true, lastSync: '2026-06-28 11:45:00'
    }),
    new Integration({
      id: 'INT-1004', name: 'WhatsApp Business', provider: 'Meta',
      category: 'communication', icon: 'fa-whatsapp',
      description: 'WhatsApp Business API for customer communication and notifications',
      status: 'connected', health: 'healthy',
      isSyncEnabled: true, lastSync: '2026-06-28 12:00:00'
    }),
    new Integration({
      id: 'INT-1005', name: 'PhonePe', provider: 'PhonePe',
      category: 'payment', icon: 'fa-mobile-alt',
      description: 'UPI payment gateway for seamless mobile payments',
      status: 'pending', health: 'unknown',
      isSyncEnabled: false, lastSync: ''
    }),
    new Integration({
      id: 'INT-1006', name: 'Google Analytics', provider: 'Google',
      category: 'analytics', icon: 'fa-chart-line',
      description: 'Website analytics and user behavior tracking',
      status: 'connected', health: 'healthy',
      isSyncEnabled: true, lastSync: '2026-06-28 12:30:00'
    }),
    new Integration({
      id: 'INT-1007', name: 'Meta Pixel', provider: 'Meta',
      category: 'marketing', icon: 'fa-facebook',
      description: 'Facebook and Instagram ad conversion tracking',
      status: 'connected', health: 'healthy',
      isSyncEnabled: true, lastSync: '2026-06-28 12:10:00'
    }),
    new Integration({
      id: 'INT-1008', name: 'Google Drive', provider: 'Google',
      category: 'storage', icon: 'fa-cloud',
      description: 'Cloud storage for backups and file management',
      status: 'disconnected', health: 'unhealthy',
      isSyncEnabled: false, lastSync: '2026-06-20 09:00:00'
    }),
    new Integration({
      id: 'INT-1009', name: 'MSG91', provider: 'MSG91',
      category: 'communication', icon: 'fa-sms',
      description: 'SMS gateway for OTP, notifications, and alerts',
      status: 'connected', health: 'healthy',
      isSyncEnabled: true, lastSync: '2026-06-28 12:20:00'
    }),
    new Integration({
      id: 'INT-1010', name: 'Google Maps', provider: 'Google',
      category: 'shipping', icon: 'fa-map-marker-alt',
      description: 'Location services, geocoding, and distance calculations',
      status: 'connected', health: 'healthy',
      isSyncEnabled: true, lastSync: '2026-06-28 12:30:00'
    }),
    new Integration({
      id: 'INT-1011', name: 'Delhivery', provider: 'Delhivery',
      category: 'shipping', icon: 'fa-box',
      description: 'Logistics and last-mile delivery tracking',
      status: 'pending', health: 'unknown',
      isSyncEnabled: false, lastSync: ''
    }),
    new Integration({
      id: 'INT-1012', name: 'Instagram', provider: 'Meta',
      category: 'social', icon: 'fa-instagram',
      description: 'Social media integration for sharing and advertising',
      status: 'disconnected', health: 'unhealthy',
      isSyncEnabled: false, lastSync: '2026-06-15 10:00:00'
    })
  ];

  // ============================================================
  //  SIDEBAR NAVIGATION
  // ============================================================
  const SIDEBAR_NAV = [
    { section: 'Main', items: [
      { label: 'Dashboard', icon: 'fa-th-large', link: '/admin.html' },
      { label: 'Products', icon: 'fa-box', link: '/admin-products.html' },
      { label: 'Categories', icon: 'fa-tags', link: '/admin-categories.html' },
      { label: 'Orders', icon: 'fa-shopping-cart', link: '/admin-orders.html' },
      { label: 'Customers', icon: 'fa-users', link: '/admin-customers.html' },
      { label: 'Inventory', icon: 'fa-warehouse', link: '/admin-inventory.html' },
      { label: 'CRM', icon: 'fa-address-card', link: '/admin-crm.html' },
      { label: 'Franchise', icon: 'fa-store-alt', link: '/admin-franchise.html' },
      { label: 'Reports', icon: 'fa-chart-bar', link: '/admin-reports.html' },
      { label: 'Analytics', icon: 'fa-chart-pie', link: '/admin-analytics.html' },
      { label: 'Settings', icon: 'fa-cog', link: '/admin-settings.html' },
      { label: 'Users', icon: 'fa-users-cog', link: '/admin-users.html' },
      { label: 'Roles', icon: 'fa-lock', link: '/admin-roles.html' },
      { label: 'Notifications', icon: 'fa-bell', link: '/admin-notifications.html' },
      { label: 'Support', icon: 'fa-headset', link: '/admin-support.html' },
      { label: 'System Logs', icon: 'fa-clipboard-list', link: '/admin-system-logs.html' },
      { label: 'API Manager', icon: 'fa-plug', link: '/admin-api-manager.html' },
      { label: 'Integrations', icon: 'fa-puzzle-piece', link: '/admin-integrations.html', active: true },
    ]}
  ];

  function renderSidebar() {
    const container = document.getElementById('sidebarNav');
    container.innerHTML = SIDEBAR_NAV.map(section => `
      <div class="nav-section">
        <div class="nav-label">${section.section}</div>
        ${section.items.map(item => `
          <a href="${item.link}" class="${item.active ? 'active' : ''}">
            <i class="fas ${item.icon}"></i><span>${item.label}</span>
          </a>
        `).join('')}
      </div>
    `).join('');
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (window.innerWidth <= 1024) { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
    else { sidebar.classList.toggle('collapsed'); }
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  // ============================================================
  //  STATS
  // ============================================================
  function renderStats() {
    const total = integrations.length;
    const connected = integrations.filter(i => i.status === 'connected').length;
    const disconnected = integrations.filter(i => i.status === 'disconnected').length;
    const pending = integrations.filter(i => i.status === 'pending').length;
    const attention = integrations.filter(i => i.status === 'attention' || i.health === 'warning').length;
    const syncEnabled = integrations.filter(i => i.isSyncEnabled).length;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="label">Connected</div><div class="value" style="color:#22c55e;">${connected}</div></div>
      <div class="stat-card"><div class="label">Disconnected</div><div class="value" style="color:#94a3b8;">${disconnected}</div></div>
      <div class="stat-card"><div class="label">Pending Setup</div><div class="value" style="color:#f59e0b;">${pending}</div></div>
      <div class="stat-card"><div class="label">Needs Attention</div><div class="value" style="color:#ef4444;">${attention}</div></div>
      <div class="stat-card"><div class="label">Sync Enabled</div><div class="value" style="color:#3b82f6;">${syncEnabled}</div></div>
      <div class="stat-card"><div class="label">Total Integrations</div><div class="value">${total}</div></div>
    `;
  }

  // ============================================================
  //  RENDER INTEGRATION GRID
  // ============================================================
  function renderIntegrations(data = integrations) {
    const container = document.getElementById('integrationGrid');
    if (data.length === 0) {
      container.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#94a3b8;">No integrations found</div>`;
      return;
    }
    container.innerHTML = data.map(i => `
      <div class="integration-card">
        <div class="card-header">
          <div class="card-logo"><i class="fas ${i.icon}"></i></div>
          <div>
            <div class="card-title">${i.name}</div>
            <div class="card-subtitle">${i.provider}</div>
          </div>
        </div>
        <div style="font-size:0.8rem;color:#475569;min-height:40px;">${i.description}</div>
        <div class="card-status">
          <span class="status-dot ${i.status}"></span>
          <span style="font-size:0.8rem;font-weight:600;">${i.status.charAt(0).toUpperCase() + i.status.slice(1)}</span>
          ${i.lastSync ? `<span style="font-size:0.7rem;color:#94a3b8;margin-left:8px;">Last sync: ${i.lastSync}</span>` : ''}
          ${i.health === 'warning' ? `<span style="font-size:0.7rem;color:#f59e0b;margin-left:8px;">⚠️ Warning</span>` : ''}
        </div>
        <div class="card-actions">
          ${i.status === 'connected' ? `
            <button class="btn btn-sm btn-primary" onclick="configureIntegration('${i.id}')"><i class="fas fa-cog"></i> Configure</button>
            <button class="btn btn-sm btn-success" onclick="syncIntegration('${i.id}')"><i class="fas fa-sync"></i> Sync</button>
            <button class="btn btn-sm btn-danger" onclick="disconnectIntegration('${i.id}')"><i class="fas fa-unlink"></i> Disconnect</button>
          ` : i.status === 'pending' ? `
            <button class="btn btn-sm btn-accent" onclick="setupIntegration('${i.id}')"><i class="fas fa-wrench"></i> Setup</button>
          ` : `
            <button class="btn btn-sm btn-primary" onclick="configureIntegration('${i.id}')"><i class="fas fa-plug"></i> Connect</button>
            <button class="btn btn-sm btn-outline" onclick="reconnectIntegration('${i.id}')"><i class="fas fa-redo"></i> Reconnect</button>
          `}
          <button class="btn btn-sm btn-outline" onclick="viewDetails('${i.id}')"><i class="fas fa-info-circle"></i></button>
        </div>
      </div>
    `).join('');
  }

  // ============================================================
  //  FILTERS
  // ============================================================
  function filterIntegrations() {
    const search = document.getElementById('globalSearch').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const category = document.getElementById('filterCategory').value;

    let filtered = integrations.filter(i => {
      const matchSearch = i.name.toLowerCase().includes(search) ||
                          i.provider.toLowerCase().includes(search) ||
                          i.description.toLowerCase().includes(search);
      const matchStatus = !status || i.status === status;
      const matchCategory = !category || i.category === category;
      return matchSearch && matchStatus && matchCategory;
    });
    renderIntegrations(filtered);
  }

  function refreshIntegrations() {
    document.getElementById('globalSearch').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterCategory').value = '';
    renderIntegrations(integrations);
  }

  // ============================================================
  //  INTEGRATION ACTIONS
  // ============================================================
  function configureIntegration(id) {
    const integration = integrations.find(i => i.id === id);
    if (!integration) return;
    alert(`⚙️ Configure ${integration.name}\n\nFirebase ready: This will open configuration panel.\n\nProvider: ${integration.provider}\nCategory: ${integration.category}\n\nFields: API Key, Secret, Webhook URL, Settings`);
  }

  function setupIntegration(id) {
    const integration = integrations.find(i => i.id === id);
    if (!integration) return;
    alert(`🔧 Setup ${integration.name}\n\nFirebase ready: This will open setup wizard with step-by-step instructions.\n\nProvider: ${integration.provider}\n\nSteps: 1. Create account, 2. Generate API keys, 3. Configure webhooks, 4. Test connection`);
  }

  function syncIntegration(id) {
    const integration = integrations.find(i => i.id === id);
    if (!integration) return;
    const now = new Date().toISOString().replace('T', ' ').slice(0, 19);
    integration.lastSync = now;
    integration.isSyncEnabled = true;
    integration.health = 'healthy';
    integration.status = 'connected';
    renderIntegrations();
    renderStats();
    alert(`✅ ${integration.name} synced successfully!\n\nLast sync: ${now}`);
  }

  function syncAll() {
    if (!confirm('Sync all connected integrations?')) return;
    const now = new Date().toISOString().replace('T', ' ').slice(0, 19);
    integrations.forEach(i => {
      if (i.status === 'connected') {
        i.lastSync = now;
        i.isSyncEnabled = true;
      }
    });
    renderIntegrations();
    renderStats();
    alert('✅ All integrations synced successfully!');
  }

  function disconnectIntegration(id) {
    const integration = integrations.find(i => i.id === id);
    if (!integration) return;
    if (!confirm(`Disconnect ${integration.name}?`)) return;
    integration.status = 'disconnected';
    integration.health = 'unknown';
    integration.isSyncEnabled = false;
    renderIntegrations();
    renderStats();
  }

  function reconnectIntegration(id) {
    const integration = integrations.find(i => i.id === id);
    if (!integration) return;
    integration.status = 'connected';
    integration.health = 'healthy';
    integration.isSyncEnabled = true;
    const now = new Date().toISOString().replace('T', ' ').slice(0, 19);
    integration.lastSync = now;
    renderIntegrations();
    renderStats();
    alert(`✅ ${integration.name} reconnected successfully!`);
  }

  function viewDetails(id) {
    const integration = integrations.find(i => i.id === id);
    if (!integration) return;
    alert(`📋 ${integration.name} Details\n\nProvider: ${integration.provider}\nCategory: ${integration.category}\nStatus: ${integration.status}\nHealth: ${integration.health}\nSync Enabled: ${integration.isSyncEnabled}\nLast Sync: ${integration.lastSync || 'Never'}\n\nDescription: ${integration.description}`);
  }

  // ============================================================
  //  TAB SWITCHING
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    renderSidebar();
    renderIntegrations();
    renderStats();

    const tabs = document.querySelectorAll('#categoryTabs button');
    tabs.forEach(btn => {
      btn.addEventListener('click', function() {
        tabs.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.getElementById('filterCategory').value = tab === 'all' ? '' : tab;
        filterIntegrations();
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { /* close any open modals */ }
    });
  });
</script>
  <script src="js/kfk-core.js"></script>

</body>
</html>

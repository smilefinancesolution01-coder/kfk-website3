  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>KFK · Product Management</title>
    <meta name="description" content="Master Product Management System for KFK Platform" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
      /* ===== GLOBAL ===== */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', sans-serif;
        background: #f3f6fa;
        color: #0b1a2b;
        line-height: 1.5;
        overflow-x: hidden;
        display: flex;
        min-height: 100vh;
      }
      :root {
        --primary: #0f2b45;
        --accent: #d45c2f;
        --sidebar-width: 260px;
        --sidebar-collapsed: 72px;
        --header-height: 64px;
        --border: #e2e8f0;
        --shadow: 0 8px 24px rgba(0,0,0,0.04);
        --radius: 16px;
        --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
  
      /* ===== SIDEBAR ===== */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: var(--sidebar-width);
        background: white;
        border-right: 1px solid var(--border);
        z-index: 100;
        transition: width var(--transition), transform var(--transition);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 2px 0 12px rgba(0,0,0,0.02);
      }
      .sidebar.collapsed { width: var(--sidebar-collapsed); }
      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        height: var(--header-height);
        flex-shrink: 0;
      }
      .sidebar-brand i { font-size: 1.6rem; color: var(--accent); }
      .sidebar-brand span { font-weight: 800; font-size: 1.3rem; color: var(--primary); white-space: nowrap; }
      .sidebar.collapsed .sidebar-brand span { display: none; }
      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 12px 0 20px;
      }
      .sidebar-nav .nav-section { margin-bottom: 8px; }
      .sidebar-nav .nav-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #94a3b8;
        padding: 8px 20px 4px;
        font-weight: 700;
      }
      .sidebar.collapsed .nav-label { display: none; }
      .sidebar-nav a {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 20px;
        color: #334155;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        transition: 0.15s;
        border-left: 3px solid transparent;
        white-space: nowrap;
      }
      .sidebar-nav a:hover { background: #f1f5f9; color: var(--primary); }
      .sidebar-nav a.active {
        background: #eef2ff;
        color: var(--primary);
        border-left-color: var(--accent);
      }
      .sidebar-nav a i { width: 22px; text-align: center; font-size: 1rem; color: #64748b; }
      .sidebar-nav a:hover i { color: var(--primary); }
      .sidebar.collapsed .sidebar-nav a span { display: none; }
      .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 12px; }
      .sidebar-footer {
        border-top: 1px solid var(--border);
        padding: 12px 20px;
        flex-shrink: 0;
      }
      .sidebar-footer a {
        display: flex;
        align-items: center;
        gap: 14px;
        color: #64748b;
        text-decoration: none;
        font-weight: 500;
        padding: 6px 0;
      }
      .sidebar-footer a i { width: 22px; }
      .sidebar.collapsed .sidebar-footer a span { display: none; }
  
      /* ===== MAIN ===== */
      .main {
        margin-left: var(--sidebar-width);
        flex: 1;
        transition: margin var(--transition);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }
  
      /* ===== TOPBAR ===== */
      .topbar {
        height: var(--header-height);
        background: white;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        position: sticky;
        top: 0;
        z-index: 50;
        gap: 16px;
        flex-shrink: 0;
      }
      .topbar-left { display: flex; align-items: center; gap: 16px; }
      .toggle-sidebar { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #334155; padding: 4px; }
      .topbar-search {
        display: flex;
        align-items: center;
        background: #f1f5f9;
        border-radius: 40px;
        padding: 4px 16px;
        gap: 8px;
        min-width: 200px;
      }
      .topbar-search input { border: none; background: transparent; padding: 8px 0; outline: none; font-size: 0.9rem; width: 100%; }
      .topbar-actions { display: flex; align-items: center; gap: 16px; }
      .topbar-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #475569; position: relative; padding: 4px; }
      .topbar-actions .badge-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
      .topbar-actions .avatar {
        width: 36px; height: 36px; border-radius: 50%;
        background: var(--primary); color: white;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 0.9rem;
        cursor: pointer;
      }
  
      /* ===== CONTENT ===== */
      .content { padding: 24px 28px; flex: 1; }
  
      /* ===== TOOLBAR ===== */
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        background: white;
        padding: 16px 20px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        margin-bottom: 24px;
      }
      .toolbar-left { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
      .toolbar-right { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
      .btn {
        padding: 8px 18px;
        border-radius: 40px;
        font-weight: 600;
        font-size: 0.85rem;
        border: none;
        cursor: pointer;
        transition: 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .btn-primary { background: var(--primary); color: white; }
      .btn-primary:hover { background: #1a3a5a; }
      .btn-accent { background: var(--accent); color: white; }
      .btn-accent:hover { background: #b84c2a; }
      .btn-outline { background: transparent; border: 1px solid var(--border); color: #334155; }
      .btn-outline:hover { background: #f1f5f9; }
      .btn-sm { padding: 5px 14px; font-size: 0.75rem; }
      .btn-danger { background: #ef4444; color: white; }
      .btn-danger:hover { background: #dc2626; }
      .btn-success { background: #22c55e; color: white; }
      .btn-success:hover { background: #16a34a; }
  
      /* ===== TABLE ===== */
      .table-wrap {
        background: white;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        overflow: auto;
        box-shadow: var(--shadow);
      }
      .table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 1200px; }
      th {
        text-align: left;
        padding: 12px 16px;
        background: #f8fafc;
        font-weight: 600;
        color: #475569;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 10;
        white-space: nowrap;
      }
      td { padding: 10px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
      tr:hover td { background: #f8fafc; }
      .product-thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #eef2f6; }
      .status-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 40px;
        font-size: 0.65rem;
        font-weight: 600;
        white-space: nowrap;
      }
      .status-badge.active { background: #dcfce7; color: #166534; }
      .status-badge.inactive { background: #fee2e2; color: #991b1b; }
      .status-badge.draft { background: #fef3c7; color: #92400e; }
      .status-badge.featured { background: #dbeafe; color: #1e40af; }
      .actions-cell { display: flex; gap: 4px; flex-wrap: wrap; }
      .actions-cell button {
        background: none;
        border: none;
        padding: 4px 8px;
        cursor: pointer;
        color: #64748b;
        border-radius: 4px;
        font-size: 0.8rem;
      }
      .actions-cell button:hover { background: #f1f5f9; color: var(--primary); }
      .actions-cell .edit:hover { color: var(--accent); }
      .actions-cell .delete:hover { color: #ef4444; }
  
      /* ===== DRAWER (Product Form) ===== */
      .drawer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 200;
        display: none;
        backdrop-filter: blur(2px);
      }
      .drawer-overlay.open { display: block; }
      .product-drawer {
        position: fixed;
        top: 0;
        right: 0;
        width: 720px;
        max-width: 92vw;
        height: 100%;
        background: white;
        z-index: 210;
        box-shadow: -8px 0 30px rgba(0,0,0,0.1);
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
        overflow-y: auto;
        padding: 0;
        display: flex;
        flex-direction: column;
      }
      .product-drawer.open { transform: translateX(0); }
      .drawer-header {
        padding: 20px 28px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
        background: white;
        position: sticky;
        top: 0;
        z-index: 5;
      }
      .drawer-header h2 { font-size: 1.2rem; font-weight: 700; }
      .drawer-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #64748b; }
      .drawer-body { padding: 24px 28px; flex: 1; overflow-y: auto; }
      .drawer-footer {
        padding: 16px 28px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        flex-shrink: 0;
        background: white;
        position: sticky;
        bottom: 0;
      }
  
      /* ===== FORM ===== */
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      .form-group { display: flex; flex-direction: column; gap: 4px; }
      .form-group label { font-weight: 600; font-size: 0.8rem; color: #475569; }
      .form-group input, .form-group select, .form-group textarea {
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.85rem;
        font-family: inherit;
        transition: 0.15s;
        background: white;
      }
      .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 3px rgba(15,43,69,0.1);
      }
      .form-group textarea { min-height: 60px; resize: vertical; }
      .form-group .full-width { grid-column: 1 / -1; }
      .form-group .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; padding-top: 4px; }
      .form-group .checkbox-group label { font-weight: 400; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  
      /* ===== IMAGE UPLOAD ===== */
      .image-upload-area {
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 24px;
        text-align: center;
        cursor: pointer;
        transition: 0.15s;
        grid-column: 1 / -1;
      }
      .image-upload-area:hover { border-color: var(--primary); background: #f8fafc; }
      .image-upload-area i { font-size: 2rem; color: #94a3b8; }
      .image-upload-area p { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
      .image-preview-grid { display: flex; flex-wrap: wrap; gap: 12px; grid-column: 1 / -1; }
      .image-preview-item {
        width: 80px;
        height: 80px;
        border-radius: 8px;
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
        background: #eef2f6;
      }
      .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
      .image-preview-item .remove-img {
        position: absolute;
        top: 2px;
        right: 2px;
        background: rgba(0,0,0,0.6);
        color: white;
        border: none;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        cursor: pointer;
        font-size: 0.6rem;
      }
  
      /* ===== RESPONSIVE ===== */
      .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,0.2); }
      @media (max-width: 1024px) {
        .sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay.open { display: block; }
        .main { margin-left: 0; }
        .sidebar.collapsed ~ .main { margin-left: 0; }
        .form-grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; }
        .topbar-search { min-width: 120px; flex: 1; }
        .content { padding: 16px; }
        .toolbar { flex-direction: column; align-items: stretch; }
        .toolbar-left, .toolbar-right { flex-wrap: wrap; }
        .product-drawer { width: 100%; max-width: 100%; }
        .drawer-body { padding: 16px; }
      }
    </style>
  </head>
  <body>
  
  <!-- ===== SIDEBAR OVERLAY ===== -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="fas fa-fish"></i><span>KFK Admin</span></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <a href="/admin-profile.html"><i class="fas fa-user-circle"></i><span>Profile</span></a>
      <a href="/logout.html"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
    </div>
  </aside>
  
  <!-- ===== MAIN ===== -->
  <div class="main">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div class="topbar-search"><i class="fas fa-search" style="color:#94a3b8;"></i><input type="text" placeholder="Search products..." id="globalSearch" onkeyup="filterTable()" /></div>
      </div>
      <div class="topbar-actions">
        <button><i class="far fa-bell"></i><span class="badge-dot"></span></button>
        <button><i class="far fa-envelope"></i></button>
        <div class="avatar" onclick="location.href='/admin-profile.html'">A</div>
      </div>
    </header>
  
    <!-- CONTENT -->
    <div class="content">
      <!-- TOOLBAR -->
      <div class="toolbar">
        <div class="toolbar-left">
          <button class="btn btn-accent" onclick="openDrawer()"><i class="fas fa-plus"></i> Add Product</button>
          <button class="btn btn-outline btn-sm"><i class="fas fa-upload"></i> Bulk Upload</button>
          <button class="btn btn-outline btn-sm"><i class="fas fa-file-import"></i> Import</button>
          <button class="btn btn-outline btn-sm"><i class="fas fa-file-export"></i> Export</button>
          <button class="btn btn-outline btn-sm" onclick="refreshTable()"><i class="fas fa-sync"></i> Refresh</button>
        </div>
        <div class="toolbar-right">
          <select id="filterCategory" onchange="filterTable()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
            <option value="">All Categories</option>
          </select>
          <select id="filterStatus" onchange="filterTable()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="draft">Draft</option>
            <option value="inactive">Inactive</option>
          </select>
          <select id="filterStock" onchange="filterTable()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
            <option value="">All Stock</option>
            <option value="in-stock">In Stock</option>
            <option value="low-stock">Low Stock</option>
            <option value="out-of-stock">Out of Stock</option>
          </select>
        </div>
      </div>
  
      <!-- TABLE -->
      <div class="table-wrap">
        <table id="productTable">
          <thead>
            <tr>
              <th style="width:30px;"><input type="checkbox" id="selectAll" onchange="toggleAllCheckboxes()" /></th>
              <th style="width:50px;">Image</th>
              <th>Product</th>
              <th>SKU</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Featured</th>
              <th style="width:120px;">Actions</th>
            </tr>
          </thead>
          <tbody id="productTableBody"></tbody>
        </table>
      </div>
  
      <!-- BULK ACTIONS -->
      <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">
        <button class="btn btn-outline btn-sm" onclick="bulkAction('delete')"><i class="fas fa-trash"></i> Delete</button>
        <button class="btn btn-outline btn-sm" onclick="bulkAction('publish')"><i class="fas fa-check"></i> Publish</button>
        <button class="btn btn-outline btn-sm" onclick="bulkAction('draft')"><i class="fas fa-pen"></i> Draft</button>
        <button class="btn btn-outline btn-sm" onclick="bulkAction('featured')"><i class="fas fa-star"></i> Featured</button>
        <button class="btn btn-outline btn-sm" onclick="bulkAction('trending')"><i class="fas fa-fire"></i> Trending</button>
      </div>
    </div>
  </div>
  
  <!-- ===== PRODUCT DRAWER (Full Screen) ===== -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="product-drawer" id="productDrawer">
    <div class="drawer-header">
      <h2 id="drawerTitle">Add New Product</h2>
      <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
    </div>
    <div class="drawer-body">
      <form id="productForm" onsubmit="saveProduct(event)">
        <div class="form-grid">
          <!-- Basic Info -->
          <div class="form-group full-width"><label>Product Name *</label><input type="text" id="pName" required /></div>
          <div class="form-group"><label>Slug</label><input type="text" id="pSlug" placeholder="auto-generated" /></div>
          <div class="form-group"><label>SKU</label><input type="text" id="pSku" /></div>
          <div class="form-group"><label>Barcode</label><input type="text" id="pBarcode" /></div>
          <div class="form-group"><label>Category *</label><select id="pCategory" required></select></div>
          <div class="form-group"><label>Sub Category</label><select id="pSubCategory"></select></div>
          <div class="form-group"><label>Brand</label><input type="text" id="pBrand" /></div>
          <div class="form-group"><label>Supplier</label><input type="text" id="pSupplier" /></div>
          <div class="form-group"><label>Country of Origin</label><input type="text" id="pOrigin" placeholder="India" /></div>
          <div class="form-group"><label>HSN Code</label><input type="text" id="pHsn" /></div>
          <div class="form-group"><label>GST %</label><input type="number" id="pGst" value="5" step="0.1" /></div>
  
          <!-- Description -->
          <div class="form-group full-width"><label>Short Description</label><textarea id="pShortDesc" rows="2"></textarea></div>
          <div class="form-group full-width"><label>Long Description</label><textarea id="pLongDesc" rows="3"></textarea></div>
  
          <!-- Weight & Dimensions -->
          <div class="form-group"><label>Weight</label><input type="text" id="pWeight" placeholder="500g" /></div>
          <div class="form-group"><label>Gram</label><input type="number" id="pGram" placeholder="500" /></div>
          <div class="form-group"><label>Unit</label><select id="pUnit"><option value="g">g</option><option value="kg">kg</option><option value="lb">lb</option></select></div>
          <div class="form-group"><label>Pieces</label><input type="number" id="pPieces" placeholder="1" /></div>
          <div class="form-group"><label>Serving Size</label><input type="text" id="pServing" placeholder="100g" /></div>
  
          <!-- Pricing -->
          <div class="form-group"><label>MRP (₹)</label><input type="number" id="pMrp" step="0.01" /></div>
          <div class="form-group"><label>Selling Price (₹)</label><input type="number" id="pPrice" step="0.01" /></div>
          <div class="form-group"><label>Offer Price (₹)</label><input type="number" id="pOfferPrice" step="0.01" /></div>
          <div class="form-group"><label>Discount %</label><input type="number" id="pDiscount" step="0.1" /></div>
  
          <!-- Stock -->
          <div class="form-group"><label>Stock *</label><input type="number" id="pStock" required /></div>
          <div class="form-group"><label>Min Stock Alert</label><input type="number" id="pMinStock" value="10" /></div>
          <div class="form-group"><label>Max Order Qty</label><input type="number" id="pMaxOrder" placeholder="Unlimited" /></div>
  
          <!-- Delivery -->
          <div class="form-group"><label>Delivery Time</label><input type="text" id="pDelivery" placeholder="30 min" /></div>
          <div class="form-group"><label>Return Policy</label><input type="text" id="pReturnPolicy" placeholder="7 days" /></div>
          <div class="form-group checkbox-group">
            <label><input type="checkbox" id="pCod" /> COD Available</label>
            <label><input type="checkbox" id="pFreeDelivery" /> Free Delivery</label>
          </div>
  
          <!-- Flags -->
          <div class="form-group full-width">
            <label>Product Flags</label>
            <div class="checkbox-group">
              <label><input type="checkbox" id="pFeatured" /> Featured</label>
              <label><input type="checkbox" id="pTrending" /> Trending</label>
              <label><input type="checkbox" id="pTodayFresh" /> Today's Fresh</label>
              <label><input type="checkbox" id="pReadyCook" /> Ready To Cook</label>
              <label><input type="checkbox" id="pReadyEat" /> Ready To Eat</label>
            </div>
          </div>
  
          <!-- Status -->
          <div class="form-group"><label>Status</label><select id="pStatus"><option value="active">Active</option><option value="draft">Draft</option><option value="inactive">Inactive</option></select></div>
  
          <!-- SEO -->
          <div class="form-group full-width"><label>SEO Title</label><input type="text" id="pSeoTitle" /></div>
          <div class="form-group full-width"><label>SEO Description</label><textarea id="pSeoDesc" rows="2"></textarea></div>
          <div class="form-group full-width"><label>SEO Keywords</label><input type="text" id="pSeoKeywords" /></div>
  
          <!-- Images -->
          <div class="form-group full-width">
            <label>Product Images</label>
            <div class="image-upload-area" onclick="document.getElementById('fileInput').click()">
              <i class="fas fa-cloud-upload-alt"></i>
              <p>Click to upload or drag & drop images</p>
              <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
            </div>
            <div class="image-preview-grid" id="imagePreviewGrid"></div>
          </div>
  
          <!-- Video -->
          <div class="form-group full-width"><label>YouTube URL</label><input type="url" id="pVideoUrl" placeholder="https://youtube.com/watch?v=..." /></div>
        </div>
      </form>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-outline" onclick="closeDrawer()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct(event)"><i class="fas fa-save"></i> Save Product</button>
    </div>
  </div>
  
  <script>
    // ============================================================
    //  PRODUCT MODEL — Firebase Ready
    // ============================================================
    class Product {
      constructor(data = {}) {
        this.id = data.id || 'prod_' + Date.now();
        this.name = data.name || '';
        this.slug = data.slug || '';
        this.sku = data.sku || '';
        this.barcode = data.barcode || '';
        this.category = data.category || '';
        this.subCategory = data.subCategory || '';
        this.brand = data.brand || '';
        this.supplier = data.supplier || '';
        this.origin = data.origin || 'India';
        this.hsn = data.hsn || '';
        this.gst = data.gst || 5;
        this.shortDesc = data.shortDesc || '';
        this.longDesc = data.longDesc || '';
        this.weight = data.weight || '';
        this.gram = data.gram || 0;
        this.unit = data.unit || 'g';
        this.pieces = data.pieces || 1;
        this.serving = data.serving || '';
        this.mrp = data.mrp || 0;
        this.price = data.price || 0;
        this.offerPrice = data.offerPrice || 0;
        this.discount = data.discount || 0;
        this.stock = data.stock || 0;
        this.minStock = data.minStock || 10;
        this.maxOrder = data.maxOrder || 0;
        this.deliveryTime = data.deliveryTime || '30 min';
        this.returnPolicy = data.returnPolicy || '7 days';
        this.cod = data.cod || false;
        this.freeDelivery = data.freeDelivery || false;
        this.featured = data.featured || false;
        this.trending = data.trending || false;
        this.todayFresh = data.todayFresh || false;
        this.readyCook = data.readyCook || false;
        this.readyEat = data.readyEat || false;
        this.status = data.status || 'draft';
        this.seoTitle = data.seoTitle || '';
        this.seoDesc = data.seoDesc || '';
        this.seoKeywords = data.seoKeywords || '';
        this.images = data.images || [];
        this.videoUrl = data.videoUrl || '';
        this.rating = data.rating || 0;
        this.orders = data.orders || 0;
        this.createdAt = data.createdAt || new Date().toISOString();
        this.updatedAt = new Date().toISOString();
      }
      toJSON() { return { ...this }; }
    }
  
    // ============================================================
    //  DATA LAYER — Replace with Firebase later
    // ============================================================
    let products = [
      new Product({ id: 'prod_1', name: 'Bengal Pomfret', sku: 'FISH-001', category: 'Sea Fish', subCategory: 'White Fish', price: 399, mrp: 450, stock: 45, featured: true, trending: true, todayFresh: true, status: 'active', weight: '500g', gram: 500, images: ['https://placecats.com/80/80?random=1'] }),
      new Product({ id: 'prod_2', name: 'Tiger Prawns', sku: 'PRAWN-001', category: 'Prawns', subCategory: 'Premium', price: 549, mrp: 650, stock: 30, featured: true, status: 'active', weight: '1kg', gram: 1000, images: ['https://placecats.com/80/80?random=2'] }),
      new Product({ id: 'prod_3', name: 'Mackerel (Bangda)', sku: 'FISH-002', category: 'Sea Fish', subCategory: 'Oily Fish', price: 249, mrp: 280, stock: 60, trending: true, todayFresh: true, status: 'active', weight: '500g', gram: 500, images: ['https://placecats.com/80/80?random=3'] }),
      new Product({ id: 'prod_4', name: 'Surmai (Kingfish)', sku: 'FISH-003', category: 'Sea Fish', subCategory: 'Premium', price: 799, mrp: 890, stock: 5, featured: true, status: 'active', weight: '600g', gram: 600, images: ['https://placecats.com/80/80?random=4'] }),
      new Product({ id: 'prod_5', name: 'Crab (Mud)', sku: 'CRAB-001', category: 'Crabs', subCategory: 'Mud Crab', price: 499, mrp: 550, stock: 25, status: 'active', weight: '800g', gram: 800, images: ['https://placecats.com/80/80?random=5'] }),
    ];
  
    let editingProductId = null;
    let uploadedImages = [];
  
    // ============================================================
    //  SIDEBAR NAVIGATION
    // ============================================================
    const SIDEBAR_NAV = [
      { section: 'Main', items: [
        { label: 'Dashboard', icon: 'fa-th-large', link: '/admin.html' },
        { label: 'Products', icon: 'fa-box', link: '/admin-products.html', active: true },
        { label: 'Categories', icon: 'fa-tags', link: '/admin-categories.html' },
        { label: 'Orders', icon: 'fa-shopping-cart', link: '/admin-orders.html' },
        { label: 'Customers', icon: 'fa-users', link: '/admin-customers.html' },
      ]},
      { section: 'Content', items: [
        { label: 'Homepage Manager', icon: 'fa-home', link: '/admin-homepage.html' },
        { label: 'Marketplace Manager', icon: 'fa-store', link: '/admin-marketplace.html' },
        { label: 'Inventory', icon: 'fa-warehouse', link: '/admin-inventory.html' },
        { label: 'Offers', icon: 'fa-tag', link: '/admin-offers.html' },
        { label: 'Recipes', icon: 'fa-utensils', link: '/admin-recipes.html' },
      ]},
      { section: 'Business', items: [
        { label: 'Franchise', icon: 'fa-store-alt', link: '/admin-franchise.html' },
        { label: 'CRM', icon: 'fa-address-card', link: '/admin-crm.html' },
        { label: 'Reports', icon: 'fa-chart-bar', link: '/admin-reports.html' },
        { label: 'Settings', icon: 'fa-cog', link: '/admin-settings.html' },
      ]}
    ];
  
    function renderSidebar() {
      const container = document.getElementById('sidebarNav');
      container.innerHTML = SIDEBAR_NAV.map(section => `
        <div class="nav-section">
          <div class="nav-label">${section.section}</div>
          ${section.items.map(item => `
            <a href="${item.link}" class="${item.active ? 'active' : ''}">
              <i class="fas ${item.icon}"></i><span>${item.label}</span>
            </a>
          `).join('')}
        </div>
      `).join('');
    }
  
    // ============================================================
    //  SIDEBAR TOGGLE
    // ============================================================
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (window.innerWidth <= 1024) { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
      else { sidebar.classList.toggle('collapsed'); }
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    }
  
    // ============================================================
    //  PRODUCT TABLE RENDER
    // ============================================================
    function renderTable(data = products) {
      const tbody = document.getElementById('productTableBody');
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:#94a3b8;">No products found</td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(p => `
        <tr>
          <td><input type="checkbox" class="product-checkbox" value="${p.id}" /></td>
          <td><img src="${p.images[0] || 'https://placecats.com/80/80?random=1'}" class="product-thumb" alt="${p.name}" /></td>
          <td><strong>${p.name}</strong><br /><span style="font-size:0.7rem;color:#94a3b8;">${p.sku}</span></td>
          <td>${p.sku}</td>
          <td>${p.category}</td>
          <td>₹${p.offerPrice || p.price}</td>
          <td><span class="${p.stock <= p.minStock ? 'status-badge danger' : ''}">${p.stock}</span></td>
          <td><span class="status-badge ${p.status}">${p.status}</span></td>
          <td>${p.featured ? '⭐' : ''} ${p.trending ? '🔥' : ''}</td>
          <td class="actions-cell">
            <button class="edit" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
            <button class="delete" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
            <button onclick="toggleStatus('${p.id}')"><i class="fas ${p.status === 'active' ? 'fa-eye' : 'fa-eye-slash'}"></i></button>
          </td>
        </tr>
      `).join('');
      document.getElementById('selectAll').checked = false;
    }
  
    // ============================================================
    //  FILTER & SEARCH
    // ============================================================
    function filterTable() {
      const search = document.getElementById('globalSearch').value.toLowerCase();
      const category = document.getElementById('filterCategory').value;
      const status = document.getElementById('filterStatus').value;
      const stock = document.getElementById('filterStock').value;
  
      let filtered = products.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(search) || p.sku.toLowerCase().includes(search);
        const matchCategory = !category || p.category === category;
        const matchStatus = !status || p.status === status;
        let matchStock = true;
        if (stock === 'in-stock') matchStock = p.stock > p.minStock;
        else if (stock === 'low-stock') matchStock = p.stock > 0 && p.stock <= p.minStock;
        else if (stock === 'out-of-stock') matchStock = p.stock === 0;
        return matchSearch && matchCategory && matchStatus && matchStock;
      });
      renderTable(filtered);
    }
  
    function refreshTable() { filterTable(); }
  
    // ============================================================
    //  CRUD OPERATIONS
    // ============================================================
    function openDrawer(product = null) {
      editingProductId = product ? product.id : null;
      document.getElementById('drawerTitle').textContent = product ? 'Edit Product' : 'Add New Product';
      document.getElementById('drawerOverlay').classList.add('open');
      document.getElementById('productDrawer').classList.add('open');
  
      // Populate form
      if (product) {
        document.getElementById('pName').value = product.name || '';
        document.getElementById('pSlug').value = product.slug || '';
        document.getElementById('pSku').value = product.sku || '';
        document.getElementById('pBarcode').value = product.barcode || '';
        document.getElementById('pCategory').value = product.category || '';
        document.getElementById('pSubCategory').value = product.subCategory || '';
        document.getElementById('pBrand').value = product.brand || '';
        document.getElementById('pSupplier').value = product.supplier || '';
        document.getElementById('pOrigin').value = product.origin || 'India';
        document.getElementById('pHsn').value = product.hsn || '';
        document.getElementById('pGst').value = product.gst || 5;
        document.getElementById('pShortDesc').value = product.shortDesc || '';
        document.getElementById('pLongDesc').value = product.longDesc || '';
        document.getElementById('pWeight').value = product.weight || '';
        document.getElementById('pGram').value = product.gram || 0;
        document.getElementById('pUnit').value = product.unit || 'g';
        document.getElementById('pPieces').value = product.pieces || 1;
        document.getElementById('pServing').value = product.serving || '';
        document.getElementById('pMrp').value = product.mrp || 0;
        document.getElementById('pPrice').value = product.price || 0;
        document.getElementById('pOfferPrice').value = product.offerPrice || 0;
        document.getElementById('pDiscount').value = product.discount || 0;
        document.getElementById('pStock').value = product.stock || 0;
        document.getElementById('pMinStock').value = product.minStock || 10;
        document.getElementById('pMaxOrder').value = product.maxOrder || '';
        document.getElementById('pDelivery').value = product.deliveryTime || '30 min';
        document.getElementById('pReturnPolicy').value = product.returnPolicy || '7 days';
        document.getElementById('pCod').checked = product.cod || false;
        document.getElementById('pFreeDelivery').checked = product.freeDelivery || false;
        document.getElementById('pFeatured').checked = product.featured || false;
        document.getElementById('pTrending').checked = product.trending || false;
        document.getElementById('pTodayFresh').checked = product.todayFresh || false;
        document.getElementById('pReadyCook').checked = product.readyCook || false;
        document.getElementById('pReadyEat').checked = product.readyEat || false;
        document.getElementById('pStatus').value = product.status || 'draft';
        document.getElementById('pSeoTitle').value = product.seoTitle || '';
        document.getElementById('pSeoDesc').value = product.seoDesc || '';
        document.getElementById('pSeoKeywords').value = product.seoKeywords || '';
        document.getElementById('pVideoUrl').value = product.videoUrl || '';
        uploadedImages = [...(product.images || [])];
      } else {
        document.getElementById('productForm').reset();
        uploadedImages = [];
        document.getElementById('pStatus').value = 'draft';
        document.getElementById('pGst').value = 5;
        document.getElementById('pUnit').value = 'g';
        document.getElementById('pMinStock').value = 10;
      }
      renderImagePreviews();
    }
  
    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.remove('open');
      document.getElementById('productDrawer').classList.remove('open');
      editingProductId = null;
    }
  
    function saveProduct(e) {
      e.preventDefault();
      const data = {
        name: document.getElementById('pName').value,
        slug: document.getElementById('pSlug').value || document.getElementById('pName').value.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
        sku: document.getElementById('pSku').value,
        barcode: document.getElementById('pBarcode').value,
        category: document.getElementById('pCategory').value,
        subCategory: document.getElementById('pSubCategory').value,
        brand: document.getElementById('pBrand').value,
        supplier: document.getElementById('pSupplier').value,
        origin: document.getElementById('pOrigin').value,
        hsn: document.getElementById('pHsn').value,
        gst: parseFloat(document.getElementById('pGst').value) || 0,
        shortDesc: document.getElementById('pShortDesc').value,
        longDesc: document.getElementById('pLongDesc').value,
        weight: document.getElementById('pWeight').value,
        gram: parseInt(document.getElementById('pGram').value) || 0,
        unit: document.getElementById('pUnit').value,
        pieces: parseInt(document.getElementById('pPieces').value) || 1,
        serving: document.getElementById('pServing').value,
        mrp: parseFloat(document.getElementById('pMrp').value) || 0,
        price: parseFloat(document.getElementById('pPrice').value) || 0,
        offerPrice: parseFloat(document.getElementById('pOfferPrice').value) || 0,
        discount: parseFloat(document.getElementById('pDiscount').value) || 0,
        stock: parseInt(document.getElementById('pStock').value) || 0,
        minStock: parseInt(document.getElementById('pMinStock').value) || 10,
        maxOrder: parseInt(document.getElementById('pMaxOrder').value) || 0,
        deliveryTime: document.getElementById('pDelivery').value,
        returnPolicy: document.getElementById('pReturnPolicy').value,
        cod: document.getElementById('pCod').checked,
        freeDelivery: document.getElementById('pFreeDelivery').checked,
        featured: document.getElementById('pFeatured').checked,
        trending: document.getElementById('pTrending').checked,
        todayFresh: document.getElementById('pTodayFresh').checked,
        readyCook: document.getElementById('pReadyCook').checked,
        readyEat: document.getElementById('pReadyEat').checked,
        status: document.getElementById('pStatus').value,
        seoTitle: document.getElementById('pSeoTitle').value,
        seoDesc: document.getElementById('pSeoDesc').value,
        seoKeywords: document.getElementById('pSeoKeywords').value,
        videoUrl: document.getElementById('pVideoUrl').value,
        images: uploadedImages.length ? uploadedImages : ['https://placecats.com/80/80?random=1'],
      };
  
      if (editingProductId) {
        const index = products.findIndex(p => p.id === editingProductId);
        if (index !== -1) {
          products[index] = new Product({ ...products[index], ...data, updatedAt: new Date().toISOString() });
        }
      } else {
        const newProduct = new Product(data);
        products.push(newProduct);
      }
  
      closeDrawer();
      renderTable();
      populateCategoryFilter();
      alert('Product saved successfully! (Firebase ready)');
    }
  
    function editProduct(id) {
      const product = products.find(p => p.id === id);
      if (product) openDrawer(product);
    }
  
    function deleteProduct(id) {
      if (confirm('Delete this product?')) {
        products = products.filter(p => p.id !== id);
        renderTable();
        populateCategoryFilter();
      }
    }
  
    function toggleStatus(id) {
      const product = products.find(p => p.id === id);
      if (product) {
        product.status = product.status === 'active' ? 'inactive' : 'active';
        renderTable();
      }
    }
  
    // ============================================================
    //  IMAGE HANDLING
    // ============================================================
    function handleImageUpload(e) {
      const files = e.target.files;
      for (const file of files) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          uploadedImages.push(ev.target.result);
          renderImagePreviews();
        };
        reader.readAsDataURL(file);
      }
      e.target.value = '';
    }
  
    function renderImagePreviews() {
      const grid = document.getElementById('imagePreviewGrid');
      grid.innerHTML = uploadedImages.map((img, i) => `
        <div class="image-preview-item">
          <img src="${img}" alt="Product image" />
          <button class="remove-img" onclick="removeImage(${i})"><i class="fas fa-times"></i></button>
        </div>
      `).join('');
    }
  
    function removeImage(index) {
      uploadedImages.splice(index, 1);
      renderImagePreviews();
    }
  
    // ============================================================
    //  BULK ACTIONS
    // ============================================================
    function toggleAllCheckboxes() {
      const checked = document.getElementById('selectAll').checked;
      document.querySelectorAll('.product-checkbox').forEach(cb => cb.checked = checked);
    }
  
    function getSelectedIds() {
      return Array.from(document.querySelectorAll('.product-checkbox:checked')).map(cb => cb.value);
    }
  
    function bulkAction(action) {
      const ids = getSelectedIds();
      if (ids.length === 0) { alert('Select at least one product.'); return; }
      if (action === 'delete' && !confirm(`Delete ${ids.length} product(s)?`)) return;
  
      ids.forEach(id => {
        const product = products.find(p => p.id === id);
        if (!product) return;
        switch(action) {
          case 'delete': products = products.filter(p => p.id !== id); break;
          case 'publish': product.status = 'active'; break;
          case 'draft': product.status = 'draft'; break;
          case 'featured': product.featured = !product.featured; break;
          case 'trending': product.trending = !product.trending; break;
        }
      });
      renderTable();
      populateCategoryFilter();
    }
  
    // ============================================================
    //  CATEGORY FILTER POPULATE
    // ============================================================
    function populateCategoryFilter() {
      const cats = [...new Set(products.map(p => p.category).filter(Boolean))];
      const select = document.getElementById('filterCategory');
      const current = select.value;
      select.innerHTML = '<option value="">All Categories</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
      select.value = current;
  
      // Also populate form category dropdown
      const formCat = document.getElementById('pCategory');
      formCat.innerHTML = '<option value="">Select Category</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }
  
    // ============================================================
    //  INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
      renderSidebar();
      renderTable();
      populateCategoryFilter();
  
      // Close drawer on ESC
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDrawer();
      });
  
      // Auto-generate slug
      document.getElementById('pName').addEventListener('input', function() {
        const slugField = document.getElementById('pSlug');
        if (!slugField.value || slugField.dataset.auto) {
          slugField.value = this.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
          slugField.dataset.auto = true;
        }
      });
    });
  </script>

  </body>

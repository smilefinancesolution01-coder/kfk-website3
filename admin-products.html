<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>KFK Admin – Products</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- GLOBAL ----- */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f4f6fa; color: #1e293b; transition: background 0.2s, color 0.2s; }
    body.dark { background: #0f172a; color: #e2e8f0; }

    .admin-wrap { max-width: 1600px; margin: 0 auto; padding: 1.5rem; }

    /* ----- TOP BAR ----- */
    .top-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 1.8rem; gap: 1rem; }
    .top-bar h1 { font-size: 1.8rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
    .top-bar h1 i { color: #2563eb; }
    .top-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 0.8rem; }

    /* buttons */
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border: none; border-radius: 40px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.2s; background: #e9edf2; color: #1e293b; text-decoration: none; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; transform: scale(1.02); }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:hover { background: #15803d; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-outline { background: transparent; border: 1px solid #cbd5e1; }
    .btn-outline:hover { background: #e9edf2; }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
    .btn-xs { padding: 0.2rem 0.6rem; font-size: 0.7rem; gap: 0.3rem; }

    /* search + filters */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 0.8rem; background: #fff; padding: 0.8rem 1.2rem; border-radius: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); align-items: center; margin-bottom: 1.8rem; }
    body.dark .filter-bar { background: #1e293b; }
    .filter-bar input, .filter-bar select { padding: 0.5rem 1rem; border-radius: 40px; border: 1px solid #d1d9e6; background: #f8fafc; font-size: 0.9rem; outline: none; transition: 0.2s; min-width: 140px; }
    body.dark .filter-bar input, body.dark .filter-bar select { background: #0f172a; border-color: #334155; color: #e2e8f0; }
    .filter-bar input:focus, .filter-bar select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
    .filter-bar .search-wrap { flex: 1; min-width: 200px; display: flex; align-items: center; background: #f8fafc; border-radius: 40px; border: 1px solid #d1d9e6; padding: 0 0.5rem; }
    body.dark .filter-bar .search-wrap { background: #0f172a; border-color: #334155; }
    .filter-bar .search-wrap input { border: none; background: transparent; width: 100%; padding: 0.5rem 0.5rem; }
    .filter-bar .search-wrap i { color: #94a3b8; margin: 0 0.3rem; }

    /* table card */
    .table-card { background: #fff; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); overflow: hidden; padding: 0 0 0.5rem 0; }
    body.dark .table-card { background: #1e293b; }

    .table-responsive { overflow-x: auto; padding: 0 1rem 1rem 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 1rem 0.5rem 0.8rem 0.5rem; color: #64748b; font-weight: 600; border-bottom: 1px solid #e9edf2; }
    body.dark th { color: #94a3b8; border-bottom-color: #334155; }
    td { padding: 0.8rem 0.5rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    body.dark td { border-bottom-color: #2d3748; }
    tr:last-child td { border-bottom: none; }
    .product-cell { display: flex; align-items: center; gap: 0.8rem; }
    .product-cell img { width: 48px; height: 48px; object-fit: cover; border-radius: 12px; background: #f1f5f9; border: 1px solid #e9edf2; }
    .product-cell .info { display: flex; flex-direction: column; }
    .product-cell .name { font-weight: 600; }
    .product-cell .sku { font-size: 0.7rem; color: #94a3b8; }

    .badge { padding: 0.2rem 0.7rem; border-radius: 40px; font-size: 0.7rem; font-weight: 600; background: #e9edf2; color: #1e293b; display: inline-block; }
    .badge-success { background: #dcfce7; color: #15803d; }
    .badge-danger { background: #fee2e2; color: #b91c1c; }
    .badge-warning { background: #fef9c3; color: #a16207; }
    .badge-info { background: #dbeafe; color: #1d4ed8; }
    .badge-featured { background: #fae8ff; color: #86198f; }
    body.dark .badge { background: #334155; color: #e2e8f0; }
    body.dark .badge-success { background: #1a3a2a; color: #86efac; }
    body.dark .badge-danger { background: #3b1a1a; color: #fca5a5; }
    body.dark .badge-warning { background: #3b341a; color: #fde047; }
    body.dark .badge-info { background: #1a2a3b; color: #93c5fd; }
    body.dark .badge-featured { background: #2d1a3b; color: #d8b4fe; }

    .actions { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .actions .btn { border-radius: 30px; padding: 0.2rem 0.6rem; }

    /* modals */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; padding: 1rem; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 32px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); position: relative; }
    body.dark .modal { background: #1e293b; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-header h2 { font-size: 1.5rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #94a3b8; }
    .modal-close:hover { color: #1e293b; }
    body.dark .modal-close:hover { color: #e2e8f0; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.9rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.6rem 1rem; border-radius: 40px; border: 1px solid #d1d9e6; background: #f8fafc; font-size: 0.9rem; outline: none; transition: 0.2s; }
    body.dark .form-group input, body.dark .form-group select, body.dark .form-group textarea { background: #0f172a; border-color: #334155; color: #e2e8f0; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .image-preview-area { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 0.8rem; }
    .image-preview-item { position: relative; width: 80px; height: 80px; border-radius: 16px; overflow: hidden; border: 1px solid #e9edf2; }
    .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .image-preview-item .remove-img { position: absolute; top: -6px; right: -6px; background: #dc2626; color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 0.7rem; cursor: pointer; }

    .toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 2000; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { background: #1e293b; color: #fff; padding: 0.8rem 1.6rem; border-radius: 60px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); font-weight: 500; display: flex; align-items: center; gap: 0.8rem; animation: slideUp 0.3s ease; }
    .toast-success { background: #16a34a; }
    .toast-error { background: #dc2626; }
    .toast-warning { background: #d97706; }
    @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

    .spinner { display: inline-block; width: 1.2rem; height: 1.2rem; border: 3px solid #e9edf2; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .text-center { text-align: center; }
    .mt-2 { margin-top: 1.5rem; }
    .flex { display: flex; align-items: center; gap: 0.5rem; }
    .gap-1 { gap: 0.5rem; }
    .w-full { width: 100%; }
    .hidden { display: none !important; }

    /* dark ready */
    body.dark .modal { background: #1e293b; }
    body.dark .table-card { background: #1e293b; }
    body.dark .filter-bar { background: #1e293b; }

    /* responsive */
    @media (max-width: 768px) {
      .filter-bar { border-radius: 24px; flex-direction: column; align-items: stretch; }
      .filter-bar .search-wrap { width: 100%; }
      .form-row { grid-template-columns: 1fr; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .top-actions { justify-content: flex-start; }
      .admin-wrap { padding: 0.8rem; }
      .modal { padding: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="admin-wrap">

  <!-- TOP BAR -->
  <div class="top-bar">
    <h1><i class="fas fa-fish"></i> KFK Products</h1>
    <div class="top-actions">
      <button class="btn btn-outline btn-sm" id="themeToggle"><i class="fas fa-moon"></i> <span>Dark</span></button>
      <button class="btn btn-primary" id="addProductBtn"><i class="fas fa-plus"></i> Add Product</button>
      <button class="btn btn-danger btn-sm" id="bulkDeleteBtn"><i class="fas fa-trash"></i> Bulk</button>
    </div>
  </div>

  <!-- FILTERS + SEARCH -->
  <div class="filter-bar">
    <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search name, SKU, category..."></div>
    <select id="categoryFilter"><option value="">All Categories</option></select>
    <select id="statusFilter"><option value="">All Status</option><option value="active">Active</option><option value="draft">Draft</option><option value="outOfStock">Out of Stock</option></select>
    <select id="featuredFilter"><option value="">All</option><option value="true">Featured</option><option value="false">Not Featured</option></select>
    <select id="sortSelect"><option value="newest">Newest</option><option value="oldest">Oldest</option><option value="priceLow">Price: Low→High</option><option value="priceHigh">Price: High→Low</option></select>
    <button class="btn btn-outline btn-sm" id="clearFiltersBtn"><i class="fas fa-times"></i> Clear</button>
  </div>

  <!-- TABLE CARD -->
  <div class="table-card">
    <div style="padding: 1rem 1.2rem 0.5rem; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;">
      <span><strong id="productCount">0</strong> products</span>
      <span class="flex"><i class="fas fa-sync-alt" id="refreshBtn" style="cursor:pointer;"></i></span>
    </div>
    <div class="table-responsive">
      <table>
        <thead><tr>
          <th style="width:30px;"><input type="checkbox" id="selectAllCheckbox"></th>
          <th>Product</th>
          <th>Category</th>
          <th>SKU</th>
          <th>Price</th>
          <th>Offer</th>
          <th>Stock</th>
          <th>Status</th>
          <th>Featured</th>
          <th style="min-width:130px;">Actions</th>
        </tr></thead>
        <tbody id="productTableBody">
          <tr><td colspan="10" class="text-center" style="padding:2rem;"><div class="spinner"></div> Loading products...</td></tr>
        </tbody>
      </table>
    </div>
    <!-- pagination placeholder (simple) -->
    <div class="flex" style="padding:1rem 1.2rem; justify-content: flex-end; gap:0.5rem; border-top:1px solid #e9edf2;">
      <button class="btn btn-outline btn-sm" id="prevPage"><i class="fas fa-chevron-left"></i></button>
      <span id="pageInfo">1 / 1</span>
      <button class="btn btn-outline btn-sm" id="nextPage"><i class="fas fa-chevron-right"></i></button>
    </div>
  </div>
</div>

<!-- ============ MODAL ADD/EDIT ============ -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Product</h2>
      <button class="modal-close" id="modalCloseBtn">&times;</button>
    </div>
    <form id="productForm" novalidate>
      <input type="hidden" id="editProductId">
      <div class="form-row">
        <div class="form-group"><label>Product Name *</label><input type="text" id="prodName" required placeholder="Fresh Pomfret"></div>
        <div class="form-group"><label>SKU *</label><input type="text" id="prodSku" required placeholder="FISH-001"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Category *</label><select id="prodCategory" required><option value="">Select</option></select></div>
        <div class="form-group"><label>Subcategory</label><input type="text" id="prodSubcategory" placeholder="e.g. Whole Fish"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Price (₹) *</label><input type="number" id="prodPrice" required step="0.01" placeholder="499"></div>
        <div class="form-group"><label>Offer Price (₹)</label><input type="number" id="prodOfferPrice" step="0.01" placeholder="399"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Stock *</label><input type="number" id="prodStock" required step="1" placeholder="10"></div>
        <div class="form-group"><label>Unit</label><input type="text" id="prodUnit" placeholder="kg, piece, pack"></div>
      </div>
      <div class="form-group"><label>Short Description</label><input type="text" id="prodShortDesc" placeholder="Fresh, high quality fish"></div>
      <div class="form-group"><label>Description</label><textarea id="prodDescription" rows="2" placeholder="Full description..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Status</label><select id="prodStatus"><option value="active">Active</option><option value="draft">Draft</option><option value="outOfStock">Out of Stock</option></select></div>
        <div class="form-group"><label>Featured</label><select id="prodFeatured"><option value="false">No</option><option value="true">Yes</option></select></div>
      </div>
      <div class="form-group">
        <label>SEO Title</label><input type="text" id="prodSeoTitle" placeholder="SEO title">
      </div>
      <div class="form-group">
        <label>SEO Description</label><input type="text" id="prodSeoDesc" placeholder="SEO meta description">
      </div>
      <div class="form-group">
        <label>Tags (comma separated)</label><input type="text" id="prodTags" placeholder="fresh, fish, seafood">
      </div>
      <div class="form-group">
        <label>Product Images (JPEG, PNG, WEBP) * at least 1</label>
        <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" multiple>
        <div class="image-preview-area" id="imagePreviewContainer"></div>
        <small>Upload images, they will be stored in Firebase Storage.</small>
      </div>
      <button type="submit" class="btn btn-primary w-full" id="submitProductBtn"><i class="fas fa-save"></i> Save Product</button>
    </form>
  </div>
</div>

<!-- ============ DELETE CONFIRMATION ============ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:450px;">
    <div class="modal-header"><h2>Confirm Delete</h2><button class="modal-close" id="deleteModalClose">&times;</button></div>
    <p id="deleteMsg">Are you sure you want to delete this product? This action cannot be undone.</p>
    <div style="display:flex; gap:1rem; margin-top:1.5rem; justify-content:flex-end;">
      <button class="btn btn-outline" id="deleteCancelBtn">Cancel</button>
      <button class="btn btn-danger" id="deleteConfirmBtn"><i class="fas fa-trash"></i> Delete</button>
    </div>
  </div>
</div>

<!-- ============ TOAST ============ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ============ SCRIPTS ============ -->
<script type="module">
  import { products, categories, storageService } from './js/firestore-service.js';
  import { auth } from './js/firebase-config.js'; // ensure auth is exported

  // ---------- STATE ----------
  let allProducts = [];
  let filteredProducts = [];
  let currentPage = 1;
  const pageSize = 10;
  let currentDeleteId = null;
  let currentImages = []; // image File objects for add/edit
  let existingImageUrls = []; // for edit mode
  let unsubscribeProducts = null;
  let categoriesList = [];

  // DOM refs
  const $ = id => document.getElementById(id);
  const tableBody = $('productTableBody');
  const searchInput = $('searchInput');
  const categoryFilter = $('categoryFilter');
  const statusFilter = $('statusFilter');
  const featuredFilter = $('featuredFilter');
  const sortSelect = $('sortSelect');
  const selectAll = $('selectAllCheckbox');
  const productCount = $('productCount');
  const prevPageBtn = $('prevPage');
  const nextPageBtn = $('nextPage');
  const pageInfo = $('pageInfo');
  const refreshBtn = $('refreshBtn');

  // modals
  const productModal = $('productModal');
  const modalCloseBtn = $('modalCloseBtn');
  const addProductBtn = $('addProductBtn');
  const modalTitle = $('modalTitle');
  const productForm = $('productForm');
  const editProductId = $('editProductId');
  const imageInput = $('imageInput');
  const imagePreviewContainer = $('imagePreviewContainer');
  const deleteModal = $('deleteModal');
  const deleteModalClose = $('deleteModalClose');
  const deleteCancelBtn = $('deleteCancelBtn');
  const deleteConfirmBtn = $('deleteConfirmBtn');
  const deleteMsg = $('deleteMsg');

  // ---------- TOAST ----------
  function showToast(message, type = 'success') {
    const container = $('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3500);
  }

  // ---------- LOAD CATEGORIES ----------
  async function loadCategories() {
    try {
      const res = await categories.getAll();
      if (res.success) {
        categoriesList = res.data;
        const selects = [categoryFilter, $('prodCategory')];
        selects.forEach(sel => {
          const currentVal = sel.value;
          sel.innerHTML = '<option value="">All Categories</option>';
          categoriesList.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.name || c.id;
            opt.textContent = c.name || c.id;
            sel.appendChild(opt);
          });
          sel.value = currentVal;
        });
      }
    } catch (e) { console.warn('cat load', e); }
  }

  // ---------- RENDER TABLE ----------
  function renderTable() {
    const filtered = getFilteredAndSorted();
    filteredProducts = filtered;
    const total = filtered.length;
    const totalPages = Math.ceil(total / pageSize) || 1;
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * pageSize;
    const end = Math.min(start + pageSize, total);
    const pageItems = filtered.slice(start, end);

    productCount.textContent = total;

    if (pageItems.length === 0) {
      tableBody.innerHTML = `<tr><td colspan="10" class="text-center" style="padding:2rem;color:#94a3b8;">No products found</td></tr>`;
      pageInfo.textContent = `0 / 0`;
      return;
    }

    let html = '';
    pageItems.forEach(p => {
      const img = (p.images && p.images.length) ? p.images[0] : 'https://placehold.co/80x80/eee/ccc?text=No+Img';
      const statusClass = p.status === 'active' ? 'badge-success' : p.status === 'outOfStock' ? 'badge-danger' : 'badge-warning';
      const featuredBadge = p.featured ? '<span class="badge badge-featured"><i class="fas fa-star"></i> Featured</span>' : '';
      html += `<tr>
        <td><input type="checkbox" class="product-checkbox" value="${p.id}"></td>
        <td>
          <div class="product-cell">
            <img src="${img}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/80x80/eee/ccc?text=Error'">
            <div class="info"><span class="name">${escapeHtml(p.name || '')}</span><span class="sku">${escapeHtml(p.sku || '')}</span></div>
          </div>
        </td>
        <td>${escapeHtml(p.category || '—')}</td>
        <td>${escapeHtml(p.sku || '—')}</td>
        <td>₹${p.price?.toFixed?.(2) ?? p.price ?? 0}</td>
        <td>${p.offerPrice ? '₹'+p.offerPrice.toFixed(2) : '—'}</td>
        <td>${p.stock ?? 0}</td>
        <td><span class="badge ${statusClass}">${p.status || 'draft'}</span></td>
        <td>${featuredBadge || '—'}</td>
        <td>
          <div class="actions">
            <button class="btn btn-primary btn-xs editBtn" data-id="${p.id}"><i class="fas fa-edit"></i></button>
            <button class="btn btn-danger btn-xs deleteBtn" data-id="${p.id}"><i class="fas fa-trash"></i></button>
            <button class="btn btn-outline btn-xs toggleFeatured" data-id="${p.id}" data-featured="${p.featured}"><i class="fas fa-${p.featured ? 'star' : 'star-o'}"></i></button>
          </div>
        </td>
      </tr>`;
    });
    tableBody.innerHTML = html;
    pageInfo.textContent = `${currentPage} / ${totalPages}`;
    prevPageBtn.disabled = currentPage === 1;
    nextPageBtn.disabled = currentPage === totalPages;

    // attach events
    document.querySelectorAll('.editBtn').forEach(btn => btn.addEventListener('click', (e) => openEditModal(btn.dataset.id)));
    document.querySelectorAll('.deleteBtn').forEach(btn => btn.addEventListener('click', (e) => openDeleteModal(btn.dataset.id)));
    document.querySelectorAll('.toggleFeatured').forEach(btn => btn.addEventListener('click', async (e) => {
      const id = btn.dataset.id;
      const current = btn.dataset.featured === 'true';
      await updateProductField(id, { featured: !current });
    }));
    // checkbox select
    document.querySelectorAll('.product-checkbox').forEach(cb => cb.addEventListener('change', updateSelectAllState));
  }

  function escapeHtml(text) {
    if (!text) return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, m => map[m]);
  }

  // ---------- FILTER / SORT ----------
  function getFilteredAndSorted() {
    let list = [...allProducts];
    const search = searchInput.value.toLowerCase().trim();
    const cat = categoryFilter.value;
    const status = statusFilter.value;
    const featured = featuredFilter.value;
    const sort = sortSelect.value;

    if (search) {
      list = list.filter(p => 
        (p.name || '').toLowerCase().includes(search) ||
        (p.sku || '').toLowerCase().includes(search) ||
        (p.category || '').toLowerCase().includes(search) ||
        (p.tags || []).some(t => t.toLowerCase().includes(search))
      );
    }
    if (cat) list = list.filter(p => p.category === cat);
    if (status) list = list.filter(p => p.status === status);
    if (featured !== '') list = list.filter(p => String(p.featured) === featured);

    // sort
    if (sort === 'newest') list.sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
    else if (sort === 'oldest') list.sort((a,b) => (a.createdAt?.toMillis?.() || 0) - (b.createdAt?.toMillis?.() || 0));
    else if (sort === 'priceLow') list.sort((a,b) => (a.price || 0) - (b.price || 0));
    else if (sort === 'priceHigh') list.sort((a,b) => (b.price || 0) - (a.price || 0));
    return list;
  }

  // ---------- LISTEN REAL TIME ----------
  function listenProducts() {
    if (unsubscribeProducts) unsubscribeProducts();
    unsubscribeProducts = products.listen((response) => {
      if (response.success) {
        allProducts = response.data;
        renderTable();
        // update category filter options dynamically if needed
      } else {
        showToast('Error loading products: ' + (response.error || ''), 'error');
      }
    }, { orderBy: 'createdAt', orderDirection: 'desc' });
  }

  // ---------- CRUD OPERATIONS ----------
  async function addProduct(data, imageFiles) {
    const images = await uploadImages(imageFiles);
    if (images.length === 0) {
      showToast('Please upload at least one image.', 'error');
      return false;
    }
    data.images = images;
    data.createdAt = new Date().toISOString();
    data.updatedAt = new Date().toISOString();
    const res = await products.add(data);
    if (res.success) { showToast('Product added!'); return true; }
    else { showToast('Error: ' + (res.error || ''), 'error'); return false; }
  }

  async function updateProduct(id, data, imageFiles, existingImages) {
    let finalImages = existingImages || [];
    if (imageFiles && imageFiles.length) {
      const newImgs = await uploadImages(imageFiles);
      finalImages = [...finalImages, ...newImgs];
    }
    data.images = finalImages;
    data.updatedAt = new Date().toISOString();
    const res = await products.update(id, data);
    if (res.success) { showToast('Product updated!'); return true; }
    else { showToast('Error: ' + (res.error || ''), 'error'); return false; }
  }

  async function uploadImages(files) {
    const urls = [];
    for (const file of files) {
      try {
        const path = `products/${Date.now()}_${file.name}`;
        const result = await storageService.upload(path, file);
        if (result.success) {
          urls.push(result.data.url);
        } else {
          showToast('Image upload failed: ' + file.name, 'error');
        }
      } catch (e) { console.warn('upload err', e); }
    }
    return urls;
  }

  async function deleteProduct(id) {
    const res = await products.delete(id);
    if (res.success) { showToast('Product deleted'); return true; }
    else { showToast('Delete failed: ' + (res.error || ''), 'error'); return false; }
  }

  async function updateProductField(id, updates) {
    const res = await products.update(id, updates);
    if (res.success) showToast('Updated');
    else showToast('Update failed: ' + (res.error || ''), 'error');
  }

  // ---------- MODAL HANDLERS ----------
  function openAddModal() {
    modalTitle.textContent = 'Add Product';
    editProductId.value = '';
    productForm.reset();
    currentImages = [];
    existingImageUrls = [];
    imagePreviewContainer.innerHTML = '';
    $('prodCategory').value = '';
    $('prodStatus').value = 'active';
    $('prodFeatured').value = 'false';
    productModal.classList.add('active');
  }

  async function openEditModal(id) {
    const res = await products.getById(id);
    if (!res.success) { showToast('Product not found', 'error'); return; }
    const p = res.data;
    modalTitle.textContent = 'Edit Product';
    editProductId.value = id;
    $('prodName').value = p.name || '';
    $('prodSku').value = p.sku || '';
    $('prodCategory').value = p.category || '';
    $('prodSubcategory').value = p.subcategory || '';
    $('prodPrice').value = p.price || '';
    $('prodOfferPrice').value = p.offerPrice || '';
    $('prodStock').value = p.stock || '';
    $('prodUnit').value = p.unit || '';
    $('prodShortDesc').value = p.shortDescription || '';
    $('prodDescription').value = p.description || '';
    $('prodStatus').value = p.status || 'active';
    $('prodFeatured').value = p.featured ? 'true' : 'false';
    $('prodSeoTitle').value = p.seoTitle || '';
    $('prodSeoDesc').value = p.seoDescription || '';
    $('prodTags').value = (p.tags || []).join(', ');
    existingImageUrls = p.images || [];
    currentImages = [];
    renderImagePreview(existingImageUrls, []);
    productModal.classList.add('active');
  }

  function closeModal() {
    productModal.classList.remove('active');
    imagePreviewContainer.innerHTML = '';
    currentImages = [];
    existingImageUrls = [];
  }

  function renderImagePreview(urls, files) {
    imagePreviewContainer.innerHTML = '';
    urls.forEach(url => {
      const div = document.createElement('div');
      div.className = 'image-preview-item';
      div.innerHTML = `<img src="${url}" alt="product image"><button class="remove-img" data-url="${url}" type="button"><i class="fas fa-times"></i></button>`;
      imagePreviewContainer.appendChild(div);
    });
    files.forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const div = document.createElement('div');
        div.className = 'image-preview-item';
        div.innerHTML = `<img src="${e.target.result}" alt="new"><button class="remove-img" data-fileindex="${idx}" type="button"><i class="fas fa-times"></i></button>`;
        imagePreviewContainer.appendChild(div);
      };
      reader.readAsDataURL(file);
    });
    // attach remove events
    imagePreviewContainer.querySelectorAll('.remove-img').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const url = btn.dataset.url;
        const fileIdx = btn.dataset.fileindex;
        if (url) {
          existingImageUrls = existingImageUrls.filter(u => u !== url);
          renderImagePreview(existingImageUrls, currentImages);
        } else if (fileIdx !== undefined) {
          currentImages.splice(Number(fileIdx), 1);
          renderImagePreview(existingImageUrls, currentImages);
        }
      });
    });
  }

  // ---------- FORM SUBMIT ----------
  productForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = editProductId.value;
    const name = $('prodName').value.trim();
    const sku = $('prodSku').value.trim();
    const category = $('prodCategory').value;
    const subcategory = $('prodSubcategory').value.trim();
    const price = parseFloat($('prodPrice').value);
    const offerPrice = parseFloat($('prodOfferPrice').value) || null;
    const stock = parseInt($('prodStock').value) || 0;
    const unit = $('prodUnit').value.trim();
    const shortDescription = $('prodShortDesc').value.trim();
    const description = $('prodDescription').value.trim();
    const status = $('prodStatus').value;
    const featured = $('prodFeatured').value === 'true';
    const seoTitle = $('prodSeoTitle').value.trim();
    const seoDescription = $('prodSeoDesc').value.trim();
    const tags = $('prodTags').value.split(',').map(s => s.trim()).filter(Boolean);

    if (!name || !sku || !category || isNaN(price) || price <= 0) {
      showToast('Please fill all required fields (Name, SKU, Category, Price > 0)', 'error');
      return;
    }
    // check duplicate SKU
    const dup = allProducts.find(p => p.sku === sku && p.id !== id);
    if (dup) { showToast('SKU already exists. Please use a unique SKU.', 'error'); return; }

    const data = { name, sku, category, subcategory, price, offerPrice, stock, unit, shortDescription, description, status, featured, seoTitle, seoDescription, tags };
    const imageFiles = currentImages;
    const existing = existingImageUrls;

    // validate at least one image
    if ((!existing || existing.length === 0) && (!imageFiles || imageFiles.length === 0)) {
      showToast('Please add at least one product image.', 'error');
      return;
    }

    const submitBtn = $('submitProductBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    let success = false;
    if (id) {
      success = await updateProduct(id, data, imageFiles, existing);
    } else {
      success = await addProduct(data, imageFiles);
    }
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fas fa-save"></i> Save Product';
    if (success) {
      closeModal();
    }
  });

  // ---------- DELETE MODAL ----------
  function openDeleteModal(id) {
    currentDeleteId = id;
    deleteMsg.textContent = 'Are you sure you want to delete this product? This action cannot be undone.';
    deleteModal.classList.add('active');
  }
  function closeDeleteModal() {
    deleteModal.classList.remove('active');
    currentDeleteId = null;
  }
  deleteConfirmBtn.addEventListener('click', async () => {
    if (currentDeleteId) {
      const ok = await deleteProduct(currentDeleteId);
      if (ok) closeDeleteModal();
    }
  });

  // ---------- BULK DELETE ----------
  $('bulkDeleteBtn').addEventListener('click', () => {
    const checked = document.querySelectorAll('.product-checkbox:checked');
    if (checked.length === 0) { showToast('Select products to delete.', 'warning'); return; }
    if (confirm(`Delete ${checked.length} products?`)) {
      checked.forEach(async cb => {
        await deleteProduct(cb.value);
      });
    }
  });

  // ---------- SELECT ALL ----------
  selectAll.addEventListener('change', (e) => {
    document.querySelectorAll('.product-checkbox').forEach(cb => cb.checked = e.target.checked);
  });
  function updateSelectAllState() {
    const checkboxes = document.querySelectorAll('.product-checkbox');
    const checked = document.querySelectorAll('.product-checkbox:checked');
    selectAll.checked = checkboxes.length === checked.length && checkboxes.length > 0;
  }

  // ---------- PAGINATION ----------
  prevPageBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderTable(); } });
  nextPageBtn.addEventListener('click', () => { const total = getFilteredAndSorted().length; const totalPages = Math.ceil(total/pageSize); if (currentPage < totalPages) { currentPage++; renderTable(); } });

  // ---------- FILTER EVENTS ----------
  [searchInput, categoryFilter, statusFilter, featuredFilter, sortSelect].forEach(el => el.addEventListener('change', () => { currentPage = 1; renderTable(); }));
  searchInput.addEventListener('input', () => { currentPage = 1; renderTable(); });
  refreshBtn.addEventListener('click', () => { listenProducts(); showToast('Refreshed', 'success'); });

  // ---------- THEME ----------
  $('themeToggle').addEventListener('click', () => {
    document.body.classList.toggle('dark');
    const icon = $('themeToggle').querySelector('i');
    const span = $('themeToggle').querySelector('span');
    if (document.body.classList.contains('dark')) {
      icon.className = 'fas fa-sun'; span.textContent = 'Light';
    } else {
      icon.className = 'fas fa-moon'; span.textContent = 'Dark';
    }
  });

  // ---------- MODAL CLOSE ----------
  modalCloseBtn.addEventListener('click', closeModal);
  productModal.addEventListener('click', (e) => { if (e.target === productModal) closeModal(); });
  deleteModalClose.addEventListener('click', closeDeleteModal);
  deleteCancelBtn.addEventListener('click', closeDeleteModal);
  deleteModal.addEventListener('click', (e) => { if (e.target === deleteModal) closeDeleteModal(); });

  // ---------- IMAGE INPUT ----------
  imageInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    currentImages = currentImages.concat(files);
    renderImagePreview(existingImageUrls, currentImages);
    imageInput.value = '';
  });

  // ---------- INIT ----------
  async function init() {
    await loadCategories();
    listenProducts();
    // add product button
    addProductBtn.addEventListener('click', openAddModal);
    // clear filters
    $('clearFiltersBtn').addEventListener('click', () => {
      searchInput.value = '';
      categoryFilter.value = '';
      statusFilter.value = '';
      featuredFilter.value = '';
      sortSelect.value = 'newest';
      currentPage = 1;
      renderTable();
    });
  }
  init();

  // handle auth redirect if needed (already in auth.js)
  // ensure admin role? we assume auth.js handles redirect
  console.log('KFK Admin Products loaded');
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>KFK · Customer Management</title>
  <meta name="description" content="Master Customer Management System for KFK Platform" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f6fa;
      color: #0b1a2b;
      line-height: 1.5;
      overflow-x: hidden;
      display: flex;
      min-height: 100vh;
    }
    :root {
      --primary: #0f2b45;
      --accent: #d45c2f;
      --sidebar-width: 260px;
      --sidebar-collapsed: 72px;
      --header-height: 64px;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(0,0,0,0.04);
      --radius: 16px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border);
      z-index: 100;
      transition: width var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 2px 0 12px rgba(0,0,0,0.02);
    }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      height: var(--header-height);
      flex-shrink: 0;
    }
    .sidebar-brand i { font-size: 1.6rem; color: var(--accent); }
    .sidebar-brand span { font-weight: 800; font-size: 1.3rem; color: var(--primary); white-space: nowrap; }
    .sidebar.collapsed .sidebar-brand span { display: none; }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 20px;
    }
    .sidebar-nav .nav-section { margin-bottom: 8px; }
    .sidebar-nav .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      padding: 8px 20px 4px;
      font-weight: 700;
    }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      color: #334155;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.15s;
      border-left: 3px solid transparent;
      white-space: nowrap;
    }
    .sidebar-nav a:hover { background: #f1f5f9; color: var(--primary); }
    .sidebar-nav a.active {
      background: #eef2ff;
      color: var(--primary);
      border-left-color: var(--accent);
    }
    .sidebar-nav a i { width: 22px; text-align: center; font-size: 1rem; color: #64748b; }
    .sidebar-nav a:hover i { color: var(--primary); }
    .sidebar.collapsed .sidebar-nav a span { display: none; }
    .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 12px; }
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .sidebar-footer a {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
    }
    .sidebar-footer a i { width: 22px; }
    .sidebar.collapsed .sidebar-footer a span { display: none; }

    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      transition: margin var(--transition);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

    .topbar {
      height: var(--header-height);
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .toggle-sidebar { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #334155; padding: 4px; }
    .topbar-search {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 40px;
      padding: 4px 16px;
      gap: 8px;
      min-width: 200px;
    }
    .topbar-search input { border: none; background: transparent; padding: 8px 0; outline: none; font-size: 0.9rem; width: 100%; }
    .topbar-actions { display: flex; align-items: center; gap: 16px; }
    .topbar-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #475569; position: relative; padding: 4px; }
    .topbar-actions .badge-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
    .topbar-actions .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer;
    }

    .content { padding: 24px 28px; flex: 1; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 12px 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card .label { font-size: 0.65rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-card .value { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin: 2px 0; }
    .stat-card .change { font-size: 0.65rem; color: #22c55e; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .toolbar-left { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .toolbar-right { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .btn {
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1a3a5a; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: #b84c2a; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: #334155; }
    .btn-outline:hover { background: #f1f5f9; }
    .btn-sm { padding: 5px 14px; font-size: 0.75rem; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-warning:hover { background: #d97706; }

    .table-wrap {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: auto;
      box-shadow: var(--shadow);
    }
    .table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 1400px; }
    th {
      text-align: left;
      padding: 10px 12px;
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:hover td { background: #f8fafc; }
    .avatar-sm {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.7rem;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.6rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .status-badge.active { background: #dcfce7; color: #166534; }
    .status-badge.inactive { background: #fee2e2; color: #991b1b; }
    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .status-badge.verified { background: #dbeafe; color: #1e40af; }
    .actions-cell { display: flex; gap: 4px; flex-wrap: wrap; }
    .actions-cell button {
      background: none;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
      color: #64748b;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .actions-cell button:hover { background: #f1f5f9; color: var(--primary); }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      display: none;
      backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: block; }
    .customer-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 820px;
      max-width: 94vw;
      height: 100%;
      background: white;
      z-index: 210;
      box-shadow: -8px 0 30px rgba(0,0,0,0.1);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .customer-drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background: white;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .drawer-header h2 { font-size: 1.1rem; font-weight: 700; }
    .drawer-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #64748b; }
    .drawer-body { padding: 20px 24px; flex: 1; overflow-y: auto; }
    .drawer-footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
      background: white;
      position: sticky;
      bottom: 0;
      flex-wrap: wrap;
    }

    .profile-header {
      display: flex;
      gap: 20px;
      align-items: center;
      padding: 16px;
      background: #f8fafc;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 700;
    }
    .profile-info h3 { font-weight: 700; font-size: 1.2rem; }
    .profile-info .sub { color: #64748b; font-size: 0.85rem; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .detail-group { margin-bottom: 12px; }
    .detail-group label { font-weight: 600; font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.3px; display: block; }
    .detail-group .value { font-size: 0.9rem; margin-top: 2px; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,0.2); }
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .sidebar.collapsed ~ .main { margin-left: 0; }
      .detail-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; }
      .topbar-search { min-width: 120px; flex: 1; }
      .content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; align-items: stretch; }
      .customer-drawer { width: 100%; max-width: 100%; }
      .drawer-body { padding: 16px; }
      .profile-header { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><i class="fas fa-fish"></i><span>KFK Admin</span></div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="/admin-profile.html"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    <a href="/logout.html"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-search"><i class="fas fa-search" style="color:#94a3b8;"></i><input type="text" placeholder="Search customers..." id="globalSearch" onkeyup="filterCustomers()" /></div>
    </div>
    <div class="topbar-actions">
      <button><i class="far fa-bell"></i><span class="badge-dot"></span></button>
      <button><i class="far fa-envelope"></i></button>
      <div class="avatar" onclick="location.href='/admin-profile.html'">A</div>
    </div>
  </header>

  <div class="content">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-outline btn-sm"><i class="fas fa-file-export"></i> Export</button>
        <button class="btn btn-outline btn-sm" onclick="refreshCustomers()"><i class="fas fa-sync"></i> Refresh</button>
      </div>
      <div class="toolbar-right">
        <select id="filterStatus" onchange="filterCustomers()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="pending">Pending</option>
        </select>
        <select id="filterSource" onchange="filterCustomers()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Sources</option>
          <option value="website">Website</option>
          <option value="marketplace">Marketplace</option>
          <option value="franchise">Franchise</option>
          <option value="cloud-kitchen">Cloud Kitchen</option>
          <option value="crm">CRM</option>
        </select>
        <select id="filterMembership" onchange="filterCustomers()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Levels</option>
          <option value="silver">Silver</option>
          <option value="gold">Gold</option>
          <option value="platinum">Platinum</option>
          <option value="diamond">Diamond</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table id="customerTable">
        <thead>
          <tr>
            <th style="width:40px;">Photo</th>
            <th>Customer ID</th>
            <th>Name</th>
            <th>Contact</th>
            <th>City</th>
            <th>Orders</th>
            <th>Spent</th>
            <th>Level</th>
            <th>Status</th>
            <th style="width:100px;">Actions</th>
          </tr>
        </thead>
        <tbody id="customerTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Customer Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="customer-drawer" id="customerDrawer">
  <div class="drawer-header">
    <h2 id="drawerTitle">Customer Profile</h2>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
  </div>
  <div class="drawer-body" id="customerDetailContent"></div>
  <div class="drawer-footer" id="customerDetailActions">
    <button class="btn btn-sm btn-outline" onclick="closeDrawer()">Close</button>
    <button class="btn btn-sm btn-primary" onclick="editCustomer()"><i class="fas fa-edit"></i> Edit</button>
    <button class="btn btn-sm btn-success" onclick="sendWhatsApp()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
    <button class="btn btn-sm btn-warning" onclick="sendEmail()"><i class="fas fa-envelope"></i> Email</button>
  </div>
</div>

<script>
  // ============================================================
  //  CUSTOMER MODEL — Firebase Ready
  // ============================================================
  class Customer {
    constructor(data = {}) {
      this.id = data.id || 'CUST-' + Date.now().toString().slice(-8);
      this.fullName = data.fullName || '';
      this.phone = data.phone || '';
      this.email = data.email || '';
      this.gender = data.gender || '';
      this.dob = data.dob || '';
      this.city = data.city || '';
      this.state = data.state || '';
      this.country = data.country || 'India';
      this.pincode = data.pincode || '';
      this.address = data.address || '';
      this.registeredAt = data.registeredAt || new Date().toISOString();
      this.lastLogin = data.lastLogin || new Date().toISOString();
      this.accountStatus = data.accountStatus || 'active';
      this.verificationStatus = data.verificationStatus || 'verified';
      this.totalOrders = data.totalOrders || 0;
      this.totalSpent = data.totalSpent || 0;
      this.loyaltyPoints = data.loyaltyPoints || 0;
      this.membershipLevel = data.membershipLevel || 'silver';
      this.preferredCategory = data.preferredCategory || '';
      this.referralCode = data.referralCode || '';
      this.referredBy = data.referredBy || '';
      this.source = data.source || 'website';
      this.tags = data.tags || [];
      this.addresses = data.addresses || [];
      this.wishlist = data.wishlist || [];
      this.cart = data.cart || [];
      this.reviews = data.reviews || [];
      this.timeline = data.timeline || [{ event: 'Account created', time: new Date().toISOString() }];
      this.updatedAt = new Date().toISOString();
    }
  }

    new Customer({

      totalOrders: 3, totalSpent: 5200, loyaltyPoints: 230, membershipLevel: 'silver',

    }),
    new Customer({

      gender: 'Female', city: 'Ahmedabad', state: 'Gujarat', pincode: '380015',

  ];

  let currentCustomerId = null;

  // ============================================================
  //  SIDEBAR NAVIGATION
  // ============================================================
  const SIDEBAR_NAV = [
    { section: 'Main', items: [
      { label: 'Dashboard', icon: 'fa-th-large', link: '/admin.html' },
      { label: 'Products', icon: 'fa-box', link: '/admin-products.html' },
      { label: 'Categories', icon: 'fa-tags', link: '/admin-categories.html' },
      { label: 'Orders', icon: 'fa-shopping-cart', link: '/admin-orders.html' },
      { label: 'Customers', icon: 'fa-users', link: '/admin-customers.html', active: true },
    ]},
    { section: 'Content', items: [
      { label: 'Homepage Manager', icon: 'fa-home', link: '/admin-homepage.html' },
      { label: 'Marketplace Manager', icon: 'fa-store', link: '/admin-marketplace.html' },
      { label: 'Inventory', icon: 'fa-warehouse', link: '/admin-inventory.html' },
      { label: 'Offers', icon: 'fa-tag', link: '/admin-offers.html' },
      { label: 'Recipes', icon: 'fa-utensils', link: '/admin-recipes.html' },
    ]},
    { section: 'Business', items: [
      { label: 'Franchise', icon: 'fa-store-alt', link: '/admin-franchise.html' },
      { label: 'CRM', icon: 'fa-address-card', link: '/admin-crm.html' },
      { label: 'Reports', icon: 'fa-chart-bar', link: '/admin-reports.html' },
      { label: 'Settings', icon: 'fa-cog', link: '/admin-settings.html' },
    ]}
  ];

  function renderSidebar() {
    const container = document.getElementById('sidebarNav');
    container.innerHTML = SIDEBAR_NAV.map(section => `
      <div class="nav-section">
        <div class="nav-label">${section.section}</div>
        ${section.items.map(item => `
          <a href="${item.link}" class="${item.active ? 'active' : ''}">
            <i class="fas ${item.icon}"></i><span>${item.label}</span>
          </a>
        `).join('')}
      </div>
    `).join('');
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (window.innerWidth <= 1024) { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
    else { sidebar.classList.toggle('collapsed'); }
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  // ============================================================
  //  STATS
  // ============================================================
  function renderStats() {
    const total = customers.length;
    const active = customers.filter(c => c.accountStatus === 'active').length;
    const inactive = customers.filter(c => c.accountStatus === 'inactive').length;
    const newToday = customers.filter(c => new Date(c.registeredAt).toDateString() === new Date().toDateString()).length;
    const totalRevenue = customers.reduce((sum, c) => sum + c.totalSpent, 0);
    const avgOrderValue = total > 0 ? Math.round(totalRevenue / customers.reduce((sum, c) => sum + c.totalOrders, 0)) : 0;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="label">Total Customers</div><div class="value">${total}</div></div>
      <div class="stat-card"><div class="label">New Today</div><div class="value">${newToday}</div></div>
      <div class="stat-card"><div class="label">Active</div><div class="value">${active}</div></div>
      <div class="stat-card"><div class="label">Inactive</div><div class="value">${inactive}</div></div>
      <div class="stat-card"><div class="label">Total Revenue</div><div class="value">₹${totalRevenue.toLocaleString()}</div></div>
      <div class="stat-card"><div class="label">Avg Order Value</div><div class="value">₹${avgOrderValue}</div></div>
    `;
  }

  // ============================================================
  //  CUSTOMER TABLE
  // ============================================================
  function renderCustomers(data = customers) {
    const tbody = document.getElementById('customerTableBody');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:#94a3b8;">No customers found</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(c => {
      const initials = c.fullName.split(' ').map(n => n[0]).join('').toUpperCase();
      return `
        <tr onclick="viewCustomer('${c.id}')" style="cursor:pointer;">
          <td onclick="event.stopPropagation();"><div class="avatar-sm">${initials}</div></td>
          <td><strong>${c.id}</strong></td>
          <td>${c.fullName}</td>
          <td style="font-size:0.75rem;">${c.phone}<br/><span style="color:#94a3b8;">${c.email}</span></td>
          <td>${c.city}</td>
          <td>${c.totalOrders}</td>
          <td>₹${c.totalSpent.toLocaleString()}</td>
          <td><span class="status-badge" style="background:#dbeafe;color:#1e40af;">${c.membershipLevel}</span></td>
          <td><span class="status-badge ${c.accountStatus}">${c.accountStatus}</span></td>
          <td onclick="event.stopPropagation();" class="actions-cell">
            <button onclick="viewCustomer('${c.id}')" title="View"><i class="fas fa-eye"></i></button>
            <button onclick="editCustomer('${c.id}')" title="Edit"><i class="fas fa-edit"></i></button>
            <button onclick="toggleStatus('${c.id}')" title="Toggle Status"><i class="fas ${c.accountStatus === 'active' ? 'fa-user-slash' : 'fa-user-check'}"></i></button>
          </td>
        </tr>
      `;
    }).join('');
  }

  // ============================================================
  //  FILTERS
  // ============================================================
  function filterCustomers() {
    const search = document.getElementById('globalSearch').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const source = document.getElementById('filterSource').value;
    const membership = document.getElementById('filterMembership').value;

    let filtered = customers.filter(c => {
      const matchSearch = c.id.toLowerCase().includes(search) ||
                          c.fullName.toLowerCase().includes(search) ||
                          c.phone.includes(search) ||
                          c.email.toLowerCase().includes(search);
      const matchStatus = !status || c.accountStatus === status;
      const matchSource = !source || c.source === source;
      const matchMembership = !membership || c.membershipLevel === membership;
      return matchSearch && matchStatus && matchSource && matchMembership;
    });
    renderCustomers(filtered);
  }

  function refreshCustomers() {
    document.getElementById('globalSearch').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterSource').value = '';
    document.getElementById('filterMembership').value = '';
    renderCustomers(customers);
  }

  // ============================================================
  //  CUSTOMER PROFILE VIEW
  // ============================================================
  function viewCustomer(id) {
    const customer = customers.find(c => c.id === id);
    if (!customer) return;
    currentCustomerId = id;
    document.getElementById('drawerTitle').textContent = `Customer: ${customer.fullName}`;
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('customerDrawer').classList.add('open');

    const initials = customer.fullName.split(' ').map(n => n[0]).join('').toUpperCase();
    const timelineHtml = customer.timeline.map(t => `
      <div style="display:flex;gap:12px;padding:6px 0;border-bottom:1px solid #f1f5f9;">
        <span style="font-size:0.7rem;color:#94a3b8;min-width:160px;">${new Date(t.time).toLocaleString()}</span>
        <span>${t.event}</span>
      </div>
    `).join('');

    const addressesHtml = customer.addresses.map(a => `
      <div style="padding:4px 0;font-size:0.85rem;">${a.type}: ${a.address} ${a.default ? '⭐' : ''}</div>
    `).join('');

    document.getElementById('customerDetailContent').innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">${initials}</div>
        <div class="profile-info">
          <h3>${customer.fullName}</h3>
          <div class="sub">${customer.id} · ${customer.source}</div>
          <div class="sub">📞 ${customer.phone} · ✉️ ${customer.email}</div>
          <div class="sub">📍 ${customer.city}, ${customer.state} - ${customer.pincode}</div>
        </div>
      </div>

      <div class="detail-grid">
        <div class="detail-group">
          <label>Account Details</label>
          <div class="value">Status: <span class="status-badge ${customer.accountStatus}">${customer.accountStatus}</span></div>
          <div class="value">Verified: <span class="status-badge ${customer.verificationStatus}">${customer.verificationStatus}</span></div>
          <div class="value">Registered: ${new Date(customer.registeredAt).toLocaleDateString()}</div>
          <div class="value">Last Login: ${new Date(customer.lastLogin).toLocaleDateString()}</div>
        </div>
        <div class="detail-group">
          <label>Loyalty & Membership</label>
          <div class="value">Level: <strong>${customer.membershipLevel}</strong></div>
          <div class="value">Points: ${customer.loyaltyPoints}</div>
          <div class="value">Referral: ${customer.referralCode || '—'}</div>
          <div class="value">Referred By: ${customer.referredBy || '—'}</div>
        </div>
        <div class="detail-group">
          <label>Order Statistics</label>
          <div class="value">Total Orders: ${customer.totalOrders}</div>
          <div class="value">Total Spent: ₹${customer.totalSpent.toLocaleString()}</div>
          <div class="value">Preferred Category: ${customer.preferredCategory || '—'}</div>
          <div class="value">Tags: ${customer.tags.length ? customer.tags.join(', ') : '—'}</div>
        </div>
        <div class="detail-group">
          <label>Addresses</label>
          ${addressesHtml || '<div class="value" style="color:#94a3b8;">No addresses</div>'}
        </div>
      </div>

      <div style="margin:16px 0;">
        <h4 style="font-size:0.9rem;font-weight:700;margin-bottom:8px;">Activity Timeline</h4>
        ${timelineHtml || '<p style="color:#94a3b8;">No activity recorded</p>'}
      </div>
    `;
  }

  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('customerDrawer').classList.remove('open');
    currentCustomerId = null;
  }

  // ============================================================
  //  CUSTOMER ACTIONS
  // ============================================================
  function editCustomer(id) {
    const customer = customers.find(c => c.id === (id || currentCustomerId));
    if (!customer) return;
    alert(`Edit customer: ${customer.fullName}\n\nFirebase ready: This will open edit form.\n\nID: ${customer.id}`);
  }

  function toggleStatus(id) {
    const customer = customers.find(c => c.id === id);
    if (!customer) return;
    customer.accountStatus = customer.accountStatus === 'active' ? 'inactive' : 'active';
    customer.timeline.push({
      event: `Account ${customer.accountStatus === 'active' ? 'activated' : 'deactivated'}`,
      time: new Date().toISOString()
    });
    renderCustomers();
    renderStats();
  }

  function sendWhatsApp() {
    const customer = customers.find(c => c.id === currentCustomerId);
    if (!customer) return;
    alert(`WhatsApp to ${customer.phone}\n\nFirebase ready: This will open WhatsApp with template message.`);
  }

  function sendEmail() {
    const customer = customers.find(c => c.id === currentCustomerId);
    if (!customer) return;
    alert(`Email to ${customer.email}\n\nFirebase ready: This will open email composer.`);
  }

  // ============================================================
  //  INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    renderSidebar();
    renderCustomers();
    renderStats();

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDrawer();
    });
  });
</script>
</body>
</html>

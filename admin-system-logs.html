<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>KFK · System Logs & Audit</title>
  <meta name="description" content="Master System Logs & Audit Center for KFK Platform" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f6fa;
      color: #0b1a2b;
      line-height: 1.5;
      overflow-x: hidden;
      display: flex;
      min-height: 100vh;
    }
    :root {
      --primary: #0f2b45;
      --accent: #d45c2f;
      --sidebar-width: 260px;
      --sidebar-collapsed: 72px;
      --header-height: 64px;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(0,0,0,0.04);
      --radius: 16px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border);
      z-index: 100;
      transition: width var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 2px 0 12px rgba(0,0,0,0.02);
    }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      height: var(--header-height);
      flex-shrink: 0;
    }
    .sidebar-brand i { font-size: 1.6rem; color: var(--accent); }
    .sidebar-brand span { font-weight: 800; font-size: 1.3rem; color: var(--primary); white-space: nowrap; }
    .sidebar.collapsed .sidebar-brand span { display: none; }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 20px;
    }
    .sidebar-nav .nav-section { margin-bottom: 8px; }
    .sidebar-nav .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      padding: 8px 20px 4px;
      font-weight: 700;
    }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      color: #334155;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.15s;
      border-left: 3px solid transparent;
      white-space: nowrap;
    }
    .sidebar-nav a:hover { background: #f1f5f9; color: var(--primary); }
    .sidebar-nav a.active {
      background: #eef2ff;
      color: var(--primary);
      border-left-color: var(--accent);
    }
    .sidebar-nav a i { width: 22px; text-align: center; font-size: 1rem; color: #64748b; }
    .sidebar-nav a:hover i { color: var(--primary); }
    .sidebar.collapsed .sidebar-nav a span { display: none; }
    .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 12px; }
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .sidebar-footer a {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
    }
    .sidebar-footer a i { width: 22px; }
    .sidebar.collapsed .sidebar-footer a span { display: none; }

    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      transition: margin var(--transition);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

    .topbar {
      height: var(--header-height);
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .toggle-sidebar { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #334155; padding: 4px; }
    .topbar-search {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 40px;
      padding: 4px 16px;
      gap: 8px;
      min-width: 200px;
    }
    .topbar-search input { border: none; background: transparent; padding: 8px 0; outline: none; font-size: 0.9rem; width: 100%; }
    .topbar-actions { display: flex; align-items: center; gap: 16px; }
    .topbar-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #475569; position: relative; padding: 4px; }
    .topbar-actions .badge-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
    .topbar-actions .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer;
    }

    .content { padding: 24px 28px; flex: 1; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 10px 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card .label { font-size: 0.55rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-card .value { font-size: 1rem; font-weight: 700; color: var(--primary); margin: 2px 0; }
    .stat-card .change { font-size: 0.55rem; color: #22c55e; }
    .stat-card .change.down { color: #ef4444; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .toolbar-left { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .toolbar-right { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .btn {
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1a3a5a; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: #b84c2a; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: #334155; }
    .btn-outline:hover { background: #f1f5f9; }
    .btn-sm { padding: 5px 14px; font-size: 0.75rem; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-warning:hover { background: #d97706; }

    .table-wrap {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: auto;
      box-shadow: var(--shadow);
    }
    .table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 1200px; }
    th {
      text-align: left;
      padding: 8px 10px;
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:hover td { background: #f8fafc; }
    .severity-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.55rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .severity-badge.critical { background: #fee2e2; color: #991b1b; }
    .severity-badge.error { background: #fecaca; color: #7f1d1d; }
    .severity-badge.warning { background: #fef3c7; color: #92400e; }
    .severity-badge.info { background: #dbeafe; color: #1e40af; }
    .severity-badge.success { background: #dcfce7; color: #166534; }
    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.55rem;
      font-weight: 600;
    }
    .status-badge.success { background: #dcfce7; color: #166534; }
    .status-badge.failed { background: #fee2e2; color: #991b1b; }
    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .actions-cell { display: flex; gap: 4px; flex-wrap: wrap; }
    .actions-cell button {
      background: none;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
      color: #64748b;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .actions-cell button:hover { background: #f1f5f9; color: var(--primary); }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      display: none;
      backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: block; }
    .log-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 720px;
      max-width: 94vw;
      height: 100%;
      background: white;
      z-index: 210;
      box-shadow: -8px 0 30px rgba(0,0,0,0.1);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .log-drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background: white;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .drawer-header h2 { font-size: 1.1rem; font-weight: 700; }
    .drawer-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #64748b; }
    .drawer-body { padding: 20px 24px; flex: 1; overflow-y: auto; }
    .drawer-footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
      background: white;
      position: sticky;
      bottom: 0;
      flex-wrap: wrap;
    }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .detail-group { margin-bottom: 10px; }
    .detail-group label { font-weight: 600; font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.3px; display: block; }
    .detail-group .value { font-size: 0.85rem; margin-top: 2px; word-break: break-all; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,0.2); }
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .sidebar.collapsed ~ .main { margin-left: 0; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; }
      .topbar-search { min-width: 120px; flex: 1; }
      .content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; align-items: stretch; }
      .log-drawer { width: 100%; max-width: 100%; }
      .drawer-body { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><i class="fas fa-fish"></i><span>KFK Admin</span></div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="/admin-profile.html"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    <a href="/logout.html"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-search"><i class="fas fa-search" style="color:#94a3b8;"></i><input type="text" placeholder="Search logs..." id="globalSearch" onkeyup="filterLogs()" /></div>
    </div>
    <div class="topbar-actions">
      <button><i class="far fa-bell"></i><span class="badge-dot"></span></button>
      <button><i class="far fa-envelope"></i></button>
      <div class="avatar" onclick="location.href='/admin-profile.html'">A</div>
    </div>
  </header>

  <div class="content">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-outline btn-sm"><i class="fas fa-file-export"></i> Export</button>
        <button class="btn btn-outline btn-sm" onclick="refreshLogs()"><i class="fas fa-sync"></i> Refresh</button>
        <button class="btn btn-danger btn-sm" onclick="clearLogs()"><i class="fas fa-trash"></i> Clear All</button>
      </div>
      <div class="toolbar-right">
        <select id="filterSeverity" onchange="filterLogs()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Severity</option>
          <option value="critical">Critical</option>
          <option value="error">Error</option>
          <option value="warning">Warning</option>
          <option value="info">Info</option>
          <option value="success">Success</option>
        </select>
        <select id="filterModule" onchange="filterLogs()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Modules</option>
          <option value="Authentication">Authentication</option>
          <option value="Products">Products</option>
          <option value="Orders">Orders</option>
          <option value="Customers">Customers</option>
          <option value="Inventory">Inventory</option>
          <option value="CRM">CRM</option>
          <option value="Franchise">Franchise</option>
          <option value="Settings">Settings</option>
        </select>
        <input type="date" id="filterDate" onchange="filterLogs()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;" />
      </div>
    </div>

    <div class="table-wrap">
      <table id="logTable">
        <thead>
          <tr>
            <th>Log ID</th>
            <th>Timestamp</th>
            <th>User</th>
            <th>Action</th>
            <th>Module</th>
            <th>Status</th>
            <th>Severity</th>
            <th style="width:80px;">Actions</th>
          </tr>
        </thead>
        <tbody id="logTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Log Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="log-drawer" id="logDrawer">
  <div class="drawer-header">
    <h2 id="drawerTitle">Log Details</h2>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
  </div>
  <div class="drawer-body" id="logDetailContent"></div>
  <div class="drawer-footer">
    <button class="btn btn-outline" onclick="closeDrawer()">Close</button>
    <button class="btn btn-danger btn-sm" onclick="deleteLog()"><i class="fas fa-trash"></i> Delete</button>
  </div>
</div>

<script>
  // ============================================================
  //  LOG MODEL — Firebase Ready
  // ============================================================
  class SystemLog {
    constructor(data = {}) {
      this.id = data.id || 'LOG-' + Date.now().toString().slice(-8);
      this.timestamp = data.timestamp || new Date().toISOString();
      this.user = data.user || 'system';
      this.role = data.role || 'system';
      this.ip = data.ip || '0.0.0.0';
      this.device = data.device || 'Unknown';
      this.browser = data.browser || 'Unknown';
      this.os = data.os || 'Unknown';
      this.action = data.action || '';
      this.module = data.module || '';
      this.description = data.description || '';
      this.status = data.status || 'success';
      this.severity = data.severity || 'info';
      this.metadata = data.metadata || {};
      this.createdAt = data.createdAt || new Date().toISOString();
    }
  }

  // ============================================================
  //  SAMPLE DATA
  // ============================================================
  let logs = [
    new SystemLog({
      id: 'LOG-1001', timestamp: '2026-06-28 12:30:00', user: 'Ramesh Kumar', role: 'Super Admin',
      ip: '192.168.1.1', device: 'Desktop', browser: 'Chrome 118', os: 'Windows 11',
      action: 'Login', module: 'Authentication',
      description: 'User logged in successfully',
      status: 'success', severity: 'success'
    }),
    new SystemLog({
      id: 'LOG-1002', timestamp: '2026-06-28 12:15:00', user: 'Sneha Reddy', role: 'Admin',
      ip: '192.168.1.5', device: 'Laptop', browser: 'Firefox 120', os: 'macOS 14',
      action: 'Update', module: 'Products',
      description: 'Updated product: Bengal Pomfret (price changed from ₹450 to ₹470)',
      status: 'success', severity: 'info'
    }),
    new SystemLog({
      id: 'LOG-1003', timestamp: '2026-06-28 11:45:00', user: 'Amit Singh', role: 'Manager',
      ip: '10.0.0.3', device: 'Mobile', browser: 'Safari 17', os: 'iOS 17',
      action: 'Delete', module: 'Customers',
      description: 'Attempted to delete customer account - Failed due to active orders',
      status: 'failed', severity: 'error'
    }),
    new SystemLog({
      id: 'LOG-1004', timestamp: '2026-06-28 11:20:00', user: 'Priya Patel', role: 'Inventory Manager',
      ip: '192.168.1.8', device: 'Desktop', browser: 'Chrome 118', os: 'Windows 11',
      action: 'Import', module: 'Inventory',
      description: 'Imported 45 new inventory items from CSV',
      status: 'success', severity: 'info'
    }),
    new SystemLog({
      id: 'LOG-1005', timestamp: '2026-06-28 10:50:00', user: 'Arjun Nair', role: 'Support',
      ip: '10.0.0.7', device: 'Laptop', browser: 'Edge 120', os: 'Windows 11',
      action: 'Create', module: 'Support',
      description: 'Created support ticket TKT-1006 for customer Priya Sharma',
      status: 'success', severity: 'info'
    }),
    new SystemLog({
      id: 'LOG-1006', timestamp: '2026-06-28 10:30:00', user: 'system', role: 'system',
      ip: '127.0.0.1', device: 'Server', browser: 'N/A', os: 'Linux',
      action: 'Error', module: 'API',
      description: 'Firebase connection timeout - Retry attempted 3 times',
      status: 'failed', severity: 'warning'
    }),
    new SystemLog({
      id: 'LOG-1007', timestamp: '2026-06-28 10:00:00', user: 'unknown', role: 'unknown',
      ip: '203.0.113.45', device: 'Unknown', browser: 'Unknown', os: 'Unknown',
      action: 'Login Attempt', module: 'Authentication',
      description: 'Failed login attempt - Invalid credentials (3 attempts)',
      status: 'failed', severity: 'critical'
    }),
    new SystemLog({
      id: 'LOG-1008', timestamp: '2026-06-28 09:30:00', user: 'Ramesh Kumar', role: 'Super Admin',
      ip: '192.168.1.1', device: 'Desktop', browser: 'Chrome 118', os: 'Windows 11',
      action: 'Publish', module: 'Settings',
      description: 'Published homepage changes - Version 2.3.1',
      status: 'success', severity: 'success'
    }),
    new SystemLog({
      id: 'LOG-1009', timestamp: '2026-06-28 09:00:00', user: 'system', role: 'system',
      ip: '127.0.0.1', device: 'Server', browser: 'N/A', os: 'Linux',
      action: 'Backup', module: 'System',
      description: 'Database backup completed - Size: 245MB',
      status: 'success', severity: 'info'
    }),
    new SystemLog({
      id: 'LOG-1010', timestamp: '2026-06-28 08:30:00', user: 'Meera Iyengar', role: 'Franchise Manager',
      ip: '192.168.1.12', device: 'Laptop', browser: 'Firefox 120', os: 'macOS 14',
      action: 'Approve', module: 'Franchise',
      description: 'Approved franchise application FRAN-1006 - KFC Kochi',
      status: 'success', severity: 'success'
    })
  ];

  let currentLogId = null;

  // ============================================================
  //  SIDEBAR NAVIGATION
  // ============================================================
  const SIDEBAR_NAV = [
    { section: 'Main', items: [
      { label: 'Dashboard', icon: 'fa-th-large', link: '/admin.html' },
      { label: 'Products', icon: 'fa-box', link: '/admin-products.html' },
      { label: 'Categories', icon: 'fa-tags', link: '/admin-categories.html' },
      { label: 'Orders', icon: 'fa-shopping-cart', link: '/admin-orders.html' },
      { label: 'Customers', icon: 'fa-users', link: '/admin-customers.html' },
      { label: 'Inventory', icon: 'fa-warehouse', link: '/admin-inventory.html' },
      { label: 'CRM', icon: 'fa-address-card', link: '/admin-crm.html' },
      { label: 'Franchise', icon: 'fa-store-alt', link: '/admin-franchise.html' },
      { label: 'Reports', icon: 'fa-chart-bar', link: '/admin-reports.html' },
      { label: 'Analytics', icon: 'fa-chart-pie', link: '/admin-analytics.html' },
      { label: 'Settings', icon: 'fa-cog', link: '/admin-settings.html' },
      { label: 'Users', icon: 'fa-users-cog', link: '/admin-users.html' },
      { label: 'Roles', icon: 'fa-lock', link: '/admin-roles.html' },
      { label: 'Notifications', icon: 'fa-bell', link: '/admin-notifications.html' },
      { label: 'Support', icon: 'fa-headset', link: '/admin-support.html' },
      { label: 'System Logs', icon: 'fa-clipboard-list', link: '/admin-system-logs.html', active: true },
    ]}
  ];

  function renderSidebar() {
    const container = document.getElementById('sidebarNav');
    container.innerHTML = SIDEBAR_NAV.map(section => `
      <div class="nav-section">
        <div class="nav-label">${section.section}</div>
        ${section.items.map(item => `
          <a href="${item.link}" class="${item.active ? 'active' : ''}">
            <i class="fas ${item.icon}"></i><span>${item.label}</span>
          </a>
        `).join('')}
      </div>
    `).join('');
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (window.innerWidth <= 1024) { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
    else { sidebar.classList.toggle('collapsed'); }
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  // ============================================================
  //  STATS
  // ============================================================
  function renderStats() {
    const total = logs.length;
    const critical = logs.filter(l => l.severity === 'critical').length;
    const errors = logs.filter(l => l.severity === 'error').length;
    const warnings = logs.filter(l => l.severity === 'warning').length;
    const today = logs.filter(l => new Date(l.timestamp).toDateString() === new Date().toDateString()).length;
    const logins = logs.filter(l => l.action === 'Login' || l.action === 'Login Attempt').length;
    const failed = logs.filter(l => l.status === 'failed').length;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="label">Total Logs</div><div class="value">${total}</div></div>
      <div class="stat-card"><div class="label">Today's Activities</div><div class="value">${today}</div></div>
      <div class="stat-card"><div class="label">Login Attempts</div><div class="value">${logins}</div></div>
      <div class="stat-card"><div class="label">Failed</div><div class="value" style="color:#ef4444;">${failed}</div></div>
      <div class="stat-card"><div class="label">Critical</div><div class="value" style="color:#dc2626;">${critical}</div></div>
      <div class="stat-card"><div class="label">Errors</div><div class="value" style="color:#f59e0b;">${errors}</div></div>
      <div class="stat-card"><div class="label">Warnings</div><div class="value" style="color:#f59e0b;">${warnings}</div></div>
      <div class="stat-card"><div class="label">System Health</div><div class="value" style="color:#22c55e;">${critical === 0 ? 'Good' : '⚠️ Issues'}</div></div>
    `;
  }

  // ============================================================
  //  LOG TABLE
  // ============================================================
  function renderLogs(data = logs) {
    const tbody = document.getElementById('logTableBody');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#94a3b8;">No logs found</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(l => `
      <tr onclick="viewLog('${l.id}')" style="cursor:pointer;">
        <td><strong>${l.id}</strong></td>
        <td style="font-size:0.7rem;">${l.timestamp}</td>
        <td style="font-size:0.75rem;">${l.user}</td>
        <td>${l.action}</td>
        <td><span class="status-badge" style="background:#e0e7ff;color:#3730a3;font-size:0.55rem;">${l.module}</span></td>
        <td><span class="status-badge ${l.status}">${l.status}</span></td>
        <td><span class="severity-badge ${l.severity}">${l.severity}</span></td>
        <td onclick="event.stopPropagation();" class="actions-cell">
          <button onclick="viewLog('${l.id}')" title="View"><i class="fas fa-eye"></i></button>
          <button onclick="deleteLog('${l.id}')" title="Delete"><i class="fas fa-trash" style="color:#ef4444;"></i></button>
        </td>
      </tr>
    `).join('');
  }

  // ============================================================
  //  FILTERS
  // ============================================================
  function filterLogs() {
    const search = document.getElementById('globalSearch').value.toLowerCase();
    const severity = document.getElementById('filterSeverity').value;
    const module = document.getElementById('filterModule').value;
    const date = document.getElementById('filterDate').value;

    let filtered = logs.filter(l => {
      const matchSearch = l.id.toLowerCase().includes(search) ||
                          l.user.toLowerCase().includes(search) ||
                          l.action.toLowerCase().includes(search) ||
                          l.ip.includes(search);
      const matchSeverity = !severity || l.severity === severity;
      const matchModule = !module || l.module === module;
      const matchDate = !date || l.timestamp.slice(0,10) === date;
      return matchSearch && matchSeverity && matchModule && matchDate;
    });
    renderLogs(filtered);
  }

  function refreshLogs() {
    document.getElementById('globalSearch').value = '';
    document.getElementById('filterSeverity').value = '';
    document.getElementById('filterModule').value = '';
    document.getElementById('filterDate').value = '';
    renderLogs(logs);
  }

  // ============================================================
  //  LOG DETAIL VIEW
  // ============================================================
  function viewLog(id) {
    const log = logs.find(l => l.id === id);
    if (!log) return;
    currentLogId = id;
    document.getElementById('drawerTitle').textContent = `Log: ${log.id}`;
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('logDrawer').classList.add('open');

    document.getElementById('logDetailContent').innerHTML = `
      <div class="detail-grid">
        <div class="detail-group">
          <label>Log Information</label>
          <div class="value"><strong>ID:</strong> ${log.id}</div>
          <div class="value"><strong>Timestamp:</strong> ${log.timestamp}</div>
          <div class="value"><strong>Severity:</strong> <span class="severity-badge ${log.severity}">${log.severity}</span></div>
          <div class="value"><strong>Status:</strong> <span class="status-badge ${log.status}">${log.status}</span></div>
        </div>
        <div class="detail-group">
          <label>User Information</label>
          <div class="value"><strong>User:</strong> ${log.user}</div>
          <div class="value"><strong>Role:</strong> ${log.role}</div>
          <div class="value"><strong>IP Address:</strong> ${log.ip}</div>
          <div class="value"><strong>Device:</strong> ${log.device}</div>
          <div class="value"><strong>Browser:</strong> ${log.browser}</div>
          <div class="value"><strong>OS:</strong> ${log.os}</div>
        </div>
        <div class="detail-group" style="grid-column:1/-1;">
          <label>Action Details</label>
          <div class="value"><strong>Action:</strong> ${log.action}</div>
          <div class="value"><strong>Module:</strong> ${log.module}</div>
          <div class="value"><strong>Description:</strong> ${log.description}</div>
        </div>
        ${log.metadata && Object.keys(log.metadata).length > 0 ? `
          <div class="detail-group" style="grid-column:1/-1;">
            <label>Additional Metadata</label>
            <div class="value" style="font-size:0.75rem;color:#64748b;background:#f8fafc;padding:8px;border-radius:6px;white-space:pre-wrap;">${JSON.stringify(log.metadata, null, 2)}</div>
          </div>
        ` : ''}
      </div>
    `;
  }

  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('logDrawer').classList.remove('open');
    currentLogId = null;
  }

  // ============================================================
  //  LOG ACTIONS
  // ============================================================
  function deleteLog(id) {
    const logId = id || currentLogId;
    if (!logId) return;
    if (!confirm(`⚠️ Delete log ${logId}?\n\nOnly Super Admin can permanently delete logs.`)) return;
    logs = logs.filter(l => l.id !== logId);
    renderLogs();
    renderStats();
    if (currentLogId === logId) closeDrawer();
  }

  function clearLogs() {
    if (!confirm('⚠️ Delete ALL logs?\n\nThis action cannot be undone. Only Super Admin can delete logs.')) return;
    if (!confirm('Are you sure? This will permanently remove all log entries.')) return;
    logs = [];
    renderLogs();
    renderStats();
  }

  // ============================================================
  //  INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    renderSidebar();
    renderLogs();
    renderStats();

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDrawer();
    });
  });
</script>
</body>
</html>

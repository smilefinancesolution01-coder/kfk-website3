<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>KFK · Franchise Management</title>
  <meta name="description" content="Master Franchise Management System for KFK Platform" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f6fa;
      color: #0b1a2b;
      line-height: 1.5;
      overflow-x: hidden;
      display: flex;
      min-height: 100vh;
    }
    :root {
      --primary: #0f2b45;
      --accent: #d45c2f;
      --sidebar-width: 260px;
      --sidebar-collapsed: 72px;
      --header-height: 64px;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(0,0,0,0.04);
      --radius: 16px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border);
      z-index: 100;
      transition: width var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 2px 0 12px rgba(0,0,0,0.02);
    }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      height: var(--header-height);
      flex-shrink: 0;
    }
    .sidebar-brand i { font-size: 1.6rem; color: var(--accent); }
    .sidebar-brand span { font-weight: 800; font-size: 1.3rem; color: var(--primary); white-space: nowrap; }
    .sidebar.collapsed .sidebar-brand span { display: none; }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 20px;
    }
    .sidebar-nav .nav-section { margin-bottom: 8px; }
    .sidebar-nav .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      padding: 8px 20px 4px;
      font-weight: 700;
    }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      color: #334155;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.15s;
      border-left: 3px solid transparent;
      white-space: nowrap;
    }
    .sidebar-nav a:hover { background: #f1f5f9; color: var(--primary); }
    .sidebar-nav a.active {
      background: #eef2ff;
      color: var(--primary);
      border-left-color: var(--accent);
    }
    .sidebar-nav a i { width: 22px; text-align: center; font-size: 1rem; color: #64748b; }
    .sidebar-nav a:hover i { color: var(--primary); }
    .sidebar.collapsed .sidebar-nav a span { display: none; }
    .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 12px; }
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .sidebar-footer a {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
    }
    .sidebar-footer a i { width: 22px; }
    .sidebar.collapsed .sidebar-footer a span { display: none; }

    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      transition: margin var(--transition);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

    .topbar {
      height: var(--header-height);
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .toggle-sidebar { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #334155; padding: 4px; }
    .topbar-search {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 40px;
      padding: 4px 16px;
      gap: 8px;
      min-width: 200px;
    }
    .topbar-search input { border: none; background: transparent; padding: 8px 0; outline: none; font-size: 0.9rem; width: 100%; }
    .topbar-actions { display: flex; align-items: center; gap: 16px; }
    .topbar-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #475569; position: relative; padding: 4px; }
    .topbar-actions .badge-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
    .topbar-actions .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer;
    }

    .content { padding: 24px 28px; flex: 1; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 12px 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card .label { font-size: 0.6rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-card .value { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin: 2px 0; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .toolbar-left { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .toolbar-right { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .btn {
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1a3a5a; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: #b84c2a; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: #334155; }
    .btn-outline:hover { background: #f1f5f9; }
    .btn-sm { padding: 5px 14px; font-size: 0.75rem; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-warning:hover { background: #d97706; }

    .table-wrap {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: auto;
      box-shadow: var(--shadow);
    }
    .table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 1200px; }
    th {
      text-align: left;
      padding: 10px 12px;
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:hover td { background: #f8fafc; }
    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.6rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .status-badge.kyc-pending { background: #fef3c7; color: #92400e; }
    .status-badge.approved { background: #dcfce7; color: #166534; }
    .status-badge.rejected { background: #fee2e2; color: #991b1b; }
    .status-badge.active { background: #dbeafe; color: #1e40af; }
    .status-badge.inactive { background: #f1f5f9; color: #64748b; }
    .status-badge.premium { background: #f3e8ff; color: #6d28d9; }
    .status-badge.gold { background: #fef3c7; color: #92400e; }
    .status-badge.basic { background: #e0e7ff; color: #3730a3; }
    .actions-cell { display: flex; gap: 4px; flex-wrap: wrap; }
    .actions-cell button {
      background: none;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
      color: #64748b;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .actions-cell button:hover { background: #f1f5f9; color: var(--primary); }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      display: none;
      backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: block; }
    .franchise-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 820px;
      max-width: 94vw;
      height: 100%;
      background: white;
      z-index: 210;
      box-shadow: -8px 0 30px rgba(0,0,0,0.1);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .franchise-drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background: white;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .drawer-header h2 { font-size: 1.1rem; font-weight: 700; }
    .drawer-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #64748b; }
    .drawer-body { padding: 20px 24px; flex: 1; overflow-y: auto; }
    .drawer-footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
      background: white;
      position: sticky;
      bottom: 0;
      flex-wrap: wrap;
    }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .detail-group { margin-bottom: 12px; }
    .detail-group label { font-weight: 600; font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.3px; display: block; }
    .detail-group .value { font-size: 0.9rem; margin-top: 2px; }
    .timeline-item {
      display: flex; gap: 12px; padding: 6px 0; border-bottom: 1px solid #f1f5f9;
    }
    .timeline-item .time { font-size: 0.7rem; color: #94a3b8; min-width: 140px; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,0.2); }
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .sidebar.collapsed ~ .main { margin-left: 0; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; }
      .topbar-search { min-width: 120px; flex: 1; }
      .content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; align-items: stretch; }
      .franchise-drawer { width: 100%; max-width: 100%; }
      .drawer-body { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><i class="fas fa-fish"></i><span>KFK Admin</span></div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="/admin-profile.html"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    <a href="/logout.html"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-search"><i class="fas fa-search" style="color:#94a3b8;"></i><input type="text" placeholder="Search franchise..." id="globalSearch" onkeyup="filterFranchise()" /></div>
    </div>
    <div class="topbar-actions">
      <button><i class="far fa-bell"></i><span class="badge-dot"></span></button>
      <button><i class="far fa-envelope"></i></button>
      <div class="avatar" onclick="location.href='/admin-profile.html'">A</div>
    </div>
  </header>

  <div class="content">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-accent" onclick="openDrawer()"><i class="fas fa-plus"></i> Add Application</button>
        <button class="btn btn-outline btn-sm"><i class="fas fa-file-export"></i> Export</button>
        <button class="btn btn-outline btn-sm" onclick="refreshFranchise()"><i class="fas fa-sync"></i> Refresh</button>
      </div>
      <div class="toolbar-right">
        <select id="filterStatus" onchange="filterFranchise()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="kyc-pending">KYC Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
        <select id="filterPlan" onchange="filterFranchise()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Plans</option>
          <option value="basic">Basic</option>
          <option value="premium">Premium</option>
          <option value="gold">Gold</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table id="franchiseTable">
        <thead>
          <tr>
            <th>Franchise ID</th>
            <th>Code</th>
            <th>Name</th>
            <th>Contact</th>
            <th>City</th>
            <th>Plan</th>
            <th>Status</th>
            <th>KYC</th>
            <th>Cloud Kitchen</th>
            <th style="width:100px;">Actions</th>
          </tr>
        </thead>
        <tbody id="franchiseTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Franchise Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="franchise-drawer" id="franchiseDrawer">
  <div class="drawer-header">
    <h2 id="drawerTitle">Franchise Profile</h2>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
  </div>
  <div class="drawer-body" id="franchiseDetailContent"></div>
  <div class="drawer-footer" id="franchiseDetailActions">
    <button class="btn btn-sm btn-outline" onclick="closeDrawer()">Close</button>
    <button class="btn btn-sm btn-success" onclick="approveFranchise()"><i class="fas fa-check"></i> Approve</button>
    <button class="btn btn-sm btn-warning" onclick="sendWelcome()"><i class="fas fa-envelope"></i> Welcome</button>
    <button class="btn btn-sm btn-primary" onclick="createDashboard()"><i class="fas fa-user-plus"></i> Create Login</button>
  </div>
</div>

<script>
  // ============================================================
  //  FRANCHISE MODEL — Firebase Ready
  // ============================================================
  class Franchise {
    constructor(data = {}) {
      this.id = data.id || 'FRAN-' + Date.now().toString().slice(-8);
      this.code = data.code || 'KFK-' + Date.now().toString().slice(-6);
      this.applicantName = data.applicantName || '';
      this.phone = data.phone || '';
      this.whatsapp = data.whatsapp || '';
      this.email = data.email || '';
      this.city = data.city || '';
      this.state = data.state || '';
      this.territory = data.territory || '';
      this.plan = data.plan || 'basic';
      this.status = data.status || 'pending';
      this.kycStatus = data.kycStatus || 'pending';
      this.paymentStatus = data.paymentStatus || 'pending';
      this.agreementStatus = data.agreementStatus || 'pending';
      this.cloudKitchenStatus = data.cloudKitchenStatus || 'not-started';
      this.assignedManager = data.assignedManager || 'Unassigned';
      this.documents = data.documents || { pan: '', aadhaar: '', gst: '', fssai: '' };
      this.address = data.address || '';
      this.notes = data.notes || [];
      this.timeline = data.timeline || [{ event: 'Application created', time: new Date().toISOString() }];
      this.appliedDate = data.appliedDate || new Date().toISOString();
      this.approvedDate = data.approvedDate || '';
      this.updatedAt = new Date().toISOString();
    }
  }

  ];

  const franchisePlans = ['basic', 'premium', 'gold'];
  const managers = ['Ramesh Kumar', 'Sneha Reddy', 'Amit Singh', 'Priya Patel'];

  let currentFranchiseId = null;

  // ============================================================
  //  SIDEBAR NAVIGATION
  // ============================================================
  const SIDEBAR_NAV = [
    { section: 'Main', items: [
      { label: 'Dashboard', icon: 'fa-th-large', link: '/admin.html' },
      { label: 'Products', icon: 'fa-box', link: '/admin-products.html' },
      { label: 'Categories', icon: 'fa-tags', link: '/admin-categories.html' },
      { label: 'Orders', icon: 'fa-shopping-cart', link: '/admin-orders.html' },
      { label: 'Customers', icon: 'fa-users', link: '/admin-customers.html' },
      { label: 'Inventory', icon: 'fa-warehouse', link: '/admin-inventory.html' },
      { label: 'CRM', icon: 'fa-address-card', link: '/admin-crm.html' },
      { label: 'Franchise', icon: 'fa-store-alt', link: '/admin-franchise.html', active: true },
    ]},
    { section: 'Content', items: [
      { label: 'Homepage Manager', icon: 'fa-home', link: '/admin-homepage.html' },
      { label: 'Marketplace Manager', icon: 'fa-store', link: '/admin-marketplace.html' },
    ]},
    { section: 'Business', items: [
      { label: 'Reports', icon: 'fa-chart-bar', link: '/admin-reports.html' },
      { label: 'Settings', icon: 'fa-cog', link: '/admin-settings.html' },
    ]}
  ];

  function renderSidebar() {
    const container = document.getElementById('sidebarNav');
    container.innerHTML = SIDEBAR_NAV.map(section => `
      <div class="nav-section">
        <div class="nav-label">${section.section}</div>
        ${section.items.map(item => `
          <a href="${item.link}" class="${item.active ? 'active' : ''}">
            <i class="fas ${item.icon}"></i><span>${item.label}</span>
          </a>
        `).join('')}
      </div>
    `).join('');
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (window.innerWidth <= 1024) { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
    else { sidebar.classList.toggle('collapsed'); }
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  // ============================================================
  //  STATS
  // ============================================================
  function renderStats() {
    const total = franchises.length;
    const pending = franchises.filter(f => f.status === 'pending').length;
    const kycPending = franchises.filter(f => f.kycStatus === 'pending').length;
    const approved = franchises.filter(f => f.status === 'active' || f.status === 'approved').length;
    const active = franchises.filter(f => f.status === 'active').length;
    const premium = franchises.filter(f => f.plan === 'premium').length;
    const cloudKitchens = franchises.filter(f => f.cloudKitchenStatus === 'operational' || f.cloudKitchenStatus === 'setup').length;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="label">Total Applications</div><div class="value">${total}</div></div>
      <div class="stat-card"><div class="label">Pending</div><div class="value" style="color:#f59e0b;">${pending}</div></div>
      <div class="stat-card"><div class="label">KYC Pending</div><div class="value" style="color:#ef4444;">${kycPending}</div></div>
      <div class="stat-card"><div class="label">Approved</div><div class="value" style="color:#22c55e;">${approved}</div></div>
      <div class="stat-card"><div class="label">Active Franchise</div><div class="value" style="color:#3b82f6;">${active}</div></div>
      <div class="stat-card"><div class="label">Premium</div><div class="value" style="color:#6d28d9;">${premium}</div></div>
      <div class="stat-card"><div class="label">Cloud Kitchens</div><div class="value" style="color:#0ea5e9;">${cloudKitchens}</div></div>
    `;
  }

  // ============================================================
  //  FRANCHISE TABLE
  // ============================================================
  function renderFranchise(data = franchises) {
    const tbody = document.getElementById('franchiseTableBody');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:#94a3b8;">No franchise applications found</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(f => `
      <tr onclick="viewFranchise('${f.id}')" style="cursor:pointer;">
        <td><strong>${f.id}</strong></td>
        <td style="font-size:0.7rem;color:#64748b;">${f.code}</td>
        <td>${f.applicantName}</td>
        <td style="font-size:0.7rem;">${f.phone}<br/><span style="color:#94a3b8;">${f.email}</span></td>
        <td>${f.city}</td>
        <td><span class="status-badge ${f.plan}">${f.plan}</span></td>
        <td><span class="status-badge ${f.status}">${f.status}</span></td>
        <td><span class="status-badge ${f.kycStatus}">${f.kycStatus}</span></td>
        <td><span class="status-badge" style="background:#e0e7ff;color:#3730a3;">${f.cloudKitchenStatus}</span></td>
        <td onclick="event.stopPropagation();" class="actions-cell">
          <button onclick="viewFranchise('${f.id}')" title="View"><i class="fas fa-eye"></i></button>
          <button onclick="approveFranchise('${f.id}')" title="Approve"><i class="fas fa-check-circle" style="color:#22c55e;"></i></button>
          <button onclick="openDrawer('${f.id}')" title="Edit"><i class="fas fa-edit"></i></button>
        </td>
      </tr>
    `).join('');
  }

  // ============================================================
  //  FILTERS
  // ============================================================
  function filterFranchise() {
    const search = document.getElementById('globalSearch').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const plan = document.getElementById('filterPlan').value;

    let filtered = franchises.filter(f => {
      const matchSearch = f.id.toLowerCase().includes(search) ||
                          f.code.toLowerCase().includes(search) ||
                          f.applicantName.toLowerCase().includes(search) ||
                          f.phone.includes(search);
      const matchStatus = !status || f.status === status;
      const matchPlan = !plan || f.plan === plan;
      return matchSearch && matchStatus && matchPlan;
    });
    renderFranchise(filtered);
  }

  function refreshFranchise() {
    document.getElementById('globalSearch').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterPlan').value = '';
    renderFranchise(franchises);
  }

  // ============================================================
  //  FRANCHISE PROFILE VIEW
  // ============================================================
  function viewFranchise(id) {
    const franchise = franchises.find(f => f.id === id);
    if (!franchise) return;
    currentFranchiseId = id;
    document.getElementById('drawerTitle').textContent = `Franchise: ${franchise.applicantName}`;
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('franchiseDrawer').classList.add('open');

    const timelineHtml = franchise.timeline.map(t => `
      <div class="timeline-item">
        <div class="time">${new Date(t.time).toLocaleString()}</div>
        <div>${t.event}</div>
      </div>
    `).join('');

    const notesHtml = franchise.notes.map(n => `
      <div class="timeline-item">
        <div class="time">${new Date(n.time).toLocaleString()}</div>
        <div>${n.note}</div>
      </div>
    `).join('');

    document.getElementById('franchiseDetailContent').innerHTML = `
      <div class="detail-grid">
        <div class="detail-group">
          <label>Personal Information</label>
          <div class="value"><strong>${franchise.applicantName}</strong></div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">📞 ${franchise.phone}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">💬 ${franchise.whatsapp}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">✉️ ${franchise.email}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">📍 ${franchise.city}, ${franchise.state}</div>
        </div>
        <div class="detail-group">
          <label>Franchise Details</label>
          <div class="value">ID: ${franchise.id}</div>
          <div class="value">Code: ${franchise.code}</div>
          <div class="value">Plan: <span class="status-badge ${franchise.plan}">${franchise.plan}</span></div>
          <div class="value">Territory: ${franchise.territory}</div>
          <div class="value">Manager: ${franchise.assignedManager}</div>
        </div>
        <div class="detail-group">
          <label>Status</label>
          <div class="value">Application: <span class="status-badge ${franchise.status}">${franchise.status}</span></div>
          <div class="value">KYC: <span class="status-badge ${franchise.kycStatus}">${franchise.kycStatus}</span></div>
          <div class="value">Payment: <span class="status-badge ${franchise.paymentStatus}">${franchise.paymentStatus}</span></div>
          <div class="value">Agreement: <span class="status-badge ${franchise.agreementStatus}">${franchise.agreementStatus}</span></div>
          <div class="value">Cloud Kitchen: ${franchise.cloudKitchenStatus}</div>
        </div>
        <div class="detail-group">
          <label>Address</label>
          <div class="value">${franchise.address}</div>
        </div>
      </div>

      <div style="margin:16px 0;">
        <h4 style="font-size:0.9rem;font-weight:700;margin-bottom:8px;">Notes</h4>
        ${notesHtml || '<p style="color:#94a3b8;">No notes</p>'}
      </div>

      <div style="margin:16px 0;">
        <h4 style="font-size:0.9rem;font-weight:700;margin-bottom:8px;">Timeline</h4>
        ${timelineHtml || '<p style="color:#94a3b8;">No timeline</p>'}
      </div>
    `;
  }

  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('franchiseDrawer').classList.remove('open');
    currentFranchiseId = null;
  }

  // ============================================================
  //  FRANCHISE ACTIONS
  // ============================================================
  function openDrawer(id = null) {
    alert('Add/Edit Franchise Application\n\nFirebase ready: This will open a full franchise application form.\n\nFields: Personal Details, Business Details, Address, Plan, Territory, Documents, etc.');
  }

  function approveFranchise(id) {
    const franchise = franchises.find(f => f.id === (id || currentFranchiseId));
    if (!franchise) return;
    if (!confirm(`Approve franchise application for ${franchise.applicantName}?`)) return;
    franchise.status = 'active';
    franchise.approvedDate = new Date().toISOString();
    franchise.timeline.push({ event: 'Franchise approved', time: new Date().toISOString() });
    renderFranchise();
    renderStats();
    if (currentFranchiseId) viewFranchise(currentFranchiseId);
    alert(`✅ Franchise ${franchise.code} approved!\n\nFirebase ready: This will trigger:\n- Generate Franchise ID\n- Create Login Credentials\n- Send Welcome Email\n- Send WhatsApp\n- Send SMS\n- Assign Dashboard Access`);
  }

  function sendWelcome() {
    const franchise = franchises.find(f => f.id === currentFranchiseId);
    if (!franchise) return;
    alert(`📧 Sending Welcome to ${franchise.applicantName} (${franchise.email})\n\nFirebase ready: This will send:\n- Welcome Email\n- WhatsApp Message\n- SMS\n- Login Credentials\n- Dashboard Access Link`);
  }

  function createDashboard() {
    const franchise = franchises.find(f => f.id === currentFranchiseId);
    if (!franchise) return;
    alert(`👤 Creating Dashboard Access for ${franchise.applicantName}\n\nFirebase ready: This will:\n- Create User Account\n- Assign Franchise Role\n- Set Permissions\n- Generate Password\n- Send Credentials`);
  }

  // ============================================================
  //  INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    renderSidebar();
    renderFranchise();
    renderStats();

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDrawer();
    });
  });
</script>
</body>
</html>

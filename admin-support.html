<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>KFK · Support Center</title>
  <meta name="description" content="Master Customer & Franchise Support Center for KFK Platform" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f6fa;
      color: #0b1a2b;
      line-height: 1.5;
      overflow-x: hidden;
      display: flex;
      min-height: 100vh;
    }
    :root {
      --primary: #0f2b45;
      --accent: #d45c2f;
      --sidebar-width: 260px;
      --sidebar-collapsed: 72px;
      --header-height: 64px;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(0,0,0,0.04);
      --radius: 16px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border);
      z-index: 100;
      transition: width var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 2px 0 12px rgba(0,0,0,0.02);
    }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      height: var(--header-height);
      flex-shrink: 0;
    }
    .sidebar-brand i { font-size: 1.6rem; color: var(--accent); }
    .sidebar-brand span { font-weight: 800; font-size: 1.3rem; color: var(--primary); white-space: nowrap; }
    .sidebar.collapsed .sidebar-brand span { display: none; }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 20px;
    }
    .sidebar-nav .nav-section { margin-bottom: 8px; }
    .sidebar-nav .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      padding: 8px 20px 4px;
      font-weight: 700;
    }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      color: #334155;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.15s;
      border-left: 3px solid transparent;
      white-space: nowrap;
    }
    .sidebar-nav a:hover { background: #f1f5f9; color: var(--primary); }
    .sidebar-nav a.active {
      background: #eef2ff;
      color: var(--primary);
      border-left-color: var(--accent);
    }
    .sidebar-nav a i { width: 22px; text-align: center; font-size: 1rem; color: #64748b; }
    .sidebar-nav a:hover i { color: var(--primary); }
    .sidebar.collapsed .sidebar-nav a span { display: none; }
    .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 12px; }
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .sidebar-footer a {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
    }
    .sidebar-footer a i { width: 22px; }
    .sidebar.collapsed .sidebar-footer a span { display: none; }

    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      transition: margin var(--transition);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

    .topbar {
      height: var(--header-height);
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .toggle-sidebar { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #334155; padding: 4px; }
    .topbar-search {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 40px;
      padding: 4px 16px;
      gap: 8px;
      min-width: 200px;
    }
    .topbar-search input { border: none; background: transparent; padding: 8px 0; outline: none; font-size: 0.9rem; width: 100%; }
    .topbar-actions { display: flex; align-items: center; gap: 16px; }
    .topbar-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #475569; position: relative; padding: 4px; }
    .topbar-actions .badge-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
    .topbar-actions .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer;
    }

    .content { padding: 24px 28px; flex: 1; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 12px 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card .label { font-size: 0.6rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-card .value { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin: 2px 0; }
    .stat-card .change { font-size: 0.6rem; color: #22c55e; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .toolbar-left { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .toolbar-right { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .btn {
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1a3a5a; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: #b84c2a; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: #334155; }
    .btn-outline:hover { background: #f1f5f9; }
    .btn-sm { padding: 5px 14px; font-size: 0.75rem; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-warning:hover { background: #d97706; }

    .table-wrap {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: auto;
      box-shadow: var(--shadow);
    }
    .table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 1100px; }
    th {
      text-align: left;
      padding: 10px 12px;
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:hover td { background: #f8fafc; }
    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.6rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .status-badge.open { background: #dbeafe; color: #1e40af; }
    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .status-badge.resolved { background: #dcfce7; color: #166534; }
    .status-badge.closed { background: #f1f5f9; color: #64748b; }
    .priority-badge { display: inline-block; padding: 2px 10px; border-radius: 40px; font-size: 0.6rem; font-weight: 600; }
    .priority-badge.critical { background: #fee2e2; color: #991b1b; }
    .priority-badge.high { background: #fecaca; color: #7f1d1d; }
    .priority-badge.medium { background: #fef3c7; color: #92400e; }
    .priority-badge.low { background: #dbeafe; color: #1e40af; }
    .actions-cell { display: flex; gap: 4px; flex-wrap: wrap; }
    .actions-cell button {
      background: none;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
      color: #64748b;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .actions-cell button:hover { background: #f1f5f9; color: var(--primary); }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      display: none;
      backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: block; }
    .ticket-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 820px;
      max-width: 94vw;
      height: 100%;
      background: white;
      z-index: 210;
      box-shadow: -8px 0 30px rgba(0,0,0,0.1);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .ticket-drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background: white;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .drawer-header h2 { font-size: 1.1rem; font-weight: 700; }
    .drawer-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #64748b; }
    .drawer-body { padding: 20px 24px; flex: 1; overflow-y: auto; }
    .drawer-footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
      background: white;
      position: sticky;
      bottom: 0;
      flex-wrap: wrap;
    }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .detail-group { margin-bottom: 12px; }
    .detail-group label { font-weight: 600; font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.3px; display: block; }
    .detail-group .value { font-size: 0.9rem; margin-top: 2px; }
    .conversation-item {
      display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f1f5f9;
    }
    .conversation-item .avatar-sm {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.7rem;
      flex-shrink: 0;
    }
    .conversation-item .msg-content { flex: 1; }
    .conversation-item .msg-content .msg-meta { font-size: 0.7rem; color: #94a3b8; }
    .conversation-item .msg-content .msg-text { font-size: 0.85rem; margin-top: 4px; }
    .conversation-item .msg-content .msg-text.internal { background: #fef3c7; padding: 6px 12px; border-radius: 8px; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group label {
      font-weight: 600;
      font-size: 0.75rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-group input, .form-group select, .form-group textarea {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: inherit;
      transition: 0.15s;
      background: white;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(15,43,69,0.1);
    }
    .form-group textarea { min-height: 60px; resize: vertical; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 89; background: rgba(0,0,0,0.2); }
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .sidebar.collapsed ~ .main { margin-left: 0; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; }
      .topbar-search { min-width: 120px; flex: 1; }
      .content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; align-items: stretch; }
      .ticket-drawer { width: 100%; max-width: 100%; }
      .drawer-body { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><i class="fas fa-fish"></i><span>KFK Admin</span></div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a href="/admin-profile.html"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    <a href="/logout.html"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-search"><i class="fas fa-search" style="color:#94a3b8;"></i><input type="text" placeholder="Search tickets..." id="globalSearch" onkeyup="filterTickets()" /></div>
    </div>
    <div class="topbar-actions">
      <button><i class="far fa-bell"></i><span class="badge-dot"></span></button>
      <button><i class="far fa-envelope"></i></button>
      <div class="avatar" onclick="location.href='/admin-profile.html'">A</div>
    </div>
  </header>

  <div class="content">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-accent" onclick="openNewTicket()"><i class="fas fa-plus"></i> New Ticket</button>
        <button class="btn btn-outline btn-sm"><i class="fas fa-file-export"></i> Export</button>
        <button class="btn btn-outline btn-sm" onclick="refreshTickets()"><i class="fas fa-sync"></i> Refresh</button>
      </div>
      <div class="toolbar-right">
        <select id="filterStatus" onchange="filterTickets()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Status</option>
          <option value="open">Open</option>
          <option value="pending">Pending</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
        </select>
        <select id="filterPriority" onchange="filterTickets()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Priority</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select id="filterCategory" onchange="filterTickets()" style="padding:6px 12px;border-radius:40px;border:1px solid var(--border);background:white;font-size:0.8rem;">
          <option value="">All Categories</option>
          <option value="Orders">Orders</option>
          <option value="Payments">Payments</option>
          <option value="Delivery">Delivery</option>
          <option value="Franchise">Franchise</option>
          <option value="Technical">Technical</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table id="ticketTable">
        <thead>
          <tr>
            <th>Ticket ID</th>
            <th>Subject</th>
            <th>Customer</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Assigned To</th>
            <th>Status</th>
            <th>Created</th>
            <th style="width:100px;">Actions</th>
          </tr>
        </thead>
        <tbody id="ticketTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Ticket Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="ticket-drawer" id="ticketDrawer">
  <div class="drawer-header">
    <h2 id="drawerTitle">Ticket Details</h2>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
  </div>
  <div class="drawer-body" id="ticketDetailContent"></div>
  <div class="drawer-footer" id="ticketDetailActions">
    <button class="btn btn-sm btn-outline" onclick="closeDrawer()">Close</button>
    <button class="btn btn-sm btn-success" onclick="resolveTicket()"><i class="fas fa-check"></i> Resolve</button>
    <button class="btn btn-sm btn-warning" onclick="assignTicket()"><i class="fas fa-user"></i> Assign</button>
    <button class="btn btn-sm btn-primary" onclick="addReply()"><i class="fas fa-reply"></i> Reply</button>
  </div>
</div>

<script>
  // ============================================================
  //  TICKET MODEL — Firebase Ready
  // ============================================================
  class Ticket {
    constructor(data = {}) {
      this.id = data.id || 'TKT-' + Date.now().toString().slice(-8);
      this.subject = data.subject || '';
      this.customer = data.customer || { name: '', phone: '', email: '' };
      this.category = data.category || 'Other';
      this.priority = data.priority || 'medium';
      this.assignedTo = data.assignedTo || 'Unassigned';
      this.status = data.status || 'open';
      this.sla = data.sla || null;
      this.conversation = data.conversation || [];
      this.notes = data.notes || [];
      this.createdAt = data.createdAt || new Date().toISOString();
      this.updatedAt = new Date().toISOString();
    }
  }

  // ============================================================
  //  SAMPLE DATA
  // ============================================================
  let tickets = [
    new Ticket({
      id: 'TKT-1001', subject: 'Order #ORD-1001 not delivered',
      customer: { name: 'Priya Sharma', phone: '9876543210', email: 'priya@example.com' },
      category: 'Delivery', priority: 'high',
      assignedTo: 'Ramesh Kumar', status: 'open',
      conversation: [
        { from: 'priya@example.com', message: 'My order #ORD-1001 was supposed to be delivered today but I haven\'t received it.', time: '2026-06-28 10:30:00', type: 'customer' },
        { from: 'support@kfk.in', message: 'Checking with the delivery team. Will update shortly.', time: '2026-06-28 11:00:00', type: 'agent' }
      ]
    }),
    new Ticket({
      id: 'TKT-1002', subject: 'Payment failed for order #ORD-1002',
      customer: { name: 'Rahul Verma', phone: '8765432109', email: 'rahul@example.com' },
      category: 'Payments', priority: 'critical',
      assignedTo: 'Sneha Reddy', status: 'pending',
      conversation: [
        { from: 'rahul@example.com', message: 'My payment of ₹1,299 failed twice. Please help.', time: '2026-06-28 09:15:00', type: 'customer' }
      ]
    }),
    new Ticket({
      id: 'TKT-1003', subject: 'Franchise application document upload issue',
      customer: { name: 'Ananya Reddy', phone: '7654321098', email: 'ananya@example.com' },
      category: 'Franchise', priority: 'medium',
      assignedTo: 'Priya Patel', status: 'open',
      conversation: [
        { from: 'ananya@example.com', message: 'Unable to upload PAN card for franchise application.', time: '2026-06-27 16:45:00', type: 'customer' },
        { from: 'support@kfk.in', message: 'We\'re looking into the upload issue. Try clearing your browser cache.', time: '2026-06-27 17:30:00', type: 'agent' }
      ]
    }),
    new Ticket({
      id: 'TKT-1004', subject: 'Wrong item received in order',
      customer: { name: 'Vikram Singh', phone: '6543210987', email: 'vikram@example.com' },
      category: 'Orders', priority: 'high',
      assignedTo: 'Amit Singh', status: 'resolved',
      conversation: [
        { from: 'vikram@example.com', message: 'Received Tiger Prawns instead of Bengal Pomfret.', time: '2026-06-27 14:00:00', type: 'customer' },
        { from: 'support@kfk.in', message: 'We apologize. We\'ll resend the correct item immediately.', time: '2026-06-27 14:30:00', type: 'agent' },
        { from: 'support@kfk.in', message: 'Item resend initiated. Tracking: TRK-2026-1004', time: '2026-06-27 15:00:00', type: 'agent' },
        { from: 'vikram@example.com', message: 'Thank you for the quick resolution.', time: '2026-06-27 16:00:00', type: 'customer' }
      ]
    }),
    new Ticket({
      id: 'TKT-1005', subject: 'Cannot access franchise dashboard',
      customer: { name: 'Neha Patel', phone: '5432109876', email: 'neha@example.com' },
      category: 'Technical', priority: 'low',
      assignedTo: 'Unassigned', status: 'open',
      conversation: [
        { from: 'neha@example.com', message: 'Getting 403 error on franchise dashboard login.', time: '2026-06-28 08:30:00', type: 'customer' }
      ]
    })
  ];

  const categories = ['Orders', 'Payments', 'Refund', 'Delivery', 'Products', 'Inventory', 'Franchise', 'Cloud Kitchen', 'Technical', 'Website', 'CRM', 'Marketing', 'Other'];
  const agents = ['Ramesh Kumar', 'Sneha Reddy', 'Amit Singh', 'Priya Patel', 'Arjun Nair'];
  const priorities = ['low', 'medium', 'high', 'critical'];
  const statuses = ['open', 'pending', 'resolved', 'closed'];

  let currentTicketId = null;

  // ============================================================
  //  SIDEBAR NAVIGATION
  // ============================================================
  const SIDEBAR_NAV = [
    { section: 'Main', items: [
      { label: 'Dashboard', icon: 'fa-th-large', link: '/admin.html' },
      { label: 'Products', icon: 'fa-box', link: '/admin-products.html' },
      { label: 'Categories', icon: 'fa-tags', link: '/admin-categories.html' },
      { label: 'Orders', icon: 'fa-shopping-cart', link: '/admin-orders.html' },
      { label: 'Customers', icon: 'fa-users', link: '/admin-customers.html' },
      { label: 'Inventory', icon: 'fa-warehouse', link: '/admin-inventory.html' },
      { label: 'CRM', icon: 'fa-address-card', link: '/admin-crm.html' },
      { label: 'Franchise', icon: 'fa-store-alt', link: '/admin-franchise.html' },
      { label: 'Reports', icon: 'fa-chart-bar', link: '/admin-reports.html' },
      { label: 'Settings', icon: 'fa-cog', link: '/admin-settings.html' },
      { label: 'Users', icon: 'fa-users-cog', link: '/admin-users.html' },
      { label: 'Roles', icon: 'fa-lock', link: '/admin-roles.html' },
      { label: 'Notifications', icon: 'fa-bell', link: '/admin-notifications.html' },
      { label: 'Support', icon: 'fa-headset', link: '/admin-support.html', active: true },
    ]}
  ];

  function renderSidebar() {
    const container = document.getElementById('sidebarNav');
    container.innerHTML = SIDEBAR_NAV.map(section => `
      <div class="nav-section">
        <div class="nav-label">${section.section}</div>
        ${section.items.map(item => `
          <a href="${item.link}" class="${item.active ? 'active' : ''}">
            <i class="fas ${item.icon}"></i><span>${item.label}</span>
          </a>
        `).join('')}
      </div>
    `).join('');
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (window.innerWidth <= 1024) { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
    else { sidebar.classList.toggle('collapsed'); }
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  // ============================================================
  //  STATS
  // ============================================================
  function renderStats() {
    const total = tickets.length;
    const open = tickets.filter(t => t.status === 'open').length;
    const pending = tickets.filter(t => t.status === 'pending').length;
    const resolved = tickets.filter(t => t.status === 'resolved').length;
    const closed = tickets.filter(t => t.status === 'closed').length;
    const high = tickets.filter(t => t.priority === 'high' || t.priority === 'critical').length;
    const today = tickets.filter(t => new Date(t.createdAt).toDateString() === new Date().toDateString()).length;
    const avgResolution = resolved > 0 ? '4.2h' : '—';

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="label">Open Tickets</div><div class="value" style="color:#3b82f6;">${open}</div></div>
      <div class="stat-card"><div class="label">Pending</div><div class="value" style="color:#f59e0b;">${pending}</div></div>
      <div class="stat-card"><div class="label">Resolved</div><div class="value" style="color:#22c55e;">${resolved}</div></div>
      <div class="stat-card"><div class="label">Closed</div><div class="value" style="color:#94a3b8;">${closed}</div></div>
      <div class="stat-card"><div class="label">High Priority</div><div class="value" style="color:#ef4444;">${high}</div></div>
      <div class="stat-card"><div class="label">Today's Tickets</div><div class="value">${today}</div></div>
      <div class="stat-card"><div class="label">Total Tickets</div><div class="value">${total}</div></div>
      <div class="stat-card"><div class="label">Avg Resolution</div><div class="value">${avgResolution}</div></div>
    `;
  }

  // ============================================================
  //  TICKET TABLE
  // ============================================================
  function renderTickets(data = tickets) {
    const tbody = document.getElementById('ticketTableBody');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:#94a3b8;">No tickets found</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(t => `
      <tr onclick="viewTicket('${t.id}')" style="cursor:pointer;">
        <td><strong>${t.id}</strong></td>
        <td>${t.subject}</td>
        <td style="font-size:0.7rem;">${t.customer.name}<br/><span style="color:#94a3b8;">${t.customer.phone}</span></td>
        <td><span class="status-badge" style="background:#e0e7ff;color:#3730a3;">${t.category}</span></td>
        <td><span class="priority-badge ${t.priority}">${t.priority}</span></td>
        <td style="font-size:0.75rem;">${t.assignedTo}</td>
        <td><span class="status-badge ${t.status}">${t.status}</span></td>
        <td style="font-size:0.7rem;">${new Date(t.createdAt).toLocaleDateString()}</td>
        <td onclick="event.stopPropagation();" class="actions-cell">
          <button onclick="viewTicket('${t.id}')" title="View"><i class="fas fa-eye"></i></button>
          <button onclick="replyTicket('${t.id}')" title="Reply"><i class="fas fa-reply"></i></button>
          <button onclick="resolveTicket('${t.id}')" title="Resolve"><i class="fas fa-check-circle" style="color:#22c55e;"></i></button>
        </td>
      </tr>
    `).join('');
  }

  // ============================================================
  //  FILTERS
  // ============================================================
  function filterTickets() {
    const search = document.getElementById('globalSearch').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const priority = document.getElementById('filterPriority').value;
    const category = document.getElementById('filterCategory').value;

    let filtered = tickets.filter(t => {
      const matchSearch = t.id.toLowerCase().includes(search) ||
                          t.subject.toLowerCase().includes(search) ||
                          t.customer.name.toLowerCase().includes(search) ||
                          t.customer.phone.includes(search);
      const matchStatus = !status || t.status === status;
      const matchPriority = !priority || t.priority === priority;
      const matchCategory = !category || t.category === category;
      return matchSearch && matchStatus && matchPriority && matchCategory;
    });
    renderTickets(filtered);
  }

  function refreshTickets() {
    document.getElementById('globalSearch').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterPriority').value = '';
    document.getElementById('filterCategory').value = '';
    renderTickets(tickets);
  }

  // ============================================================
  //  TICKET DETAIL VIEW
  // ============================================================
  function viewTicket(id) {
    const ticket = tickets.find(t => t.id === id);
    if (!ticket) return;
    currentTicketId = id;
    document.getElementById('drawerTitle').textContent = `Ticket: ${ticket.id} - ${ticket.subject}`;
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('ticketDrawer').classList.add('open');

    const conversationHtml = ticket.conversation.map(msg => {
      const isAgent = msg.type === 'agent';
      const initials = isAgent ? 'A' : ticket.customer.name.charAt(0);
      const isInternal = msg.type === 'internal';
      return `
        <div class="conversation-item">
          <div class="avatar-sm" style="background:${isAgent ? 'var(--accent)' : 'var(--primary)'};">${initials}</div>
          <div class="msg-content">
            <div class="msg-meta">${msg.from} · ${msg.time}</div>
            <div class="msg-text ${isInternal ? 'internal' : ''}">${msg.message}</div>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('ticketDetailContent').innerHTML = `
      <div class="detail-grid">
        <div class="detail-group">
          <label>Customer Information</label>
          <div class="value"><strong>${ticket.customer.name}</strong></div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">📞 ${ticket.customer.phone}</div>
          <div class="value" style="font-size:0.8rem;color:#64748b;">✉️ ${ticket.customer.email}</div>
        </div>
        <div class="detail-group">
          <label>Ticket Details</label>
          <div class="value">ID: ${ticket.id}</div>
          <div class="value">Category: <span class="status-badge" style="background:#e0e7ff;color:#3730a3;">${ticket.category}</span></div>
          <div class="value">Priority: <span class="priority-badge ${ticket.priority}">${ticket.priority}</span></div>
          <div class="value">Status: <span class="status-badge ${ticket.status}">${ticket.status}</span></div>
          <div class="value">Assigned To: ${ticket.assignedTo}</div>
          <div class="value">Created: ${new Date(ticket.createdAt).toLocaleString()}</div>
        </div>
      </div>
      <div style="margin:16px 0;">
        <h4 style="font-size:0.9rem;font-weight:700;margin-bottom:8px;">Conversation</h4>
        ${conversationHtml || '<p style="color:#94a3b8;">No conversation yet</p>'}
      </div>
      <div style="margin:16px 0;">
        <h4 style="font-size:0.9rem;font-weight:700;margin-bottom:8px;">Quick Reply</h4>
        <div class="form-group">
          <textarea id="quickReply" rows="2" placeholder="Type your reply here..." style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.85rem;resize:vertical;"></textarea>
        </div>
        <button class="btn btn-primary btn-sm" style="margin-top:8px;" onclick="sendQuickReply()"><i class="fas fa-paper-plane"></i> Send Reply</button>
      </div>
    `;
  }

  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('ticketDrawer').classList.remove('open');
    currentTicketId = null;
  }

  // ============================================================
  //  TICKET ACTIONS
  // ============================================================
  function openNewTicket() {
    alert('🆕 New Ticket\n\nFirebase ready: This will open a new ticket creation form.\n\nFields: Customer, Subject, Category, Priority, Message, Attachments');
  }

  function replyTicket(id) {
    const ticket = tickets.find(t => t.id === (id || currentTicketId));
    if (!ticket) return;
    alert(`✉️ Reply to ticket ${ticket.id}\n\nFirebase ready: This will open a full reply composer with:\n- Rich text editor\n- Attachments\n- Internal notes toggle\n- Template suggestions`);
  }

  function resolveTicket(id) {
    const ticket = tickets.find(t => t.id === (id || currentTicketId));
    if (!ticket) return;
    if (confirm(`Resolve ticket ${ticket.id}?`)) {
      ticket.status = 'resolved';
      ticket.conversation.push({
        from: 'support@kfk.in',
        message: '✅ Ticket resolved successfully.',
        time: new Date().toLocaleString(),
        type: 'agent'
      });
      renderTickets();
      renderStats();
      if (currentTicketId) viewTicket(currentTicketId);
    }
  }

  function assignTicket() {
    const ticket = tickets.find(t => t.id === currentTicketId);
    if (!ticket) return;
    const agent = prompt('Assign to which agent?', ticket.assignedTo || 'Unassigned');
    if (agent && agent.trim()) {
      ticket.assignedTo = agent.trim();
      ticket.conversation.push({
        from: 'support@kfk.in',
        message: `📋 Assigned to ${agent.trim()}`,
        time: new Date().toLocaleString(),
        type: 'internal'
      });
      renderTickets();
      if (currentTicketId) viewTicket(currentTicketId);
    }
  }

  function addReply() {
    const ticket = tickets.find(t => t.id === currentTicketId);
    if (!ticket) return;
    const reply = prompt('Enter your reply message:');
    if (reply && reply.trim()) {
      ticket.conversation.push({
        from: 'support@kfk.in',
        message: reply.trim(),
        time: new Date().toLocaleString(),
        type: 'agent'
      });
      renderTickets();
      viewTicket(currentTicketId);
    }
  }

  function sendQuickReply() {
    const reply = document.getElementById('quickReply')?.value;
    if (!reply || !reply.trim()) {
      alert('Please enter a reply message.');
      return;
    }
    const ticket = tickets.find(t => t.id === currentTicketId);
    if (!ticket) return;
    ticket.conversation.push({
      from: 'support@kfk.in',
      message: reply.trim(),
      time: new Date().toLocaleString(),
      type: 'agent'
    });
    document.getElementById('quickReply').value = '';
    renderTickets();
    viewTicket(currentTicketId);
  }

  // ============================================================
  //  INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    renderSidebar();
    renderTickets();
    renderStats();

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDrawer();
    });
  });
</script>
</body>
</html>
